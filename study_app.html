  }else if(S.qFilter==='all'){
    const sorted=[...f].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    lh=sorted.map(q=>`<div class="list-item" onclick="openQ('${q.id}')"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span class="badge b-${q.subjectId}" style="font-size:10px">${sName(q.subjectId)}</span>${showSubTopic(q)?`<span class="badge b-new" style="font-size:10px">${esc(q.subTopic)}</span>`:''}${q.topicTag?`<span style="font-size:11px;color:var(--text3)"># ${esc(q.topicTag)}</span>`:''}${isDue(q)&&q.history?.length?`<span class="badge b-due" style="font-size:10px">要復習</span>`:''}${!q.history?.length?`<span class="badge b-new" style="font-size:10px">未学習</span>`:''}<span style="font-size:10px;color:var(--text3);margin-left:auto">${q.nextReview||''}</span></div><div class="list-item-title">${esc((q.question||'').slice(0,72))}${(q.question||'').length>72?'…':''}</div></div>`).join('');
  }else{
    const topicOrder=await getTopicOrder(S.qFilter,activeSub);
    if(S.qFilter==='tax'){
      const legacyOrder=await getTopicOrder('tax','');
      const presentTags=new Set(f.filter(q=>q.topicTag).map(q=>q.topicTag));
      const known=new Set(topicOrder);
      for(const t of legacyOrder){if(presentTags.has(t)&&!known.has(t)){topicOrder.push(t);known.add(t);}}
    }
    lh=renderGroupedQuestions(f,topicOrder);
  }
  // Subject counts shown as-is (totals across tax types) since the filter row reflects all subjects
  const cnts=SUBJECTS.map(s=>({...s,cnt:qs.filter(q=>q.subjectId===s.id).length}));
  const eh=S.editingQ!==null?await qEditorHTML(S.editingQ,notes):'';
  const subFilterHTML=S.qFilter==='tax'?`<div class="subfilter-row"><span class="subfilter-label">税目</span>${TAX_SUBS.map(t=>{const c=qs.filter(q=>q.subjectId==='tax'&&(q.subTopic||'法人税')===t).length;return `<button class="subfilter-btn ${S.qTaxSub===t?'active':''}" onclick="setQTaxSub('${t}')">${t}(${c})</button>`;}).join('')}</div>`:'';
  document.getElementById('view-questions').innerHTML=`<div class="section-title">問題管理 <button class="btn btn-primary btn-sm" onclick="openQ(null)">+ 新規</button></div><div class="filter-row">${cnts.map(s=>`<button class="filter-btn ${S.qFilter===s.id?'active':''}" onclick="setQFilter('${s.id}')">${s.name}(${s.cnt})</button>`).join('')}</div>${subFilterHTML}<div id="q-editor-slot">${eh}</div><div id="q-list">${lh}</div>`;
  if(S.editingQ!==null)document.getElementById('q-editor-slot')?.scrollIntoView({behavior:'smooth',block:'start'});
}
function renderGroupedQuestions(qs,topicOrder){
  const groups={};
  qs.forEach(q=>{const k=q.topicTag||'__untagged__';(groups[k]=groups[k]||[]).push(q);});
  const keys=buildOrderedKeys(groups,topicOrder);
  _qTopicKeysCache=keys;
  const autoExpand=keys.length===1;
  const movable=keys.filter(k=>k!=='__untagged__').length;
  return keys.map((key,i)=>{
    const items=[...groups[key]].sort((a,b)=>orderVal(a)-orderVal(b));
    const display=key==='__untagged__'?'(論点未設定)':key;
    const expanded=autoExpand||S.expandedQTopics.has(key);
    const arrow=expanded?'▼':'▶';
    const dueCnt=items.filter(q=>isDue(q)&&q.history?.length).length;
    const isUntag=key==='__untagged__';
    const topicDragHandle=isUntag?'':`<span class="q-drag-handle" draggable="true" ondragstart="qTopicDragStart(event,${i})" ondragend="qTopicDragEnd(event)" onclick="event.stopPropagation()" title="ドラッグで論点グループの順番を変更">≡</span>`;
    const inner=expanded?`<div class="topic-notes">${items.map(q=>`<div class="note-row" data-qid="${q.id}" data-qtopic="${esc(key)}" data-qsubj="${esc(q.subjectId||'')}" data-qsub="${esc(q.subTopic||'')}" ondragover="qItemDragOver(event)" ondragleave="qItemDragLeave(event)" ondrop="qItemDrop(event)" onclick="if(!event.target.classList.contains('q-drag-handle'))openQ('${q.id}')"><span class="q-drag-handle" draggable="true" ondragstart="qItemDragStart(event,'${q.id}')" ondragend="qItemDragEnd(event)" title="ドラッグで並び順を変更">≡</span>${showSubTopic(q)?`<span class="badge b-new" style="font-size:10px">${esc(q.subTopic)}</span>`:''}${isDue(q)&&q.history?.length?`<span class="badge b-due" style="font-size:10px">要復習</span>`:''}${!q.history?.length?`<span class="badge b-new" style="font-size:10px">未学習</span>`:''}<span class="note-row-title">${esc((q.question||'').slice(0,60))}${(q.question||'').length>60?'…':''}</span><span class="note-row-meta">${q.nextReview||''}</span></div>`).join('')}</div>`:'';
    return `<div class="topic-group" data-qtidx="${i}" ondragover="qTopicDragOver(event)" ondragleave="qTopicDragLeave(event)" ondrop="qTopicDrop(event)"><div class="topic-header" onclick="toggleQTopic(${i})">${topicDragHandle}<span class="topic-arrow">${arrow}</span><span class="topic-name">${esc(display)}</span><span class="topic-count">${items.length}${dueCnt>0?` <span style="color:var(--red)">⚠${dueCnt}</span>`:''}</span></div>${inner}</div>`;
  }).join('');
}
function toggleQTopic(i){const k=_qTopicKeysCache[i];if(!k)return;if(S.expandedQTopics.has(k))S.expandedQTopics.delete(k);else S.expandedQTopics.add(k);renderQuestions();}
async function qEditorHTML(q,notes){
  const isNew=!q.id,so=SUBJECTS.map(s=>`<option value="${s.id}" ${q.subjectId===s.id?'selected':''}>${s.name}</option>`).join('');
  // Cache notes globally so onQSubjChange can rebuild dependent selects

  const subTopic=sid==='tax'?(q.subTopic||S.qTaxSub||'法人税'):'';
  const topicOpts=buildTopicOptions(notes,sid,subTopic,q.topicTag||'');
  const noteOpts=buildNoteOptions(notes,sid,subTopic,q.noteId||'');
  const topicTags=getSubjectTopicTags(notes,sid,subTopic);
  const useNew=q.topicTag&&!topicTags.includes(q.topicTag);
  const tagInputStyle=`margin-top:6px;display:${useNew?'block':'none'}`;
  const tagInputVal=useNew?esc(q.topicTag):'';

    if(!q.pendingCalcRelations){
      // 既存問題の場合は現在のリンク状態を取得して初期化
      if(q.id){
        const allCalc=await dbAll('calc');
        q.pendingCalcRelations=allCalc.filter(c=>(c.relatedQuestionIds||[]).includes(q.id)).map(c=>c.id);

        q.pendingCalcRelations=[];
      }
    }
    const allCalc=await dbAll('calc');
    // 同じ科目(・税目)の計算問題を候補に
    let candidates=allCalc.filter(c=>c.subject===sid);
    if(sid==='tax')candidates=candidates.filter(c=>(c.subTopic||'法人税')===subTopic);
    candidates.sort((a,b)=>calcProblemNumCompare(a.problemNumber||'',b.problemNumber||''));
    const selectedIds=q.pendingCalcRelations||[];
    // 選択済みリスト (常時表示)
    const selectedList=selectedIds.map(cid=>{
      const c=allCalc.find(x=>x.id===cid);
      if(!c)return `<div class="calc-related-q" style="display:flex;align-items:center;gap:8px"><span style="color:var(--text3)">(削除済み)</span><button class="btn btn-sm" style="margin-left:auto;font-size:11px" onclick="toggleQCalcRelation('${cid}')">外す</button></div>`;
      return `<div class="calc-related-q" style="display:flex;align-items:center;gap:8px"><span class="badge b-${c.subject}" style="font-size:10px">${sName(c.subject)}</span>${c.problemNumber?`<span style="color:var(--text3);font-size:11px;font-family:'Inter',sans-serif">${esc(c.problemNumber)}</span>`:''}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc((c.topicName||'').slice(0,60))}</span><button class="btn btn-sm" style="font-size:11px" onclick="toggleQCalcRelation('${c.id}')">外す</button></div>`;
    }).join('')||`<div style="color:var(--text3);font-size:12px;padding:6px">関連計算問題は未選択</div>`;
    const pickerHTML=S.editingQCalcPicker?`<div class="calc-q-picker">${candidates.length?candidates.map(c=>`<label class="calc-q-picker-item"><input type="checkbox" ${selectedIds.includes(c.id)?'checked':''} onchange="toggleQCalcRelation('${c.id}')"><div style="flex:1"><div style="font-size:11px;color:var(--text3);margin-bottom:2px;font-family:'Inter',sans-serif">${c.problemNumber?esc(c.problemNumber):'(番号なし)'}</div><div>${esc((c.topicName||'').slice(0,100))}${(c.topicName||'').length>100?'…':''}</div></div></label>`).join(''):`<div style="color:var(--text3);font-size:12px;padding:10px;text-align:center">${sid==='tax'?'この税目の':'この科目の'}計算問題は登録されていません</div>`}</div>`:'';
    calcSectionHTML=`<div class="form-group"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><label style="margin:0">関連する計算問題 (${selectedIds.length}件選択中) <span style="color:var(--text3);font-weight:400">（任意・保存時に双方向に紐づきます）</span></label><button type="button" class="btn btn-sm" onclick="toggleQCalcPicker()">${S.editingQCalcPicker?'リストを閉じる':'+ 計算問題を選ぶ'}</button></div>${selectedList}${pickerHTML}</div>`;
  }
  return `<div class="card" style="margin-bottom:14px;border-color:var(--blue-mid)"><div class="section-title" style="font-size:14px;margin-bottom:14px">${isNew?'新規問題':'問題を編集'}<button class="btn btn-sm" onclick="closeQEditor()">キャンセル</button></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="form-group"><label>科目</label><select id="q-subj" onchange="onQSubjChange()">${so}</select></div><div class="form-group" id="q-stw" style="display:${sid==='tax'?'block':'none'}"><label>税目 <span style="color:var(--text3);font-weight:400">（論点・関連ノートはこの税目内）</span></label><select id="q-subtopic" onchange="onQSubtopicChange()">${subtopicOpts}</select></div></div><div class="form-group"><label>論点タグ <span style="color:var(--text3);font-weight:400">（同科目${sid==='tax'?'・同税目':''}のノートから選択）</span></label><select id="q-tag-select" onchange="onQTagSelectChange()">${topicOpts}</select><input type="text" id="q-tag-new" value="${tagInputVal}" placeholder="新しい論点名を入力" style="${tagInputStyle}"></div><div class="form-group"><label>問題文（$数式$ ／ 画像貼付・D&D可）</label>${editorToolbarHTML('q-question')}<textarea id="q-question" rows="5" onkeydown="handleNoteEditorKey(event)" onpaste="handleEditorPaste(event)" ondragover="handleEditorDragover(event)" ondrop="handleEditorDrop(event)" placeholder="判断を問う問題を入力...">${esc(q.question||'')}</textarea></div><div class="form-group"><label>解答・解説（画像貼付・D&D可）</label>${editorToolbarHTML('q-answer')}<textarea id="q-answer" rows="5" onkeydown="handleNoteEditorKey(event)" onpaste="handleEditorPaste(event)" ondragover="handleEditorDragover(event)" ondrop="handleEditorDrop(event)" placeholder="正解と理由...">${esc(q.answer||'')}</textarea></div><div class="form-group"><label>関連ノート <span style="color:var(--text3);font-weight:400">（同科目${sid==='tax'?'・同税目':''}のみ表示・任意）</span></label><select id="q-note">${noteOpts}</select></div>${calcSectionHTML}<div class="btn-group"><button class="btn btn-primary" onclick="saveQ()">保存</button>${!isNew?`<button class="btn btn-danger" onclick="deleteQ('${q.id}')">削除</button>`:''}</div></div>`;
}
// 関連計算ピッカーの開閉
function toggleQCalcPicker(){saveQEditorBufferToState();S.editingQCalcPicker=!S.editingQCalcPicker;renderQuestions();}
function toggleQCalcRelation(cid){
  if(!S.editingQ)return;
  // 編集UI側のテキストフィールドを保存して画面再描画後に保持
  saveQEditorBufferToState();
  const arr=S.editingQ.pendingCalcRelations||[];
  const i=arr.indexOf(cid);
  if(i>=0)arr.splice(i,1);else arr.push(cid);
  S.editingQ.pendingCalcRelations=arr;
  renderQuestions();
}
// テキスト入力欄の値を S.editingQ に書き戻す (再描画時に消えないように)
function saveQEditorBufferToState(){
  if(!S.editingQ)return;
  const qQ=document.getElementById('q-question'),qA=document.getElementById('q-answer');
  const qSubj=document.getElementById('q-subj'),qSub=document.getElementById('q-subtopic');
  const qTagSel=document.getElementById('q-tag-select'),qTagNew=document.getElementById('q-tag-new');
  const qNote=document.getElementById('q-note');
  if(qQ)S.editingQ.question=qQ.value;
  if(qA)S.editingQ.answer=qA.value;
  if(qSubj)S.editingQ.subjectId=qSubj.value;
  if(qSub&&qSub.parentElement.style.display!=='none')S.editingQ.subTopic=qSub.value;
  if(qTagSel){const sel=qTagSel.value;S.editingQ.topicTag=sel==='__new__'?(qTagNew?.value||''):sel;}
  if(qNote)S.editingQ.noteId=qNote.value||'';
}
function getSubjectTopicTags(notes,subjectId,subTopic){
  /* For tax, restrict to notes with matching subTopic and use sub-aware topicOrder.
     Legacy tax notes without subTopic are treated as 法人税 for backward compat. */
  const matchesSub=n=>subjectId!=='tax'?true:(n.subTopic||'法人税')===(subTopic||'法人税');
  const fromNotes=new Set(notes.filter(n=>n.subjectId===subjectId&&n.topicTag&&matchesSub(n)).map(n=>n.topicTag));
  const order=_editorTopicOrders[topicOrderKey(subjectId,subTopic)]||[];
  // Include topics from topicOrder even if they have no notes yet (pre-created via "+ 論点")
  const orderSet=new Set(order);
  const inOrder=[...order];
  const extras=[...fromNotes].filter(t=>!orderSet.has(t)).sort((a,b)=>a.localeCompare(b,'ja'));
  return [...inOrder,...extras];
}
function buildTopicOptions(notes,subjectId,subTopic,currentTag){
  const tags=getSubjectTopicTags(notes,subjectId,subTopic);
  let opts=`<option value="">(なし)</option>`;
  opts+=tags.map(t=>`<option value="${esc(t)}" ${t===currentTag?'selected':''}>${esc(t)}</option>`).join('');
  // If currentTag exists but not in list (e.g. legacy), keep "+ 新規入力" pre-selected
  const useNew=currentTag&&!tags.includes(currentTag);
  opts+=`<option value="__new__" ${useNew?'selected':''}>+ 新しい論点を入力</option>`;
  return opts;
}
function buildNoteOptions(notes,subjectId,subTopic,currentNoteId){
  /* For tax, only related notes with the same subTopic are eligible.
     Legacy tax notes without subTopic count as 法人税. */
  const filtered=notes.filter(n=>n.subjectId===subjectId&&(subjectId!=='tax'||(n.subTopic||'法人税')===(subTopic||'法人税')));
  let opts=`<option value="" ${!currentNoteId?'selected':''}>なし</option>`;
  opts+=filtered.map(n=>`<option value="${n.id}" ${n.id===currentNoteId?'selected':''}>${esc(n.title||'無題')}${n.topicTag?` [${esc(n.topicTag)}]`:''}</option>`).join('');
  return opts;
}
function onQTagSelectChange(){
  const sel=document.getElementById('q-tag-select');
  const inp=document.getElementById('q-tag-new');
  if(!sel||!inp)return;
  if(sel.value==='__new__'){inp.style.display='block';inp.value='';inp.focus();}
  else{inp.style.display='none';inp.value='';}
}
async function onQSubjChange(){
  // 編集中の値を保持してから再描画 (関連計算問題セクションを科目に応じて差し替えるため)
  saveQEditorBufferToState();
  // 科目が変わったら、別科目の関連計算は無効化される (科目が一致しないとピッカーに出ない仕様)
  // pendingCalcRelations はクリアせず保持 (戻したときに復元できる)。保存時に保存時の科目で再評価される
  await rebuildQTopicOptions();
  renderQuestions();
}
async function onQSubtopicChange(){
  saveQEditorBufferToState();
  await rebuildQTopicOptions();
  renderQuestions();
}
async function rebuildQTopicOptions(){
  const v=document.getElementById('q-subj')?.value;
  const st=v==='tax'?(document.getElementById('q-subtopic')?.value||''):'';
  const tagSel=document.getElementById('q-tag-select');
  const noteSel=document.getElementById('q-note');
  const tagInp=document.getElementById('q-tag-new');
  const key=topicOrderKey(v,st);
  if(!_editorTopicOrders[key])_editorTopicOrders[key]=await getTopicOrder(v,st);
  if(tagSel)tagSel.innerHTML=buildTopicOptions(_editorNotes,v,st,'');
  if(tagInp){tagInp.style.display='none';tagInp.value='';}
  if(noteSel)noteSel.innerHTML=buildNoteOptions(_editorNotes,v,st,'');
}
function setQFilter(f){S.qFilter=f;renderQuestions();}
function setQTaxSub(t){S.qTaxSub=t;renderQuestions();}
async function openQ(id){

  slot.innerHTML=`<div class="reader-overlay" onclick="if(event.target===this)closeQViewer()"><div class="reader-modal" onclick="event.stopPropagation()"><div class="reader-header"><div class="reader-meta"><span class="badge b-${q.subjectId}">${sName(q.subjectId)}</span>${showSubTopic(q)?`<span class="badge b-new">${esc(q.subTopic)}</span>`:''}${q.topicTag?`<span style="font-size:12px;color:var(--text3);margin-left:6px"># ${esc(q.topicTag)}</span>`:''}${isDue(q)&&q.history?.length?'<span class="badge b-due" style="margin-left:6px">要復習</span>':''}${!q.history?.length?'<span class="badge b-new" style="margin-left:6px">未学習</span>':''}</div><div class="reader-actions"><button class="btn btn-sm btn-primary" onclick="editFromQViewer()">編集</button><button class="btn btn-sm" onclick="closeQViewer()">✕ 閉じる</button></div></div><div class="reader-content">${noteHTML}<div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500">問題</div><div class="md" style="font-size:14px;margin-bottom:18px;padding:12px;background:var(--bg2);border-radius:var(--r)">${renderMd(q.question||'')}</div><div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500">解答・解説</div><div class="md" style="font-size:13px;padding:12px;background:var(--bg2);border-radius:var(--r)">${renderMd(q.answer||'')}</div>${relatedCalcHTML}<div style="margin-top:14px;font-size:11px;color:var(--text3);display:flex;gap:14px"><span>次回: ${q.nextReview||'-'}</span><span>レベル: ${q.level||0}</span><span>履歴: ${q.history?.length||0}回</span></div></div></div></div>`;
  renderMath(slot.querySelector('.reader-content'));
}

async function saveQ(){
  const question=document.getElementById('q-question')?.value.trim();
  const answer=document.getElementById('q-answer')?.value.trim();
  const subjectId=document.getElementById('q-subj')?.value;
  const tagSel=document.getElementById('q-tag-select')?.value||'';
  const tagNew=document.getElementById('q-tag-new')?.value.trim()||'';
  const topicTag=tagSel==='__new__'?tagNew:tagSel;
  const subTopicRaw=document.getElementById('q-subtopic')?.value||'';
  // 科目の subs 定義に含まれない subTopic は空にする
  const subjSubs=SUBJECTS.find(s=>s.id===subjectId)?.subs||[];
  const subTopic=subjSubs.includes(subTopicRaw)?subTopicRaw:'';
  const noteId=document.getElementById('q-note')?.value||null;
  if(!question){alert('問題文を入力してください');return;}
  if(!answer){alert('解答を入力してください');return;}
  if(subjectId==='tax'&&!subTopic){alert('租税法では税目（法人税／消費税／所得税）を選択してください');return;}
  const _isNewQ=!S.editingQ.id;
  const _defaultNextReview=_isNewQ?(()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().split('T')[0];})():today();
  const q={...S.editingQ,id:S.editingQ.id||uid(),question,answer,subjectId,topicTag,subTopic,noteId,createdAt:S.editingQ.createdAt||today(),level:S.editingQ.level!==undefined?S.editingQ.level:0,interval:S.editingQ.interval||1,nextReview:S.editingQ.nextReview||_defaultNextReview,lastReview:S.editingQ.lastReview||null,history:S.editingQ.history||[]};
  // pendingCalcRelations は問題本体には保存しない (計算側で双方向管理)
  const pendingCalcRelations=S.editingQ.pendingCalcRelations||[];
  delete q.pendingCalcRelations;
  if(q.order===undefined)q.order=-Date.now();
  await dbPut('questions',q);
  // 双方向リンクの同期: 計算問題の relatedQuestionIds をこの問題ID基準で更新
  // 1. pendingCalcRelations に含まれる計算問題: その問題IDを relatedQuestionIds に追加
  // 2. pendingCalcRelations に含まれない計算問題: その問題IDが relatedQuestionIds にあれば外す
  const allCalc=await dbAll('calc');
  for(const c of allCalc){
    const rels=c.relatedQuestionIds||[];
    const had=rels.includes(q.id);
    const want=pendingCalcRelations.includes(c.id);
    if(want&&!had){
      c.relatedQuestionIds=[...rels,q.id];
      c.updatedAt=todayLocal();
      await dbPut('calc',c);
    }else if(!want&&had){
      c.relatedQuestionIds=rels.filter(x=>x!==q.id);
      c.updatedAt=todayLocal();
      await dbPut('calc',c);
    }
  }
  S.editingQCalcPicker=false;
  await ensureTopicInOrder(subjectId,subTopic,topicTag);
  _editorTopicOrders[topicOrderKey(subjectId,subTopic)]=await getTopicOrder(subjectId,subTopic);
  if(subjectId==='tax')S.qTaxSub=subTopic;
  S.editingQ=null;
  renderQuestions();
}
async function deleteQ(id){
  if(!confirm('削除しますか？'))return;
  await dbDelete('questions',id);
  // 計算側の逆リンクも掃除
  const allCalc=await dbAll('calc');
  for(const c of allCalc){
    const rels=c.relatedQuestionIds||[];
    if(rels.includes(id)){
      c.relatedQuestionIds=rels.filter(x=>x!==id);
      c.updatedAt=todayLocal();
      await dbPut('calc',c);
    }
  }
  S.editingQ=null;S.editingQCalcPicker=false;
  renderQuestions();
}

  for(let i=queue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[queue[i],queue[j]]=[queue[j],queue[i]];}

async function startStudy(subjectId,opts={}){
  S.studySubject=subjectId;const qs=await dbAll('questions');let pool=subjectId==='all'?qs:qs.filter(q=>q.subjectId===subjectId);
  if(!pool.length){alert('問題がありません。先に問題を作成してください。');return;}
  const due=pool.filter(isDue).sort(()=>Math.random()-.5);
  let queue;
  if(opts.dueOnly){
    if(!due.length){alert('今日復習すべき問題はありません。');return;}
    queue=due;
  }else{
    const notDue=pool.filter(q=>!isDue(q)).sort((a,b)=>(a.nextReview||'').localeCompare(b.nextReview||''));
    queue=[...due,...notDue];
  }
  S.studyQueue=queue;S.studyIdx=0;S.cardFlipped=false;S.studyEditing=false;S.sessionResults=null;S.sessionData={correct:0,fuzzy:0,wrong:0};renderStudyCard();
}

const PDFJS_WORKER='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
function ensurePdfJsWorker(){if(window.pdfjsLib&&!pdfjsLib.GlobalWorkerOptions.workerSrc){pdfjsLib.GlobalWorkerOptions.workerSrc=PDFJS_WORKER;}}
function cleanCjkSpaces(s){if(!s)return'';let t=s,prev;do{prev=t;t=t.replace(/([^\sA-Za-z0-9])\s+([^\sA-Za-z0-9])/g,'$1$2');}while(prev!==t);return t.replace(/\s+/g,' ').trim();}
function splitTopics(s){if(!s)return[];let t=cleanCjkSpaces(s).replace(/[\s\u3000]*に関する問題[\s\u3000]*$/,'').trim();t=t.replace(/^[ABCDE][\s\u3000]+/,'').replace(/[\s\u3000]+[ABCDE]$/,'');const brackets=t.match(/「([^」]+)」/g);if(brackets&&brackets.length>=1)return brackets.map(b=>b.slice(1,-1).trim()).filter(Boolean);return t.split(/[,，、]/).map(x=>x.trim()).filter(Boolean);}
async function parseExamPDF(file){
  if(!window.pdfjsLib)throw new Error('PDF.jsの読み込みに失敗しました。ネットワーク接続を確認してください。');
  ensurePdfJsWorker();
  const ab=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:ab}).promise;
  // Collect all items across pages
  let allItems=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    const items=tc.items.filter(it=>(it.str||'').trim()!=='').map(it=>({text:it.str,x:it.transform[4],y:it.transform[5],page:p}));
    allItems=allItems.concat(items);
  }
  // Auto-detect notes column X by looking at ※1/※2/etc markers in the score table area.
  // The notes column is the right-side text column with "※１ 平均点は..." style annotations.
  // We detect it by the leftmost X of ※-number markers at x>=350 (to exclude inline
  // header markers like "素点 ※１ 平均点 ※２" which sit at x<300).
  let noteColX=Infinity;
  for(const it of allItems){
    const t=it.text.trim();
    if(/^※[０-９0-9]/.test(t)&&it.y>=540&&it.y<=680&&it.x>=350){
      if(it.x<noteColX)noteColX=it.x;
    }
  }
  if(!isFinite(noteColX))noteColX=390; // safe default
  const TABLE_X_MAX=noteColX-3;
  // Cluster items into rows: closest-fit (not first-fit), y desc + x asc deterministic order, tolerance 5pt
  // tol=5 handles the worst-case 3.7pt y-skew we observed in mock exam PDFs.
  function clusterRows(items,tol){
    const rows=[];
    const sorted=[...items].sort((a,b)=>b.y-a.y||a.x-b.x);
    for(const it of sorted){
      let best=null,bestDist=Infinity;
      for(const r of rows){
        const d=Math.abs(r.y-it.y);
        if(d<tol&&d<bestDist){best=r;bestDist=d;}
      }
      if(best)best.items.push(it);
      else rows.push({y:it.y,items:[it]});
    }
    rows.sort((a,b)=>b.y-a.y);
    for(const r of rows){
      r.items.sort((a,b)=>a.x-b.x);
      r.text=r.items.map(it=>it.text).join(' ').replace(/[\s\u3000]+/g,' ').trim();
      // tableText = same row but excluding right-side notes column items
      r.tableText=r.items.filter(it=>it.x<TABLE_X_MAX).map(it=>it.text).join(' ').replace(/[\s\u3000]+/g,' ').trim();
    }
    return rows;
  }
  const allRows=clusterRows(allItems,5);
  const allText=allRows.map(r=>r.text).join('\n');
  // tableText: only the table column area, with notes column removed. This is what score regex runs against.
  const tableText=allRows.map(r=>r.tableText).filter(t=>t).join('\n');
  // Header fields
  let examId='',examName='',studentName='';
  const idM=allText.match(/答練ID[\s\u3000]+(\d+)/);if(idM)examId=idM[1];
  const nameM=allText.match(/答練名[\s\u3000]+([^\n]+?)(?:\s*$|\s*\n)/);if(nameM)examName=nameM[1].trim();
  const stuM=allText.match(/名前[\s\u3000]+(\S+?)\s+答練名/);if(stuM)studentName=stuM[1].trim();
  // Subject from table header: appears as a standalone row item in the left part of the table
  let subjectHeader='',subjectInternal='';
  for(const sh of Object.keys(SUBJECT_HEADER_MAP)){
    const r=allRows.find(row=>{
      const tt=row.tableText.trim();
      return tt===sh||tt.startsWith(sh+' ');
    });
    if(r){subjectHeader=sh;subjectInternal=SUBJECT_HEADER_MAP[sh];break;}
  }
  // Fallback: examName末尾から推測
  if(!subjectInternal&&examName){
    for(const sh of Object.keys(SUBJECT_HEADER_MAP))if(examName.endsWith(sh)){subjectHeader=sh;subjectInternal=SUBJECT_HEADER_MAP[sh];break;}
    if(!subjectInternal){
      if(examName.endsWith('会計学午後')){subjectHeader='財務会計論';subjectInternal='financial';}
      else if(examName.endsWith('会計学午前')){subjectHeader='管理会計論';subjectInternal='managerial';}
    }
  }
  // examLabel and examType from examName
  let examLabel='',examType='';
  if(examName){
    const dashIdx=examName.lastIndexOf('-');
    examLabel=dashIdx>=0?examName.substring(dashIdx+1).trim():'';
    if(examName.includes('模擬試験'))examType='模擬試験';
    else if(examName.includes('上級答練'))examType='上級答練';
    else if(examName.includes('答練'))examType='答練';
    else examType='その他';
  }
  // Exam date from notice text
  let examDate='';
  const dateM=allText.match(/(\d{4})年(\d{1,2})月(\d{1,2})日にライブ受験/);
  if(dateM)examDate=`${dateM[1]}-${String(dateM[2]).padStart(2,'0')}-${String(dateM[3]).padStart(2,'0')}`;
  // Generated date from footer
  let generatedAt='';
  const genM=allText.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})[\s\u3000]*(?:現在|作成)/);
  if(genM)generatedAt=`${genM[1]}-${String(genM[2]).padStart(2,'0')}-${String(genM[3]).padStart(2,'0')}`;
  // Score rows: run regex on tableText (notes column excluded) so it works for both layouts
  const questions=[];
  const scoreRe=/第(\d+)問\s+(\d+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+(\d+)位\s*\/\s*(\d+)人中(?:\s+(?:([－―ー─\-])|(\d+)位\s*\/\s*(\d+)人中))?/g;
  let sm;
  while((sm=scoreRe.exec(tableText))!==null){
    questions.push({
      num:parseInt(sm[1]),rawScore:parseInt(sm[2]),avgScore:parseFloat(sm[3]),deviation:parseFloat(sm[4]),scoreRate:parseFloat(sm[5]),
      rankLive:{rank:parseInt(sm[6]),total:parseInt(sm[7])},
      rankAll:sm[9]?{rank:parseInt(sm[9]),total:parseInt(sm[10])}:null,
      topicsRaw:'',topics:[],judgment:'',thresholds:[]
    });
  }
  // 合計 row (also on tableText)
  const totalRe=/合計\s+(\d+)\s+([\d.]+)\s+[ー―─\-－]\s+([\d.]+)\s+(\d+)位\s*\/\s*(\d+)人中(?:\s+(?:([－―ー─\-])|(\d+)位\s*\/\s*(\d+)人中))?/;
  const tm=tableText.match(totalRe);
  const total=tm?{
    rawScore:parseInt(tm[1]),avgScore:parseFloat(tm[2]),scoreRate:parseFloat(tm[3]),
    rankLive:{rank:parseInt(tm[4]),total:parseInt(tm[5])},
    rankAll:tm[7]?{rank:parseInt(tm[7]),total:parseInt(tm[8])}:null,
    overallJudgment:''
  }:null;
  // Find judgment table header row to get column X positions.
  // Use r.text (not r.tableText) because "総合判定" cell sits at x≈406, inside the notes-column range.
  const headerIdx=allRows.findIndex(r=>r.text.includes('出題論点')&&r.text.includes('判定')&&r.text.includes('総合判定'));
  let judgX=-1,overallJudgX=-1,topicX=-1;
  if(headerIdx>=0){
    for(const it of allRows[headerIdx].items){
      const t=it.text.trim();
      if(t==='判定')judgX=it.x;
      else if(t==='総合判定')overallJudgX=it.x;
      else if(t==='出題論点')topicX=it.x;
    }
  }
  // Use y-range based extraction so that topic text spanning multiple visual lines is captured correctly.
  if(headerIdx>=0&&judgX>=0&&overallJudgX>=0){
    const headerY=allRows[headerIdx].y;
    const jtEndIdx=allRows.findIndex((r,i)=>i>headerIdx&&/^各判定は/.test(r.text.trim()));
    const endY=jtEndIdx>=0?allRows[jtEndIdx].y:0;
    // Find the Y of each 第N問 label inside the judgment table
    const qLabelY={};
    for(const it of allItems){
      const m=it.text.trim().match(/^第(\d+)問$/);
      if(m&&it.y<headerY&&it.y>endY){
        const n=parseInt(m[1]);
        if(questions.find(q=>q.num===n))qLabelY[n]=it.y;
      }
    }
    const qNums=Object.keys(qLabelY).map(Number).sort((a,b)=>a-b);
    // For each question, gather topic items from its y band (with midpoint splits from neighbors)
    for(const q of questions){
      const labelY=qLabelY[q.num];
      if(labelY==null)continue;
      const idxInList=qNums.indexOf(q.num);
      const prevNum=idxInList>0?qNums[idxInList-1]:null;
      const nextNum=idxInList<qNums.length-1?qNums[idxInList+1]:null;
      const topY=prevNum!=null?(labelY+qLabelY[prevNum])/2:headerY;
      const bottomY=nextNum!=null?(labelY+qLabelY[nextNum])/2:endY;
      // Topic column items: x roughly from topicX (about 150) down to judgX (about 225)
      const topicLeftX=topicX>0?topicX-60:90;
      const topicRightX=judgX>0?judgX-5:215;
      const topicItems=allItems.filter(it=>it.y<topY&&it.y>bottomY&&it.x>=topicLeftX&&it.x<=topicRightX);
      topicItems.sort((a,b)=>b.y-a.y||a.x-b.x);
      q.topicsRaw=cleanCjkSpaces(topicItems.map(it=>it.text).join(' '));
      q.topics=splitTopics(q.topicsRaw);
      // Judgment letter (single A-E) near judgX in same y band
      for(const it of allItems){
        if(it.y>=topY||it.y<=bottomY)continue;
        const t=it.text.trim();
        if(!/^[ABCDE]$/.test(t))continue;
        if(Math.abs(it.x-judgX)<=20){
          if(!q.judgment)q.judgment=t;
        }
      }
      // Threshold cells (あとN点 / 達成(+N点)) in same y band, x between judgX and overallJudgX
      const thrItems=allItems.filter(it=>it.y<topY&&it.y>bottomY&&it.x>judgX+15&&it.x<overallJudgX-5&&/^(?:あと\d+点|達成\(\+\d+点\))$/.test(it.text.trim()));
      thrItems.sort((a,b)=>a.x-b.x);
      const thr=[];
      for(const it of thrItems){
        const t=it.text.trim();
        const am=t.match(/あと(\d+)点/);if(am){thr.push({type:'pending',points:parseInt(am[1])});continue;}
        const dm=t.match(/達成\(\+(\d+)点\)/);if(dm)thr.push({type:'achieved',points:parseInt(dm[1])});
      }
      q.thresholds=thr;
    }
    // Overall judgment: a single A-E letter in the 総合判定 column, anywhere in the judgment table area
    for(const it of allItems){
      if(it.y>=headerY||it.y<=endY)continue;
      const t=it.text.trim();
      if(!/^[ABCDE]$/.test(t))continue;
      if(Math.abs(it.x-overallJudgX)<=20){
        if(total&&!total.overallJudgment){total.overallJudgment=t;break;}
      }
    }
  }
  return{examId,examName,examLabel,examType,studentName,subjectHeader,subjectInternal,examDate,generatedAt,questions,total,raw:allText};
}

function renderExamCard(e){
  const qLine=(e.questions||[]).map(q=>`<span>第${q.num}問 <span class="judg-badge j-${q.judgment||'N'}">${q.judgment||'-'}</span></span>`).join('');
  const tot=e.total||{};
  const rankStr=tot.rankLive?`${tot.rankLive.rank}位/${tot.rankLive.total}人`:'';

/* ===== Memorize (理論暗記チェックリスト) =====
   Recall level → interval mapping:
     Lv0 → +1日 / Lv1 → +3日 / Lv2 → +7日 / Lv3 → +14日 / Lv4 → +30日
   Base date for nextDueDate calculation = lastCheckedAt の日付。ただし時刻が 00:00〜03:00 の
   場合は「前日の学習の続き」と認識されるため、起算日を前日扱いする（深夜ルール）。
*/
const MEM_INTERVALS=[1,3,7,14,30];
const MEM_LEVEL_LABELS=['不可','要復習','曖昧','概ね可','完璧'];
function ymdLocal(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${da}`;}
function todayLocal(){return ymdLocal(new Date());}
function nowLocalIso(){
  const d=new Date();
  const tz=-d.getTimezoneOffset();
  const sign=tz>=0?'+':'-';
  const tzH=String(Math.floor(Math.abs(tz)/60)).padStart(2,'0');
  const tzM=String(Math.abs(tz)%60).padStart(2,'0');
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0');
  const h=String(d.getHours()).padStart(2,'0'),mi=String(d.getMinutes()).padStart(2,'0'),s=String(d.getSeconds()).padStart(2,'0');
  return `${y}-${m}-${da}T${h}:${mi}:${s}${sign}${tzH}:${tzM}`;
}
// 深夜ルール: 0:00-2:59 は前日の学習として扱う
function memBaseDateFromIso(iso){
  const d=new Date(iso);
  if(isNaN(d.getTime()))return new Date();
  if(d.getHours()<3){d.setDate(d.getDate()-1);}
  return new Date(d.getFullYear(),d.getMonth(),d.getDate());
}
// 要復習・今日変更の切替時刻も 03:00 に統一: 0:00-2:59 はまだ「前日」として扱う
function memEffectiveToday(){
  const d=new Date();
  if(d.getHours()<3)d.setDate(d.getDate()-1);
  return ymdLocal(d);
}
function calcNextDue(baseDate,level){
  const days=MEM_INTERVALS[level]!=null?MEM_INTERVALS[level]:1;
  const d=new Date(baseDate);
  d.setDate(d.getDate()+days);
  return ymdLocal(d);
}
function recalcNextDue(rec){
  if(!rec.lastCheckedAt){rec.nextDueDate=todayLocal();return;}
  const base=memBaseDateFromIso(rec.lastCheckedAt);
  rec.nextDueDate=calcNextDue(base,rec.recallLevel||0);
}
function memIsDue(rec){return !!rec.nextDueDate&&rec.nextDueDate<=memEffectiveToday();}
// "今日変更" = lastCheckedAt が深夜ルール適用後の「実効的な今日」と一致するもの。
// レベルボタンを押し間違えてすぐ直したい用途を想定。
function memChangedToday(rec){
  if(!rec.lastCheckedAt)return false;
  const d=new Date(rec.lastCheckedAt);
  if(isNaN(d.getTime()))return false;
  // lastCheckedAt にも同じ深夜ルールを適用してから比較
  return ymdLocal(memBaseDateFromIso(rec.lastCheckedAt))===memEffectiveToday();
}
// Subject sub-category helpers (generalizes 租税法's TAX_SUBS to also work for 企業法 etc)
function memSubsFor(subjId){const s=SUBJECTS.find(x=>x.id===subjId);return s?.subs||[];}
function memHasSubs(subjId){return memSubsFor(subjId).length>0;}
// 企業法のフィルタは「論点等(=要件/論点/趣旨/判例)」と「条文番号」の2グループに分ける
// データ上の subTopic は従来通り保持し、フィルタ表示時のみグループ化
const LAW_FILTER_GROUPS={
  '論点等':['要件','論点','趣旨','判例'],
  '条文番号':['条文番号']
};
function memLawGroupOf(subTopic){
  if(!subTopic)return null;
  for(const g of Object.keys(LAW_FILTER_GROUPS))if(LAW_FILTER_GROUPS[g].includes(subTopic))return g;
  return null;
}
// 法律はフィルタボタンを LAW_FILTER_GROUPS のキーで表示する（編集モーダルでは memSubsFor が返す元の5値を使う）
function memFilterChoicesFor(subjId){
  if(subjId==='law')return Object.keys(LAW_FILTER_GROUPS);
  return memSubsFor(subjId);
}
function getMemSub(subjId){
  let v=S.memSubFilters[subjId];
  // 企業法: 旧来の値（'要件'等）が残っていればグループキーへ自動移行
  if(subjId==='law'){
    const groups=Object.keys(LAW_FILTER_GROUPS);
    if(!v||(!groups.includes(v)&&v!=='all')){
      v=memLawGroupOf(v)||'論点等';
      S.memSubFilters.law=v;
    }
    return v;
  }
  return v||memSubsFor(subjId)[0]||null;
}
function setMemSub(subjId,val){S.memSubFilters[subjId]=val;S.memTopicFilter='all';S.memCardIdx=0;S.memAnswerShownId=null;S.memShowList=false;renderMemorize();}
function memSubLabel(subjId){return subjId==='tax'?'税目':subjId==='law'?'種類':subjId==='audit'?'区分':'分類';}
// CSV format detection (財務/管理/監査/企業 で列構成が違うため自動判定)
function detectCsvFormat(headers){
  if(headers.includes('問題番号')&&headers.includes('論点番号'))return 'financial';
  if(headers.includes('範囲')&&headers.includes('種類'))return 'law';
  if(headers.includes('税目')&&headers.includes('論点'))return 'tax';
  if(headers.includes('章'))return 'business';
  if(headers.includes('番号')&&!headers.includes('論点番号'))return 'managerial';
  if(headers.includes('監基法重要度'))return 'audit2';
  if(headers.includes('テキスト'))return 'audit';
  return 'unknown';
}
const CSV_FORMAT_INFO={
  financial:{subject:'financial',label:'財務会計論 形式',desc:'「論点名/問題番号/論点番号」を読み込み'},
  managerial:{subject:'managerial',label:'管理会計論 形式',desc:'「番号(例:1-3)」を分割 → 論点番号=1, 問題番号=3'},
  audit:{subject:'audit',label:'監査論 個別論点 形式',desc:'「テキスト(例:1.監査総論)」を論点番号として使用、区分=個別論点'},
  audit2:{subject:'audit',label:'監査論 論点洗出 形式',desc:'「論点名(例:1.監査総論)」を論点として使用、区分=論点洗出'},
  law:{subject:'law',label:'企業法 形式',desc:'「範囲」を論点番号、「種類(要件/論点/趣旨/...)」を種類分類として使用'},
  tax:{subject:'tax',label:'租税法 形式',desc:'「税目(法人税/所得税/消費税)」を税目、「ランク(A/B)」を重要度として読み込み'},
  business:{subject:'business',label:'経営学 形式',desc:'「章」を論点番号、「番号」を問題番号、「答え」を答えとして読み込み'},
  unknown:{subject:null,label:'不明な形式',desc:'論点名/想起レベル/最終チェック日のみ読み込み'}
};
function applyCsvFormat(row,format){
  const topicName=(row['論点名']||'').trim();
  if(format==='financial'){
    return {topicName,topicNumber:(row['論点番号']||'').trim(),problemNumber:(row['問題番号']||'').trim(),subTopic:null};
  }
  if(format==='managerial'){
    const num=(row['番号']||'').trim();
    const idx=num.indexOf('-');
    return {topicName,topicNumber:idx>=0?num.substring(0,idx).trim():num,problemNumber:idx>=0?num.substring(idx+1).trim():'',subTopic:null};
  }
  if(format==='audit'){
    return {topicName,topicNumber:(row['テキスト']||'').trim(),problemNumber:'',subTopic:'個別論点'};
  }
  if(format==='audit2'){
    // 監査論２(論点洗出): topicName が "1.監査総論" 等で章ヘッダーを兼ねている
    const lead=(topicName.match(/^(\d+(?:\.\d+)?)/)||[])[0];
    return {topicName,topicNumber:lead||topicName,problemNumber:'',subTopic:'論点洗出'};
  }
  if(format==='law'){
    return {topicName,topicNumber:(row['範囲']||'').trim(),problemNumber:'',subTopic:(row['種類']||'').trim()||null,answer:(row['答え']||'').trim(),page:(row['ページ']||'').trim()};
  }
  if(format==='tax'){
    // 列: 論点番号, 税目, 論点, ランク
    // 「論点」列が論点名、「ランク」列が重要度（A/B）、「税目」がsubTopic
    const taxTopicName=(row['論点']||row['論点名']||'').trim();
    const taxSubTopic=(row['税目']||'').trim();
    const validSubs=['法人税','所得税','消費税'];
    return {
      topicName:taxTopicName,
      topicNumber:(row['論点番号']||'').trim(),
      problemNumber:'',
      subTopic:validSubs.includes(taxSubTopic)?taxSubTopic:null,
      _rankOverride:(row['ランク']||'').trim().toUpperCase()||null,
    };
  }
  if(format==='business'){
    // 列: 論点名, 章, 番号, 答え
    // 章 → topicNumber、番号 → problemNumber、答え → answer
    return {
      topicName,
      topicNumber:(row['章']||'').trim(),
      problemNumber:(row['番号']||'').trim(),
      subTopic:null,
      answer:(row['答え']||'').trim(),
    };
  }
  return {topicName,topicNumber:'',problemNumber:'',subTopic:null};
}
function memDueStatus(rec){
  if(!rec.nextDueDate)return'pending';
  const t=memEffectiveToday();
  if(rec.nextDueDate<t)return'overdue';
  if(rec.nextDueDate===t)return'today';
  return'future';
}
function memFormatLastChecked(iso){
  if(!iso)return'-';
  const d=new Date(iso);if(isNaN(d.getTime()))return'-';
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function memTopicNumCompare(a,b){
  // Sort by the FIRST numeric token in the string. "1.2.3" → 1.2, "16・17" → 16, "23（2）" → 23
  const fa=(a.match(/(\d+(?:\.\d+)?)/)||['9999'])[0];
  const fb=(b.match(/(\d+(?:\.\d+)?)/)||['9999'])[0];
  const ra=parseFloat(fa),rb=parseFloat(fb);
  if(ra!==rb)return ra-rb;
  return a.localeCompare(b);
}
// 論点名の先頭の数字を取り出す。例: "2.資本維持論" → 2, "10.株主資本等変動計算書" → 10
function memTopicHeadNum(name){
  if(!name)return 9999;
  const m=name.match(/^(\d+(?:\.\d+)?)/);
  return m?parseFloat(m[1]):9999;
}
function memProblemNumCompare(a,b){
  // "1", "2/1", "1/3" - split on slash and compare numerically
  const ap=a.split('/').map(x=>parseInt(x)||0);
  const bp=b.split('/').map(x=>parseInt(x)||0);
  for(let i=0;i<Math.max(ap.length,bp.length);i++){
    const av=ap[i]||0,bv=bp[i]||0;
    if(av!==bv)return av-bv;
  }
  return 0;
}

function renderMemFlashcardView(list){
  if(!list.length)return '<div style="padding:32px;text-align:center;color:var(--text3)">該当する項目がありません</div>';
  const idx=Math.max(0,Math.min(S.memCardIdx,list.length-1));

  const m=list[idx];
  const total=list.length;
  const flipped=S.memAnswerShownId===m.id;
  const lv=m.recallLevel!=null?m.recallLevel:0;
  const status=memDueStatus(m);
  const dueColor=status==='overdue'?'var(--red)':status==='today'?'var(--amber)':'var(--text3)';
  const isKanjiCard=m.subject==='kanji';
  const metaParts=[];
  if(isKanjiCard){
    if(m.subTopic)metaParts.push(`<span class="mem-topic">${esc(m.subTopic)}</span>`);
  }else{
    if(m.topicNumber)metaParts.push(`<span class="mem-topic">${esc(m.topicNumber)}</span>`);
    if(m.problemNumber)metaParts.push(`<span style="font-size:12px;color:var(--text2)">問${esc(m.problemNumber)}</span>`);
    if(m.importance)metaParts.push(`<span class="imp-chip imp-${m.importance}">${m.importance}</span>`);
    if(m.subject==='law'&&m.page)metaParts.push(`<span style="font-size:12px;color:var(--text3)">p.${esc(m.page)}</span>`);
  }
  const statusChip=(status==='overdue'||status==='today')?`<span style="font-size:11px;color:${dueColor};margin-left:auto">${status==='overdue'?'要復習':'今日変更'}</span>`:'';
  const recallBtns=[0,1,2,3,4].map(n=>`<button class="recall-btn lvl-${n} ${lv===n?'active':''}" onclick="memFlashSetLevel(${n})"><span class="num">${n}</span><span class="lbl">+${MEM_INTERVALS[n]}日<br>${MEM_LEVEL_LABELS[n]}</span></button>`).join('');
  const prevDis=idx===0?'disabled':'';
  const nextDis=idx===total-1?'disabled':'';
  const answerPart=flipped&&m.answer?`<div class="${isKanjiCard?'mem-flashcard-a-kanji':'mem-flashcard-a'}">${esc(m.answer)}</div>`:'';
  const actionPart=flipped
    ?`<div style="margin-top:6px"><div style="font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500">想起レベルを記録（次の問題へ進みます）</div><div class="recall-btn-row">${recallBtns}</div></div>`
    :`<div style="text-align:center;margin-top:10px"><button class="btn btn-primary" style="padding:11px 32px;font-size:14px" onclick="event.stopPropagation();memFlipCard('${m.id}')">答えを見る</button></div>`;
  return `<div class="mem-flashcard-nav"><button class="btn btn-sm" onclick="memCardNav(-1)" ${prevDis}>◀ 前</button><span style="font-size:13px;color:var(--text2);font-family:'Inter',sans-serif">${idx+1} / ${total}</span><button class="btn btn-sm" onclick="memCardNav(1)" ${nextDis}>次 ▶</button>${statusChip}</div><div class="mem-flashcard" onclick="memFlipCard('${m.id}')"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">${metaParts.join('')}</div><div class="mem-flashcard-q">${esc(m.topicName||'(無題)')}</div>${answerPart}</div>${actionPart}<div style="font-size:11px;color:var(--text3);margin-top:14px;text-align:right">最終チェック: ${memFormatLastChecked(m.lastCheckedAt)} / 次回: <span style="color:${dueColor}">${m.nextDueDate||'-'}</span></div>`;
}
function memFlipCard(id){

  const slot=document.getElementById('mem-flashcard-slot');

function memCardNav(dir){

async function memFlashSetLevel(level){

/* ----- Drag & Drop reorder (PC only) -----
   同一論点番号グループ内でのみドラッグ移動を許可。グループ間移動は無視。
   ドロップ時に該当グループの manualOrder を疎(10刻み)で振り直す。
*/
function memDragStart(ev,id){
  S.memDragId=id;
  // ドラッグ対象を identifies するためにテキストも入れておく（Firefox対策）
  try{ev.dataTransfer.setData('text/plain',id);}catch(e){}
  ev.dataTransfer.effectAllowed='move';
  // 行全体に dragging クラスを付ける
  const row=document.querySelector(`.mem-row[data-id="${id}"]`);
  if(row)row.classList.add('dragging');
}
function memDragEnd(ev){
  S.memDragId=null;
  document.querySelectorAll('.mem-row').forEach(r=>{r.classList.remove('dragging');r.classList.remove('drag-over-above');r.classList.remove('drag-over-below');});
}
function memDragOver(ev){
  if(!S.memDragId)return;
  const row=ev.currentTarget;
  if(!row||!row.classList.contains('mem-row'))return;
  // 同じ科目 + 同じ論点番号 のみ受け入れる（subTopic 違いは許容する。
  //  例: 企業法の "1.機関" 内で 要件/論点/趣旨/判例/条文番号 を混在順序で並べ替え可能にする）
  const dragRow=document.querySelector(`.mem-row[data-id="${S.memDragId}"]`);
  if(!dragRow||dragRow===row)return;
  if(dragRow.dataset.subject!==row.dataset.subject)return;
  if(dragRow.dataset.topic!==row.dataset.topic)return;
  ev.preventDefault();
  ev.dataTransfer.dropEffect='move';
  // 上半分 or 下半分でハイライト切替
  const rect=row.getBoundingClientRect();
  const isAbove=(ev.clientY-rect.top)<rect.height/2;
  // 他の行のハイライトをクリア
  document.querySelectorAll('.mem-row.drag-over-above,.mem-row.drag-over-below').forEach(r=>{if(r!==row){r.classList.remove('drag-over-above');r.classList.remove('drag-over-below');}});
  row.classList.toggle('drag-over-above',isAbove);
  row.classList.toggle('drag-over-below',!isAbove);
}
function memDragLeave(ev){
  const row=ev.currentTarget;
  // 子要素への移動でも leave が発火するので、関連要素が同じ行内ならスキップ
  if(row.contains(ev.relatedTarget))return;
  row.classList.remove('drag-over-above');
  row.classList.remove('drag-over-below');
}
async function memDrop(ev){
  if(!S.memDragId)return;
  ev.preventDefault();
  const targetRow=ev.currentTarget;
  if(!targetRow||!targetRow.classList.contains('mem-row'))return;
  const dragId=S.memDragId;
  const targetId=targetRow.dataset.id;
  if(dragId===targetId){memDragEnd(ev);return;}
  // グループ整合性チェック (科目 + 論点番号 のみ。subTopic 違いは許容)
  const dragRow=document.querySelector(`.mem-row[data-id="${dragId}"]`);
  if(!dragRow||dragRow.dataset.subject!==targetRow.dataset.subject||dragRow.dataset.topic!==targetRow.dataset.topic){memDragEnd(ev);return;}
  const rect=targetRow.getBoundingClientRect();
  const isAbove=(ev.clientY-rect.top)<rect.height/2;
  // 同じ subject + topicNumber のレコードを集め、manualOrder を疎に振り直す
  const all=await dbAll('memorize');
  const subject=dragRow.dataset.subject;
  const topic=dragRow.dataset.topic;
  const group=all.filter(m=>m.subject===subject&&(m.topicNumber||'')===topic);
  // 現在の表示順に sort (manualOrder優先 → 先頭数字 → 問題番号)
  group.sort((a,b)=>{
    const ma=a.manualOrder!=null?a.manualOrder:Number.MAX_SAFE_INTEGER;
    const mb=b.manualOrder!=null?b.manualOrder:Number.MAX_SAFE_INTEGER;
    if(ma!==mb)return ma-mb;
    if(a.subject!=='business'&&b.subject!=='business'){const ha=memTopicHeadNum(a.topicName),hb=memTopicHeadNum(b.topicName);if(ha!==hb)return ha-hb;}
    return memProblemNumCompare(a.problemNumber||'',b.problemNumber||'');
  });
  // ドラッグ元を配列から取り出し、ターゲット位置に挿入
  const dragIdx=group.findIndex(m=>m.id===dragId);
  if(dragIdx<0){memDragEnd(ev);return;}
  const [moved]=group.splice(dragIdx,1);
  let targetIdx=group.findIndex(m=>m.id===targetId);
  if(targetIdx<0){memDragEnd(ev);return;}
  if(!isAbove)targetIdx+=1;
  group.splice(targetIdx,0,moved);
  // manualOrder を疎に振り直して保存
  const today=todayLocal();
  for(let i=0;i<group.length;i++){
    group[i].manualOrder=i*10;
    group[i].updatedAt=today;
    await dbPut('memorize',group[i]);
  }
  memDragEnd(ev);
  renderMemorize();
}
// 現在のフィルタ範囲（科目+subTopic+論点番号）で、各論点番号グループ内の並び順を反転して manualOrder に書き込む。
// 「Notion で下にあるものを上に表示したい」要望に応える機能。

async function qItemDrop(ev){
  if(!S.qDragId)return;
  ev.preventDefault();
  const targetRow=ev.currentTarget;
  if(!targetRow)return;
  const dragId=S.qDragId;
  const targetId=targetRow.dataset.qid;
  if(dragId===targetId){qItemDragEnd(ev);return;}
  const dragRow=document.querySelector(`.note-row[data-qid="${dragId}"]`);
  if(!dragRow||dragRow.dataset.qtopic!==targetRow.dataset.qtopic||dragRow.dataset.qsubj!==targetRow.dataset.qsubj){qItemDragEnd(ev);return;}
  const rect=targetRow.getBoundingClientRect();

  const all=await dbAll('questions');
  const subject=dragRow.dataset.qsubj;

  const siblings=all.filter(q=>q.subjectId===subject&&(q.topicTag||'__untagged__')===topic&&(subject!=='tax'||(q.subTopic||'')===subTopic)).sort((a,b)=>orderVal(a)-orderVal(b));
  const dragIdx=siblings.findIndex(q=>q.id===dragId);
  if(dragIdx<0){qItemDragEnd(ev);return;}
  const [moved]=siblings.splice(dragIdx,1);
  let ti=siblings.findIndex(q=>q.id===targetId);
  if(ti<0){qItemDragEnd(ev);return;}
  if(!isAbove)ti+=1;
  siblings.splice(ti,0,moved);
  for(let i=0;i<siblings.length;i++){siblings[i].order=i*10;await dbPut('questions',siblings[i]);}

async function qTopicDrop(ev){
  if(S.qTopicDragIdx===null)return;

  if(!grp)return;
  const dragIdx=S.qTopicDragIdx;
  const targetIdx=parseInt(grp.dataset.qtidx,10);
  if(isNaN(targetIdx)||dragIdx===targetIdx){qTopicDragEnd(ev);return;}
  const rect=grp.getBoundingClientRect();
  const isAbove=(ev.clientY-rect.top)<rect.height/2;
  const keys=[..._qTopicKeysCache];
  const dragKey=keys[dragIdx];

  if(!dragKey||dragKey==='__untagged__'||targetKey==='__untagged__'){qTopicDragEnd(ev);return;}
  keys.splice(dragIdx,1);

}

// 同じ (subject, subTopic, topicNumber) 内で当該項目を1つ上/下に移動する。
// 並び順は現在のレンダリング順（manualOrder 優先、なければ先頭数字→問題番号）で確定し、
// 移動後に同じグループの全件に manualOrder を 0, 10, 20, ... と振り直す（疎の値で挿入を容易に）。
async function moveMem(id,dir){
  const all=await dbAll('memorize');
  const target=all.find(m=>m.id===id);
  if(!target)return;
  // 同じ科目 + 論点番号 のグループで並び替え (subTopic 違いは許容)
  const same=all.filter(m=>m.subject===target.subject&&(m.topicNumber||'')===(target.topicNumber||''));
  if(same.length<=1){S.viewingMem=target;renderMemDetail();return;}
  // Sort using same logic as the list view
  same.sort((a,b)=>{
    const ma=a.manualOrder!=null?a.manualOrder:Number.MAX_SAFE_INTEGER;
    const mb=b.manualOrder!=null?b.manualOrder:Number.MAX_SAFE_INTEGER;
    if(ma!==mb)return ma-mb;
    if(a.subject!=='business'&&b.subject!=='business'){const ha=memTopicHeadNum(a.topicName),hb=memTopicHeadNum(b.topicName);if(ha!==hb)return ha-hb;}
    return memProblemNumCompare(a.problemNumber||'',b.problemNumber||'');
  });
  const idx=same.findIndex(m=>m.id===id);
  if(idx<0)return;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=same.length)return;
  // Swap in array
  [same[idx],same[newIdx]]=[same[newIdx],same[idx]];
  // Re-assign manualOrder sparsely
  for(let i=0;i<same.length;i++){
    same[i].manualOrder=i*10;
    same[i].updatedAt=todayLocal();
    await dbPut('memorize',same[i]);
  }
  // Refresh viewing reference
  S.viewingMem=same.find(m=>m.id===id);
  renderMemDetail();
}

/* ----- CSV Import (Notion export) ----- */
function parseMemorizeCSV(text){
  // Strip BOM
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const lines=parseCSVRows(text);
  if(!lines.length)return{headers:[],rows:[]};
  const headers=lines[0].map(h=>h.trim());
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const cells=lines[i];
    if(cells.length<2||cells.every(c=>!c.trim()))continue;
    const obj={};
    headers.forEach((h,j)=>{obj[h]=(cells[j]||'').trim();});
    rows.push(obj);
  }
  return{headers,rows};
}
// Robust CSV parser (RFC 4180-ish): handles quoted fields, CRLF, escaped quotes
function parseCSVRows(text){
  const rows=[];let cur=[];let field='';let i=0;let inQuotes=false;
  while(i<text.length){
    const c=text[i];
    if(inQuotes){
      if(c==='"'){
        if(text[i+1]==='"'){field+='"';i+=2;continue;}
        inQuotes=false;i++;continue;
      }
      field+=c;i++;continue;
    }
    if(c==='"'){inQuotes=true;i++;continue;}
    if(c===','){cur.push(field);field='';i++;continue;}
    if(c==='\r'){
      if(text[i+1]==='\n'){i+=2;}else{i++;}
      cur.push(field);rows.push(cur);cur=[];field='';continue;
    }
    if(c==='\n'){cur.push(field);rows.push(cur);cur=[];field='';i++;continue;}
    field+=c;i++;
  }
  if(field.length||cur.length){cur.push(field);rows.push(cur);}
  return rows;
}
// Notion CSV value 1-4 → app level 1-4 (identity mapping)
// Notion 4段階(+3/+7/+14/+30日)とアプリのLv1-4は完全に一致する。
// アプリのLv0(+1日)はNotionに存在しない最下位レベルで、手動で付ける想定。
function notionLevelToApp(v){
  if(v===undefined||v===null||String(v).trim()==='')return null;
  const n=parseInt(v);
  if(n===1)return 1;
  if(n===2)return 2;
  if(n===3)return 3;
  if(n===4)return 4;
  if(n===0)return 0;
  return null;
}
// Parse Notion date string "2026年5月20日 10:57" → ISO with local TZ
function parseNotionDateTime(s){
  if(!s)return null;
  const m=s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日(?:\s+(\d{1,2}):(\d{1,2}))?/);
  if(!m)return null;
  const y=parseInt(m[1]),mo=parseInt(m[2])-1,d=parseInt(m[3]);
  const h=m[4]?parseInt(m[4]):12,mi=m[5]?parseInt(m[5]):0;
  const dt=new Date(y,mo,d,h,mi,0);
  const tz=-dt.getTimezoneOffset();
  const sign=tz>=0?'+':'-';
  const tzH=String(Math.floor(Math.abs(tz)/60)).padStart(2,'0');
  const tzM=String(Math.abs(tz)%60).padStart(2,'0');
  return `${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}T${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}:00${sign}${tzH}:${tzM}`;
}
async function handleMemCSVFile(event){
  const file=event.target.files?.[0];if(!file)return;
  try{
    const text=await file.text();
    const{headers,rows}=parseMemorizeCSV(text);
    if(!rows.length){alert('CSVに有効な行が見つかりません');event.target.value='';return;}
    const format=detectCsvFormat(headers);
    // 租税法フォーマットは「論点」列を使う（「論点名」列不要）
    const needsTopicName=format!=='tax';
    if(needsTopicName&&!headers.includes('論点名')){alert('「論点名」列が見つかりません。Notion からエクスポートした CSV を選択してください。');event.target.value='';return;}
    if(format==='tax'&&!headers.includes('論点')){alert('租税法フォーマットには「論点」列が必要です。');event.target.value='';return;}
    // Detect format from headers and auto-select target subject
    const fmtInfo=CSV_FORMAT_INFO[format];
    const autoSubj=fmtInfo.subject||(S.memFilter&&S.memFilter!=='all'?S.memFilter:'financial');
    const subs=memSubsFor(autoSubj);
    // For 'law' format, subTopic is per-row (種類 column); for others with subs, a global picker
    S.memImport={fileName:file.name,headers,rows,format,subject:autoSubj,subTopic:subs[0]||null,overwrite:false};
    event.target.value='';
    renderMemImportPreview();
  }catch(e){console.error(e);alert('CSV読込エラー: '+(e.message||e));event.target.value='';}
}

    S.memImport.subTopic=subs[0]||null;
    renderMemImportPreview();

}

async function saveMemImport(){
  const p=S.memImport;if(!p)return;
  const existing=await dbAll('memorize');
  const subject=p.format==='tax'?'tax':(p.subject||'financial');
  const subs=memSubsFor(subject);
  const formatAssignsSubTopic=['law','audit','audit2','tax'].includes(p.format);
  // Determine global subTopic when applicable (any subject with subs except formats that assign per-row)
  const globalSubTopic=subs.length&&!formatAssignsSubTopic?(p.subTopic||subs[0]):null;
  // 「ソート」列の有無を検出: スプレッドシート/Notion で並び順を付けた CSV を受け入れる
  const hasSortCol=p.headers.includes('ソート');
  const key=rec=>`${rec.subject}|${rec.subTopic||''}|${(rec.topicName||'').trim()}|${(rec.problemNumber||'').trim()}`;
  // 同一キーが複数ある場合に備えて配列で保持（重複データの掃除のため）
  const existingMap={};existing.forEach(e=>{const k=key(e);if(!existingMap[k])existingMap[k]=[];existingMap[k].push(e);});
  let added=0,updated=0,skipped=0,orderUpdated=0;
  for(let ri=0;ri<p.rows.length;ri++){
    const r=p.rows[ri];
    const fields=applyCsvFormat(r,p.format);
    if(!fields.topicName){skipped++;continue;}
    // subTopic resolution per row:
    //  - law / audit / audit2 → applyCsvFormat が決めた行ごとの subTopic を優先
    //  - その他で subs を持つ科目 → グローバル選択値
    //  - subs を持たない科目 → null
    let subTopic;
    if(fields.subTopic){
      subTopic=fields.subTopic;
    }else if(subs.length){
      subTopic=globalSubTopic;
    }else{
      subTopic=null;
    }
    const recallLevel=notionLevelToApp(r['想起レベル']);
    const impRaw=(r['重要度']||'').trim().toUpperCase();
    // 租税法フォーマット: 「ランク」列を重要度に使う（_rankOverride）
    const rankOverride=fields._rankOverride||null;
    const importance=['A','B','C'].includes(rankOverride)?rankOverride:(['A','B','C'].includes(impRaw)?impRaw:null);
    const lastCheckedAt=parseNotionDateTime(r['最終チェック日']);
    // ソート列の値があれば manualOrder へ反映（× 10 で疎に振る）
    // ない場合は undefined → 既存値があれば保持、なければ未設定のままにする
    let sortManualOrder=undefined;
    if(hasSortCol){
      const sv=(r['ソート']||'').toString().trim();
      if(sv!==''){
        const n=parseFloat(sv);
        if(!isNaN(n))sortManualOrder=Math.round(n*10);
      }
    }
    // ZIP 取込時: 監基法重要度 や 監基報参照表 を Markdown でメモに注入
    let initialMemo='';
    if(p.isZip){
      const parts=[];
      const kibiImportance=(r['監基法重要度']||'').trim();
      if(kibiImportance)parts.push(`> 監基法重要度: **${kibiImportance}**`);
      if(p.zipRefs&&p.zipRefs.has(ri)){
        parts.push('### 監基報参照\n\n'+p.zipRefs.get(ri));
      }
      initialMemo=parts.join('\n\n');
    }
    const newRec={
      subject,subTopic,
      topicName:fields.topicName,
      topicNumber:fields.topicNumber,
      problemNumber:fields.problemNumber,
      answer:fields.answer||'',
      page:fields.page||'',
      recallLevel,importance,lastCheckedAt,
      memo:initialMemo,createdAt:todayLocal(),updatedAt:todayLocal()
    };
    // CSV取込: 想起レベルとlastCheckedAtのどちらも未指定なら未着手扱い（nextDueDate=null）
    if(newRec.lastCheckedAt||(newRec.recallLevel!=null&&newRec.recallLevel!==''))recalcNextDue(newRec);else newRec.nextDueDate=null;
    const k=key(newRec);
    const exList=existingMap[k];
    if(exList&&exList.length){
      if(!p.overwrite){skipped++;continue;}
      // 同一キー重複時は1件目を上書き対象とし、残りは削除（重複データの掃除）
      const ex=exList[0];
      newRec.id=ex.id;
      newRec.createdAt=ex.createdAt||newRec.createdAt;
      if(!initialMemo)newRec.memo=ex.memo||'';
      if(!(fields.answer||'').trim()&&ex.answer)newRec.answer=ex.answer;
      if(!(fields.page||'').trim()&&ex.page)newRec.page=ex.page;
      if(sortManualOrder!=null){
        if(ex.manualOrder!==sortManualOrder)orderUpdated++;
        newRec.manualOrder=sortManualOrder;
      }else if(ex.manualOrder!=null){
        newRec.manualOrder=ex.manualOrder;
      }
      await dbPut('memorize',newRec);updated++;
      // 重複していた2件目以降を削除
      for(let di=1;di<exList.length;di++){await dbDelete('memorize',exList[di].id);}
      // 同一キーを再度参照しないようマップから除去
      delete existingMap[k];
    }else{
      newRec.id=uid();
      // 新規追加時もソート列があれば反映
      if(sortManualOrder!=null){newRec.manualOrder=sortManualOrder;orderUpdated++;}
      await dbPut('memorize',newRec);added++;
    }
  }
  S.memImport=null;document.getElementById('mem-slot').innerHTML='';
  const orderMsg=hasSortCol?` / 並び順反映 ${orderUpdated}件`:'';
  alert(`取込完了: 新規 ${added}件 / 更新 ${updated}件 / スキップ ${skipped}件${orderMsg}`);
  renderMemorize();
}

/* ----- ZIP Import (Notion subpage export) -----
   Notion がエクスポートする ZIP は次の構造をフラットに含む:
   - 「論点洗い出し [hash].csv」: 親テーブル
   - 「[論点名] [hash].md」: 各論点ページの Markdown
   - 「監基報参照 [hash].csv」or「監基報参照 テンプレ [hash].csv」: サブDB CSV
   各論点 .md 内に [監基報参照〜](URL_ENCODED_CSV_NAME) のリンクがあり、これでサブDB を特定。
   さらにネストされた ZIP（"ExportBlock-xxx-Part-1.zip" など）が含まれる場合は自動展開。
*/
async function handleMemZIPFile(event){
  const file=event.target.files?.[0];if(!file)return;
  if(typeof JSZip==='undefined'){alert('JSZip ライブラリの読み込みに失敗しました。ネットワーク接続を確認してください。');event.target.value='';return;}
  try{
    const buf=await file.arrayBuffer();
    let zip=await JSZip.loadAsync(buf);
    // ネストされた .zip があれば自動で展開（Notion はワークスペース全体エクスポート時に二重ZIPを返すことがある）
    const innerZipName=Object.keys(zip.files).find(n=>/\.zip$/i.test(n));
    if(innerZipName&&!zip.files[innerZipName].dir){
      const innerBuf=await zip.files[innerZipName].async('arraybuffer');
      zip=await JSZip.loadAsync(innerBuf);
    }
    // 全ファイルのリストアップ（フォルダ階層も考慮し、ベースネームでアクセスできるよう map 化）
    const files={}; // ベースネーム → ファイル本体
    for(const path of Object.keys(zip.files)){
      const f=zip.files[path];
      if(f.dir)continue;
      const base=path.split('/').pop();
      files[base]=f;
    }
    // 親テーブル CSV を特定: 「論点洗い出し」を含む .csv を優先、なければ最大の .csv
    let parentCsvName=Object.keys(files).find(n=>n.startsWith('論点洗い出し')&&n.endsWith('.csv')&&!n.includes('_all'));
    if(!parentCsvName){
      // フォールバック: _all を含む 論点洗い出し
      parentCsvName=Object.keys(files).find(n=>n.startsWith('論点洗い出し')&&n.endsWith('.csv'));
    }
    if(!parentCsvName){
      // フォールバック: 最も行数が多そうな .csv を選ぶ
      const csvs=Object.keys(files).filter(n=>n.endsWith('.csv')&&!n.startsWith('監基報参照'));
      if(csvs.length){
        let biggest=null,biggestSize=0;
        for(const c of csvs){
          const sz=files[c]._data?.uncompressedSize||0;
          if(sz>biggestSize){biggestSize=sz;biggest=c;}
        }
        parentCsvName=biggest;
      }
    }
    if(!parentCsvName){alert('親テーブル CSV（論点洗い出し...）が見つかりませんでした');event.target.value='';return;}
    const parentCsvText=await files[parentCsvName].async('string');
    const{headers,rows}=parseMemorizeCSV(parentCsvText);
    if(!rows.length){alert('親テーブルに行がありません');event.target.value='';return;}
    let format=detectCsvFormat(headers);
    // 「監基法重要度」列を持つ親テーブルは audit2 と判定（detectCsvFormatでもそうなる）
    // 各論点について、.md → サブCSV の連鎖を辿って監基報参照を抽出
    const refByRow=new Map(); // 親テーブル行のインデックス → 監基報参照 Markdown 表
    for(let i=0;i<rows.length;i++){
      const topicName=(rows[i]['論点名']||'').trim();
      if(!topicName)continue;
      // 対応する .md を探す
      // Notion ファイル名は「[論点名(空白→' ', '.'→' ', '　'→' ')] [hash].md」のような揺れがあるので
      // ascii 化して prefix で照合する（全角空白・記号も半角空白に統一）
      const safeName=topicName.replace(/[\\/:*?"<>|]/g,' ').replace(/\./g,' ').replace(/\u3000/g,' ').replace(/\s+/g,' ').trim();
      const candidateMd=Object.keys(files).find(n=>{
        if(!n.endsWith('.md'))return false;
        // 末尾「 [hash].md」を除いた部分が safeName と前方一致するか
        const stripped=n.replace(/\s+[0-9a-f]{32}\.md$/,'');
        return stripped===safeName||stripped.startsWith(safeName)||safeName.startsWith(stripped);
      });
      if(!candidateMd)continue;
      const mdText=await files[candidateMd].async('string');
      // .md 内の Markdown リンクから 監基報参照 CSV のファイル名を抽出
      // 形式: [監基報参照〜 ](URL_ENCODED_FILENAME)
      const linkMatch=mdText.match(/\[\s*監基報参照[^\]]*\]\(([^)]+)\)/);
      if(!linkMatch)continue;
      let csvPath;
      try{csvPath=decodeURIComponent(linkMatch[1]);}catch(e){csvPath=linkMatch[1];}
      const csvBase=csvPath.split('/').pop();
      const csvFile=files[csvBase];
      if(!csvFile)continue;
      const refText=await csvFile.async('string');
      const ref=parseMemorizeCSV(refText);
      if(!ref.rows.length)continue;
      // Markdown 表に変換
      refByRow.set(i,buildMarkdownTable(ref.headers,ref.rows));
    }
    S.memImport={
      fileName:file.name,headers,rows,format,
      subject:CSV_FORMAT_INFO[format]?.subject||(S.memFilter!=='all'?S.memFilter:'financial'),
      subTopic:null,
      overwrite:false,
      zipRefs:refByRow,
      isZip:true
    };
    event.target.value='';
    renderMemImportPreview();
  }catch(e){console.error(e);alert('ZIP 読込エラー: '+(e.message||e));event.target.value='';}
}
// CSV ヘッダ・行配列を Markdown 表へ変換
function buildMarkdownTable(headers,rows){
  if(!headers.length||!rows.length)return'';
  const head='| '+headers.map(h=>h.replace(/\|/g,'\\|')).join(' | ')+' |';
  const sep='|'+headers.map(()=>'---').join('|')+'|';
  const body=rows.map(r=>'| '+headers.map(h=>(r[h]||'').replace(/\|/g,'\\|').replace(/\n/g,' ')).join(' | ')+' |').join('\n');
  return head+'\n'+sep+'\n'+body;
}

/* ===== 計算 (計算問題管理) =====
   暗記タブと並列の機能。想起レベル/間隔反復は使わない。
   - 各計算問題ごとに ○/×/△ の履歴を全件残す
   - 関連する学習問題（questions ストア）に複数リンク可能
   - 対象科目: 財務会計論 / 管理会計論 / 租税法(税目あり) / 経営学
*/
const CALC_RESULTS={'o':'○','x':'✕','t':'△'}; // t = 三角 (キーは英字)
function calcResultLabel(r){return CALC_RESULTS[r]||'-';}
function calcResultClass(r){return r==='o'?'o':r==='x'?'x':r==='t'?'t':'';}
function calcLastUpdated(rec){
  if(rec.history&&rec.history.length){return rec.history[rec.history.length-1].at;}
  return rec.updatedAt||null;
}
// 問題番号の自然順比較: "1-1", "1-2", ..., "1-10", "1-11", ..., "2-1" の順に正しく並ぶ
// ハイフン・スラッシュ・空白等で区切り、各セグメント内の数字を抽出して比較する。
// "第10回" のように数字+漢字が混在する場合も、内部の数字 (10) で比較するためのプリフィクス文字も保持。
function calcProblemNumCompare(a,b){
  // 全角数字→半角に正規化してから比較
  const norm=s=>String(s||'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  // 各セグメントを (テキストプリフィクス, 数値, テキストサフィクス) に分解
  // 例: "第10回" → {prefix:"第", num:10, suffix:"回"} / "1-10" → 分割後 "1"→{num:1}, "10"→{num:10}
  const tokenize=s=>norm(s).split(/[-_/\s.]+/).filter(x=>x.length).map(seg=>{
    const m=seg.match(/^([^0-9]*)(\d+)?(.*)$/);
    if(!m)return {prefix:seg,num:null,suffix:''};
    return {prefix:m[1]||'',num:m[2]!=null?parseInt(m[2]):null,suffix:m[3]||''};
  });
  const pa=tokenize(a),pb=tokenize(b);
  if(!pa.length&&!pb.length)return 0;
  if(!pa.length)return 1;
  if(!pb.length)return-1;
  for(let i=0;i<Math.max(pa.length,pb.length);i++){
    const x=pa[i],y=pb[i];
    if(x===undefined)return-1;
    if(y===undefined)return 1;
    // 同じプリフィクス同士なら数値比較、違うプリフィクスは文字列比較
    if(x.prefix!==y.prefix)return x.prefix.localeCompare(y.prefix);
    if(x.num!=null&&y.num!=null){if(x.num!==y.num)return x.num-y.num;}
    else if(x.num!=null)return-1;
    else if(y.num!=null)return 1;
    if(x.suffix!==y.suffix)return x.suffix.localeCompare(y.suffix);
  }
  return 0;
}
function calcFormatTimestamp(iso){
  if(!iso)return'-';
  const d=new Date(iso);if(isNaN(d.getTime()))return iso;
  const y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0');
  const hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0');
  return `${y}-${mo}-${da} ${hh}:${mm}`;
}

}
function calcRowHTML(c){
  const hist=(c.history||[]).slice(-5).map(h=>`<span class="calc-result-chip calc-result-${calcResultClass(h.result)}" title="${esc(calcFormatTimestamp(h.at))}">${calcResultLabel(h.result)}</span>`).join('');
  const histCell=c.history&&c.history.length?`<div class="calc-hist-row">${hist}${c.history.length>5?`<span style="color:var(--text3);font-size:11px;margin-left:4px">+${c.history.length-5}</span>`:''}</div>`:`<span style="color:var(--text3);font-size:11px">未試行</span>`;
  const last=calcLastUpdated(c);
  const lastCell=last?calcFormatTimestamp(last):'<span style="color:var(--text3);font-size:11px">-</span>';
  const relCnt=(c.relatedQuestionIds||[]).length;
  const impChip=c.importance?`<span class="imp-chip imp-${c.importance}">${c.importance}</span>`:'<span style="color:var(--text3);font-size:11px">-</span>';
  return `<tr class="calc-row" data-id="${c.id}" onclick="openCalc('${c.id}')"><td class="mem-pnum">${esc(c.problemNumber||'-')}</td><td>${esc(c.topicName||'(無題)')}</td><td>${impChip}</td><td>${histCell}</td><td class="mem-pnum" style="font-family:'Inter',sans-serif">${esc(c.timeRequired||'-')}</td><td class="mem-pnum">${relCnt>0?`<span style="color:var(--blue)">🔗${relCnt}</span>`:'<span style="color:var(--text3)">-</span>'}</td><td class="mem-pnum">${lastCell}</td></tr>`;
}

    :`<div class="md" style="font-size:13px">${c.memo?renderMd(c.memo):`<span style="color:var(--text3)">（メモなし）</span>`}</div><button class="btn btn-sm" style="margin-top:8px" onclick="startCalcMemoEdit()">${c.memo?'メモを編集':'メモを追加'}</button>`;
  slot.innerHTML=`<div class="reader-overlay" onclick="if(event.target===this)closeCalc()"><div class="reader-modal" onclick="event.stopPropagation()"><div class="reader-header"><div class="reader-meta"><span class="badge b-${c.subject||'new'}">${esc(subjName)}</span>${c.subTopic?`<span style="font-size:11px;color:var(--text3);margin-left:6px">${esc(c.subTopic)}</span>`:''}${c.problemNumber?`<span style="font-size:11px;color:var(--text3);margin-left:6px">問題 ${esc(c.problemNumber)}</span>`:''}</div><div class="reader-actions"><button class="btn btn-sm" onclick="editCalc('${c.id}')">編集</button><button class="btn btn-sm btn-danger" onclick="deleteCalc('${c.id}')">削除</button><button class="btn btn-sm" onclick="closeCalc()">✕ 閉じる</button></div></div><div class="reader-content"><h1 class="reader-title" style="font-size:18px;margin-bottom:6px">${esc(c.topicName||'(無題)')}</h1><div style="font-size:13px;color:var(--text2);margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap"><span style="display:inline-flex;align-items:center;gap:4px">重要度: <select onchange="updateCalcField('importance',this.value||null)" style="padding:2px 6px;font-size:12px;border:1px solid var(--border2);border-radius:4px;background:var(--card)"><option value="" ${!c.importance?'selected':''}>なし</option>${['A','B','C+','C'].map(i=>`<option value="${i}" ${c.importance===i?'selected':''}>${i}</option>`).join('')}</select></span><span style="display:inline-flex;align-items:center;gap:4px">所要時間: <input type="text" value="${esc(c.timeRequired||'')}" placeholder="例: 25分" onchange="updateCalcField('timeRequired',this.value)" style="width:90px;padding:2px 6px;font-size:12px;border:1px solid var(--border2);border-radius:4px;background:var(--card)"></span>${c.history?.length?`<span>試行回数: <b style="color:var(--text)">${c.history.length}回</b></span>`:''}</div><div style="margin-bottom:18px"><div style="font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500">結果を記録 (履歴に追加)</div><div style="display:flex;gap:6px">${resultBtns}</div><div style="font-size:11px;color:var(--text3);margin-top:6px">クリックすると履歴に新しい試行が追加されます (過去の履歴は消えません)</div></div><div style="margin-bottom:18px"><div style="font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500">履歴 (${c.history?.length||0}件)</div><div class="calc-hist-full">${histFull}</div></div><div style="margin-bottom:18px"><div style="font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;display:flex;align-items:center;justify-content:space-between">関連する学習問題 (${related.length}件)<button class="btn btn-sm" style="font-size:11px" onclick="editCalc('${c.id}')">編集で変更</button></div>${relatedHTML}</div><div><div style="font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500">メモ</div>${memoHTML}</div></div></div></div>`;

async function updateCalcField(field, value){
  const c=S.viewingCalc;if(!c)return;
  if(field==='importance')c.importance=value||null;
  else if(field==='timeRequired')c.timeRequired=(value||'').trim();
  else return;
  c.updatedAt=todayLocal();
  await dbPut('calc',c);
  S.viewingCalc=c;
  renderCalcDetail();
}
async function addCalcResult(result){
  const c=S.viewingCalc;if(!c)return;
  c.history=c.history||[];
  c.history.push({result,at:new Date().toISOString()});
  c.updatedAt=todayLocal();
  await dbPut('calc',c);
  S.viewingCalc=c;
  renderCalcDetail();
  // 予定タブ・ダッシュボードを開いていれば自動カウントを反映
  if(S.view==='plan')renderPlan();
  else if(S.view==='dashboard')renderDashboard();
}
async function removeCalcResult(idx){
  const c=S.viewingCalc;if(!c||!c.history||idx<0||idx>=c.history.length)return;
  if(!confirm('この履歴を削除しますか?'))return;
  c.history.splice(idx,1);
  c.updatedAt=todayLocal();
  await dbPut('calc',c);
  S.viewingCalc=c;
  renderCalcDetail();
  if(S.view==='plan')renderPlan();
  else if(S.view==='dashboard')renderDashboard();
}
function goToQuestionFromCalc(qid){
  // 計算詳細から学習問題への遷移: 編集ではなく閲覧モーダルで表示
  closeCalc();
  openQViewer(qid);
}
function startCalcMemoEdit(){S.calcMemoEditing=true;renderCalcDetail();}
function cancelCalcMemoEdit(){S.calcMemoEditing=false;renderCalcDetail();}
function updateCalcMemoPreview(){updateMdPreview('calc-memo','calc-memo-preview');}

function toggleCalcQRelated(qid){
  if(!S.editingCalc)return;
  const arr=S.editingCalc.relatedQuestionIds||[];
  const i=arr.indexOf(qid);
  if(i>=0)arr.splice(i,1);else arr.push(qid);
  S.editingCalc.relatedQuestionIds=arr;
  renderCalcEditForm();
}

  const rec={

// ===== 計算 CSV インポート =====
// CSV カラム: 問題番号 (必須), 論点 (必須), 所要時間 (任意), 科目 (任意・省略時は現在のフィルタ), 税目 (科目=租税法のとき任意)
async function handleCalcCSVFile(ev){
  const file=ev.target.files?.[0];if(!file)return;
  ev.target.value='';
  try{
    let text=await file.text();
    // BOM除去
    if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
    const rawRows=parseCSVRows(text);
    if(rawRows.length<2){alert('CSVに有効な行がありません');return;}
    const headers=rawRows[0].map(h=>h.trim());
    const dataRows=rawRows.slice(1).map(r=>{
      const obj={};
      for(let i=0;i<headers.length;i++)obj[headers[i]]=(r[i]||'').trim();
      return obj;
    });
    // 必須カラムチェック
    if(!headers.includes('問題番号')||!headers.includes('論点')){
      alert('CSVに「問題番号」「論点」の列が必要です\n検出ヘッダ: '+headers.join(', '));return;
    }
    // 行を正規化
    const subjMap={'財務会計論':'financial','管理会計論':'managerial','租税法':'tax','経営学':'business'};
    const rows=[];
    for(const r of dataRows){
      const pnum=(r['問題番号']||'').trim();
      const topic=(r['論点']||'').trim();
      if(!pnum&&!topic)continue;
      if(!pnum||!topic)continue;
      let subject=S.calcFilter;
      const subjCsv=(r['科目']||'').trim();
      if(subjCsv){
        if(subjMap[subjCsv])subject=subjMap[subjCsv];
        else continue;
      }
      if(!CALC_SUBJECTS.includes(subject))continue;
      let subTopic=null;
      if(subject==='tax'){
        const taxCsv=(r['税目']||'').trim();
        subTopic=TAX_SUBS.includes(taxCsv)?taxCsv:S.calcTaxSub||'法人税';
      }
      rows.push({
        subject,subTopic,
        problemNumber:pnum,
        topicName:topic,
        timeRequired:(r['所要時間']||'').trim(),
        importance:(r['ランク']||r['重要度']||'').trim().toUpperCase()||null
      });
    }
    if(!rows.length){alert('取り込める行がありません');return;}
    const all=await dbAll('calc');
    const keyOf=r=>`${r.subject}|${r.subTopic||''}|${r.problemNumber}`;
    const existing={};all.forEach(c=>{existing[keyOf(c)]=c;});
    let newCnt=0,overwriteCnt=0;
    for(const r of rows){if(existing[keyOf(r)])overwriteCnt++;else newCnt++;}
    S.calcImport={rows,newCnt,overwriteCnt,overwrite:false,filename:file.name};
    renderCalcImportPreview();
  }catch(err){alert('CSV読み込みエラー: '+err.message);}
}
function renderCalcImportPreview(){
  const slot=document.getElementById('calc-slot');
  const p=S.calcImport;if(!p){slot.innerHTML='';return;}
  const previewRows=p.rows.slice(0,15).map(r=>{
    const subjName=SUBJECTS.find(s=>s.id===r.subject)?.name||r.subject;
    return `<tr><td class="mem-pnum">${esc(subjName)}${r.subTopic?` <span style="color:var(--text3)">/ ${esc(r.subTopic)}</span>`:''}</td><td class="mem-pnum">${esc(r.problemNumber)}</td><td>${esc(r.topicName)}</td><td class="mem-pnum">${r.importance?`<span class="imp-chip imp-${r.importance}">${r.importance}</span>`:'<span style="color:var(--text3)">-</span>'}</td><td class="mem-pnum">${esc(r.timeRequired||'-')}</td></tr>`;
  }).join('');

async function saveCalcImport(){

  const all=await dbAll('calc');
  const keyOf=r=>`${r.subject}|${r.subTopic||''}|${r.problemNumber}`;
  const existing={};all.forEach(c=>{existing[keyOf(c)]=c;});
  let added=0,updated=0,skipped=0;

// ===== 予定タブ（月→週→日 カスケード） =====
// データ:
//   planMonthGoals:YYYY-MM             → {subjId: {calc,theoryKeep,theoryPages,lecture}}
//   planWeekOverride:YYYY-MM-DD(月):sid → {calc?,theoryPages?,lecture?}（編集された値のみ）
//   planDayOverride:YYYY-MM-DD:sid     → 同上
//   planSpotTasks                       → 既存（模試など）
//   planChecks:YYYY-MM-DD               → 当日チェック状態（深夜3時リセット）

const PLAN_CALC_SUBJECTS = new Set(['financial','managerial','tax','business']);
const PLAN_CATS = ['calc','theoryPages','lecture'];
const PLAN_CAT_LABELS = {calc:'計算',theoryPages:'回転',lecture:'講義'};
const PLAN_CAT_UNITS  = {calc:'問',theoryPages:'p',lecture:'回'};

// --- 日付ヘルパ（月曜始まり） ---
function planYMD(d){return ymdLocal(d);}
function planParseYMD(s){return new Date(s+'T00:00:00');}
function planWeekMonday(date){
  // dateを含む週の月曜日(YYYY-MM-DD)
  const d=new Date(date.getTime());
  const dow=d.getDay(); // 0=Sun,1=Mon
  const diff = dow===0 ? -6 : (1-dow);
  d.setDate(d.getDate()+diff);
  return planYMD(d);
}
function planMonthOf(date){const y=date.getFullYear(),m=String(date.getMonth()+1).padStart(2,'0');return `${y}-${m}`;}
function planMondaysInMonth(yyyyMM){
  // yyyy-MM の範囲にかかる「月曜日」の数（4 or 5）
  const [y,m]=yyyyMM.split('-').map(Number);
  const first=new Date(y,m-1,1), last=new Date(y,m,0);
  let count=0;
  for(let d=new Date(first.getTime()); d<=last; d.setDate(d.getDate()+1)){
    if(d.getDay()===1)count++;
  }
  return Math.max(1,count);
}
function planWeekDaysRemaining(targetYMD){
  // targetYMD(YYYY-MM-DD)を含む週で、targetから日曜まで何日あるか（target含む）
  const d=planParseYMD(targetYMD);
  const dow=d.getDay();
  // 月=1...日=0。日曜まで: 日=0→1, 月=1→7, 火=2→6, ..., 土=6→2
  return dow===0 ? 1 : (8-dow);
}
