// --- カスケード計算（新ロジック：有効日数ベース）---
// 有効日 = カテゴリの期間内かつ許可曜日内
// 1日あたり = ceil(月目標 / 月内有効日数)
// 週値 = 週内有効日数 × 1日あたり
function planIsValidDayForCat(ymd, g, cat){
  // 期間チェック
  const start = g[cat+'Start'];
  const end = g[cat+'End'];
  if(start && ymd < start) return false;
  if(end && ymd > end) return false;
  // 曜日チェック
  const allowedDays = g[cat+'Days'];
  if(allowedDays && Array.isArray(allowedDays) && allowedDays.length>0 && allowedDays.length<7){
    const dow = planParseYMD(ymd).getDay();
    if(!allowedDays.includes(dow)) return false;
  }
  return true;
}
function planCountValidDaysInMonth(yyyyMM, g, cat){
  const [y,m]=yyyyMM.split('-').map(Number);
  const last = new Date(y,m,0).getDate();
  let count = 0;
  for(let day=1; day<=last; day++){
    const dateStr = `${yyyyMM}-${String(day).padStart(2,'0')}`;
    if(planIsValidDayForCat(dateStr, g, cat)) count++;
  }
  return count;
}
function planPerValidDay(yyyyMM, g, cat){
  const total = g[cat] || 0;
  if(!total) return 0;
  const validDays = planCountValidDaysInMonth(yyyyMM, g, cat);
  if(!validDays) return 0;
  return Math.ceil(total / validDays);
}
// 週値: 上書きがあれば優先、なければ週内7日の planComputeDayValue を合計
// (新ロジック・模試半減・dayOverride を自動反映)
async function planComputeWeekValue(weekMonYMD,sid,cat){
  const wOv=await planGetWeekOverride(weekMonYMD,sid);
  if(wOv[cat]!=null)return {value:wOv[cat],overridden:true};
  const start = planParseYMD(weekMonYMD);
  let total = 0;
  for(let i=0; i<7; i++){
    const d = new Date(start.getTime());
    d.setDate(d.getDate()+i);
    const r = await planComputeDayValue(planYMD(d), sid, cat);
    total += r.value;
  }
  return {value: total, overridden:false};
}

// --- 月進捗 ---
async function planGetProgress(yyyyMM, sid){
  return (await getSetting(`planProgress:${yyyyMM}:${sid}`))||{};
}
async function planSetProgress(yyyyMM, sid, prog){
  if(!prog||!Object.keys(prog).length){await delSetting(`planProgress:${yyyyMM}:${sid}`);return;}
  await setSetting(`planProgress:${yyyyMM}:${sid}`, prog);
}
async function planAddProgress(yyyyMM, sid, deltas){
  const p = await planGetProgress(yyyyMM, sid);
  for(const cat of PLAN_CATS){
    if(deltas[cat]){
      p[cat] = Math.max(0, (p[cat]||0) + deltas[cat]);
      if(p[cat] === 0) delete p[cat];
    }
  }
  await planSetProgress(yyyyMM, sid, p);
}
// 科目day-task用トグル（進捗加減算込み）
// 計算カテゴリは履歴ベースの自動カウントで反映されるため、planProgress には加算しない
async function togglePlanDayCheck(sid, checked, calcV, theoryV, lectureV){
  const today = effectiveTodayLocal();
  const yyyyMM = planMonthOf(planParseYMD(today));
  const c = (await getSetting('planChecks:'+today))||{};
  if(checked){
    // committed には UI表示の整合のため calcV も保存するが、加算対象は theoryPages/lecture のみ
    c['day_'+sid] = {committed:{calc:calcV||0, theoryPages:theoryV||0, lecture:lectureV||0}};
    await planAddProgress(yyyyMM, sid, {theoryPages:theoryV||0, lecture:lectureV||0});
  }else{
    const prev = c['day_'+sid];
    if(prev && prev.committed){
      const neg = {};
      for(const cat of PLAN_CATS){
        if(cat === 'calc') continue; // 加算してないので巻き戻し不要
        neg[cat] = -(prev.committed[cat]||0);
      }
      await planAddProgress(yyyyMM, sid, neg);
    }
    delete c['day_'+sid];
  }
  await setSetting('planChecks:'+today, c);
  renderPlan();
}

// --- 計算問題の自動カウント (履歴ベース) ---
// 履歴 h.at (ISO) を深夜3時境界で日付化
function calcEffectiveYmdFromIso(iso){
  if(!iso)return null;
  const d = new Date(iso);
  if(isNaN(d.getTime()))return null;
  if(d.getHours()<3) d.setDate(d.getDate()-1);
  return ymdLocal(d);
}
// 指定日(深夜3時ベース)に該当科目で履歴追加されたユニーク問題数
async function getCalcAutoCountForDay(ymd, sid){
  const all = await dbAll('calc');
  let count = 0;
  for(const c of all){
    if(c.subject !== sid) continue;
    if(!c.history || !c.history.length) continue;
    const hasOnDay = c.history.some(h => calcEffectiveYmdFromIso(h.at) === ymd);
    if(hasOnDay) count++;
  }
  return count;
}
// 指定月内の untilYmd(含む) までに該当科目で「日ごとのユニーク問題数」を合計
// (同じ問題を同日に2回 → 1カウント、同じ問題を別日に → 各日でカウント)
async function getCalcAutoCountInMonth(yyyyMM, sid, untilYmd){
  const all = await dbAll('calc');
  let total = 0;
  for(const c of all){
    if(c.subject !== sid) continue;
    if(!c.history || !c.history.length) continue;
    const daysTouched = new Set();
    for(const h of c.history){
      const ymd = calcEffectiveYmdFromIso(h.at);
      if(!ymd) continue;
      if(ymd.slice(0,7) !== yyyyMM) continue;
      if(untilYmd && ymd > untilYmd) continue;
      daysTouched.add(ymd);
    }
    total += daysTouched.size;
  }
  return total;
}

// 今日時点の進捗(手動補正+自動カウント)を計算 (baseline未確定時のみ呼ばれる)
async function planComputeUsedAsOfToday(yyyyMM, sid, cat, today){
  const progress = await planGetProgress(yyyyMM, sid);
  let used = (progress[cat]||0);
  if(cat === 'calc'){
    // 計算は履歴から自動カウント (今月の今日含む過去分)
    used += await getCalcAutoCountInMonth(yyyyMM, sid, today);
  }
  return used;
}
// 「今日時点の残り目標」の基準となる used 値を日付が変わるまで固定する
// (深夜3時境界=todayが変わるまでは、今日中に何問解いても翌日以降の配分に即反映させない)
async function planGetTodayBaseline(today, yyyyMM, sid, cat){
  const key = `planBaseline:${today}:${sid}:${cat}`;
  let v = await getSetting(key);
  if(v==null){
    v = await planComputeUsedAsOfToday(yyyyMM, sid, cat, today);
    await setSetting(key, v);
  }
  return v;
}
// 日値: 上書き優先、なければ有効日なら perValidDay、無効日なら0
// 今月の今日以降は「今日開始時点(baseline)の残り目標 ÷ 今日以降の残り有効日数」を全日同じ値で適用
// (baselineは日付が変わるまで固定。今日中の進捗は翌日の再配分まで反映されない)
// 過去日 / 次月以降は その月の planPerValidDay (= ceil(月目標 / 月内有効日数))
async function planComputeDayValue(ymd,sid,cat){
  const dOv=await planGetDayOverride(ymd,sid);
  if(dOv[cat]!=null)return {value:dOv[cat],overridden:true};
  const yyyyMM=planMonthOf(planParseYMD(ymd));
  const monthGoals=await planGetMonthGoals(yyyyMM);
  const g = monthGoals[sid] || {};
  if(!g[cat]) return {value:0,overridden:false};
  if(!planIsValidDayForCat(ymd, g, cat)) return {value:0,overridden:false};
  const today = effectiveTodayLocal();
  const todayMonth = planMonthOf(planParseYMD(today));
  let perDay, halvedForMock = false;
  if(yyyyMM === todayMonth && ymd >= today){
    const used = await planGetTodayBaseline(today, yyyyMM, sid, cat);
    const remaining = Math.max(0, g[cat] - used);
    const validYmds = [];
    {
      const [y,m]=yyyyMM.split('-').map(Number);
      const last = new Date(y,m,0).getDate();
      const fromDay = parseInt(today.slice(-2));
      for(let day=fromDay; day<=last; day++){
        const d = `${yyyyMM}-${String(day).padStart(2,'0')}`;
        if(planIsValidDayForCat(d, g, cat)) validYmds.push(d);
      }
    }
    if(validYmds.length === 0){
      perDay = 0;
    } else {
      const basePerDay = Math.ceil(remaining / validYmds.length);
      const spots = (cat==='calc') ? ((await getSetting('planSpotTasks'))||[]) : [];
      const isMock = d => cat==='calc' && spots.some(t=>t.date===d);
      // 模試日(半減日)以外の最終有効日に端数を寄せる(半減で減った分を他日で埋め合わせないよう、模試日以外で吸収)
      let absorbYmd = null;
      for(let i=validYmds.length-1;i>=0;i--){
        if(!isMock(validYmds[i])){ absorbYmd = validYmds[i]; break; }
      }
      if(absorbYmd===null) absorbYmd = validYmds[validYmds.length-1];
      let sumOthers = 0;
      for(const d of validYmds){
        if(d===absorbYmd) continue;
        sumOthers += isMock(d) ? Math.floor(basePerDay/2) : basePerDay;
      }
      if(ymd === absorbYmd && validYmds.length > 1){
        perDay = Math.max(0, remaining - sumOthers);
      } else {
        perDay = isMock(ymd) ? Math.floor(basePerDay/2) : basePerDay;
        if(isMock(ymd)) halvedForMock = true;
      }
    }
  } else {
    // 過去日 or 次月以降: 月全体の素直な配分
    perDay = planPerValidDay(yyyyMM, g, cat);
    if(cat==='calc' && perDay>0){
      const spots=(await getSetting('planSpotTasks'))||[];
      if(spots.some(t=>t.date===ymd)){
        const before = perDay;
        perDay = Math.floor(perDay/2);
        if(perDay !== before) halvedForMock = true;
      }
    }
  }
  return {value: perDay, overridden:false, halvedForMock};
}

      const r=await planComputeDayValue(today,subj.id,'calc');

    const rl=await planComputeDayValue(today,subj.id,'lecture');

  let html=`<div class="card" style="margin-bottom:14px">

      const manuallyChecked = !!checks[a.key];
      const isChecked = manuallyChecked || a.autoChecked;
      const checkedAttr = isChecked?'checked':'';
      const disabledAttr = a.autoChecked?'disabled':'';
      const autoMark = a.autoChecked?'<span class="plan-tag" style="background:var(--green-bg,#dcfce7);color:var(--green,#15803d);margin-left:4px">自動完了</span>':'';
      return `<div class="plan-todo ${isChecked?'plan-done':''}"><label><input type="checkbox" ${checkedAttr} ${disabledAttr} onchange="togglePlanCheck('${a.key}',this.checked)"><span class="plan-todo-label" onclick="${a.onclick};event.stopPropagation()">${esc(a.label)}</span></label><span class="plan-tag" style="background:var(--blue-bg);color:var(--blue)">自動</span>${autoMark}</div>`;
    }).join('');
  }
  // 日目標
  if(dayRows.length){
    dayRows.forEach(r=>{
      const k='day_'+r.subj.id;
      const committed = checks[k];
      const isChecked = !!committed;
      const cv = (committed && committed.committed) || {};
      const inputs = r.cats.map(c=>{
        const def = isChecked ? (cv[c.cat]||0) : c.value;
        let mark='';
        if(c.overridden)mark='<span style="color:var(--amber,#a16207);font-size:10px;margin-left:2px">編集済</span>';
        else if(c.halvedForMock)mark='<span style="color:var(--purple,#7c3aed);font-size:10px;margin-left:2px" title="模試の日のため半減">模試日</span>';
        if(c.cat === 'calc'){
          // 計算は履歴から自動カウント。入力欄は表示のみ
          const auto = r.calcAutoToday||0;
          const autoColor = auto>=c.value ? 'var(--green,#15803d)' : 'var(--text2)';
          return `<span class="plan-day-cat">${PLAN_CAT_LABELS[c.cat]}<input type="number" min="0" id="day-${r.subj.id}-${c.cat}" value="${def}" class="plan-day-input" disabled title="計算は履歴から自動カウント (○△×の記録で更新)">${PLAN_CAT_UNITS[c.cat]}<span style="font-size:11px;color:${autoColor};margin-left:4px;font-weight:500" title="今日記録された○△×のユニーク問題数">(今日${auto})</span>${mark}</span>`;
        }
        return `<span class="plan-day-cat">${PLAN_CAT_LABELS[c.cat]}<input type="number" min="0" id="day-${r.subj.id}-${c.cat}" value="${def}" class="plan-day-input" ${isChecked?'disabled':''}>${PLAN_CAT_UNITS[c.cat]}${mark}</span>`;
      }).join('');
      html+=`<div class="plan-todo ${isChecked?'plan-done':''}"><label><input type="checkbox" ${isChecked?'checked':''} onchange="commitDayCheckCustom('${r.subj.id}',this.checked)"><span class="plan-todo-label"><span class="badge b-${r.subj.id}" style="font-size:10px;margin-right:6px">${esc(r.subj.name)}</span>${inputs}</span></label></div>`;
    });
  }
  // 今日のスポット
  todaySpots.forEach(t=>{
    const k='spot_'+t.id;const checked=checks[k]?'checked':'';
    html+=`<div class="plan-todo ${checked?'plan-done':''}"><label><input type="checkbox" ${checked} onchange="togglePlanCheck('${k}',this.checked)"><span class="plan-todo-label">${esc(t.title||'(無題)')}</span></label><span class="badge b-${t.subject||'financial'}" style="font-size:10px">${esc(sName(t.subject))}</span><span class="plan-tag" style="background:var(--amber-bg,#fef3c7);color:var(--amber,#a16207)">スポット</span></div>`;
  });
  if(!autoItems.length&&!dayRows.length&&!todaySpots.length){
    html+='<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">今日のタスクはありません。月ビューで目標を設定してください。</div>';
  }
  // 手動で実績を追加するボタン
  html+=`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);text-align:center"><button class="btn btn-sm" onclick="openManualProgress()" title="予定外でやった分を月進捗に加算">+ 実績を手動で追加</button></div>`;
  html+='</div>';
  // スポット一覧（折りたたみ可能）
  const allSpots=spotTasks.slice().sort((a,b)=>a.date.localeCompare(b.date));
  const isSpotsOpen = !!S.planSpotsOpen;
  const futureSpots = allSpots.filter(t=>t.date>=today);
  const headerTxt = `スポット予定 ${futureSpots.length>0?`(今後 ${futureSpots.length}件 / 全${allSpots.length}件)`:`(全${allSpots.length}件)`}`;
  let spotBody = '';
  if(isSpotsOpen){
    const spotListHTML=allSpots.length?allSpots.map(t=>{
      const past=t.date<today?'opacity:0.5':'';
      return `<div class="plan-list-row" style="${past}"><span class="mem-pnum" style="min-width:90px">${esc(formatDateWithDow(t.date))}</span><span class="badge b-${t.subject||'financial'}" style="font-size:10px">${esc(sName(t.subject))}</span><span style="flex:1">${esc(t.title||'(無題)')}</span><button class="btn btn-sm" onclick="editSpotTask('${t.id}')">編集</button><button class="btn btn-sm" onclick="deleteSpotTask('${t.id}')">削除</button></div>`;
    }).join(''):'<div style="padding:18px;text-align:center;color:var(--text3);font-size:13px">スポット予定はまだありません</div>';
    spotBody = `<div style="display:flex;justify-content:flex-end;gap:6px;margin-bottom:8px"><button class="btn btn-sm" onclick="openSpotBulk()">一括追加</button><button class="btn btn-sm btn-primary" onclick="addSpotTask()">+ 追加</button></div><div class="card" style="padding:6px">${spotListHTML}</div>`;
  }
  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;cursor:pointer;user-select:none" onclick="toggleSpotsOpen()"><div style="font-size:14px;font-weight:500"><span style="display:inline-block;width:14px">${isSpotsOpen?'▼':'▶'}</span> ${esc(headerTxt)}</div></div>${spotBody}`;
  return html;
}
function toggleSpotsOpen(){S.planSpotsOpen=!S.planSpotsOpen;renderPlan();}

// 予定外の実績を手動で月進捗に加算するモーダル
function openManualProgress(){
  S.planManualProgress={subject:'',cat:'calc',value:''};
  renderManualProgressModal();
}
function renderManualProgressModal(){
  const p=S.planManualProgress;if(!p){document.getElementById('mem-slot').innerHTML='';return;}
  const subjOpts=SUBJECTS.map(s=>`<option value="${s.id}" ${p.subject===s.id?'selected':''}>${esc(s.name)}</option>`).join('');
  const isCalcAvail=PLAN_CALC_SUBJECTS.has(p.subject);
  const catOpts=[
    {v:'calc',label:'計算（問）',avail:isCalcAvail},
    {v:'theoryPages',label:'理論回転（p）',avail:true},
    {v:'lecture',label:'講義（回）',avail:true}
  ];
  const catSel=catOpts.map(o=>`<option value="${o.v}" ${p.cat===o.v?'selected':''} ${o.avail?'':'disabled'}>${esc(o.label)}${o.avail?'':' (対象外)'}</option>`).join('');
  const unitMap={calc:'問',theoryPages:'p',lecture:'回'};
  document.getElementById('mem-slot').innerHTML=`<div class="reader-overlay" onclick="if(event.target===this)closeManualProgress()"><div class="reader-modal" style="max-width:480px" onclick="event.stopPropagation()">
    <div class="reader-header"><div class="reader-meta"><span style="font-size:14px;font-weight:500">実績を月進捗に加算</span></div><div class="reader-actions"><button class="btn btn-sm btn-primary" onclick="saveManualProgress()">加算する</button><button class="btn btn-sm" onclick="closeManualProgress()">キャンセル</button></div></div>
    <div class="reader-content">
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px">予定外でやった分を月の進捗にプラスします。月目標が無くても加算可能。</div>
      <div class="form-group"><label>科目</label><select onchange="setManualProgressField('subject',this.value)" style="width:100%;padding:6px"><option value="" ${!p.subject?'selected':''}>選択してください</option>${subjOpts}</select></div>
      <div class="form-group"><label>カテゴリ</label><select onchange="setManualProgressField('cat',this.value)" style="width:100%;padding:6px">${catSel}</select></div>
      <div class="form-group"><label>数量（${unitMap[p.cat]||''}）</label><input type="number" min="1" value="${p.value}" oninput="setManualProgressField('value',this.value)" style="width:120px;padding:6px"></div>
    </div>
  </div></div>`;
}
function setManualProgressField(k,v){
  const p=S.planManualProgress;if(!p)return;
  p[k]=v;
  // 科目変更で calc 対象外になったら cat を変更
  if(k==='subject' && p.cat==='calc' && !PLAN_CALC_SUBJECTS.has(v)){
    p.cat='theoryPages';
  }
  renderManualProgressModal();
}
async function saveManualProgress(){
  const p=S.planManualProgress;if(!p)return;
  if(!p.subject){alert('科目を選択してください');return;}
  const n=parseInt(p.value);if(isNaN(n)||n<=0){alert('1以上の数量を入力してください');return;}
  if(p.cat==='calc' && !PLAN_CALC_SUBJECTS.has(p.subject)){alert('この科目は計算カテゴリの対象外です');return;}
  const today=effectiveTodayLocal();
  const yyyyMM=planMonthOf(planParseYMD(today));
  const deltas={};deltas[p.cat]=n;
  await planAddProgress(yyyyMM, p.subject, deltas);
  closeManualProgress();
}
function closeManualProgress(){S.planManualProgress=null;document.getElementById('mem-slot').innerHTML='';renderPlan();}

async function commitDayCheckCustom(sid, checked){
  let calc=0, tp=0, lc=0;
  if(checked){
    const ce=document.getElementById(`day-${sid}-calc`);
    const te=document.getElementById(`day-${sid}-theoryPages`);
    const le=document.getElementById(`day-${sid}-lecture`);
    calc = parseInt(ce?.value)||0;
    tp = parseInt(te?.value)||0;
    lc = parseInt(le?.value)||0;
  }
  await togglePlanDayCheck(sid, checked, calc, tp, lc);
}
// --- 週ビュー ---
async function renderPlanWeekView(today){
  const weekMon=planWeekMonday(planParseYMD(today));
  const weekMonD=planParseYMD(weekMon);
  const sun=new Date(weekMonD.getTime());sun.setDate(sun.getDate()+6);
  const periodLabel=`${weekMon.slice(5)} 〜 ${planYMD(sun).slice(5)}`;
  const mode=S.planWeekMode||'card';
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div style="font-size:13px;color:var(--text2)">今週: <b>${esc(periodLabel)}</b>（月曜始まり）</div>
    <div class="filter-row" style="margin:0"><button class="filter-btn ${mode==='card'?'active':''}" onclick="setPlanWeekMode('card')">カード</button><button class="filter-btn ${mode==='calendar'?'active':''}" onclick="setPlanWeekMode('calendar')">カレンダー</button></div>
  </div>`;
  if(mode==='calendar'){
    html += await renderPlanWeekCalendar(weekMon);
  }else{
    html += '<div style="font-size:11px;color:var(--text3);margin-bottom:10px">月目標から自動算出。値を編集するとその週のみ上書きされます</div>';
    const yyyyMM=planMonthOf(weekMonD);
    for(const subj of SUBJECTS){
      const fields=[];
      if(PLAN_CALC_SUBJECTS.has(subj.id)){
        const c=await planComputeWeekValue(weekMon,subj.id,'calc');
        fields.push(planWeekFieldHTML(weekMon,subj.id,'calc',c));
      }
      const tp=await planComputeWeekValue(weekMon,subj.id,'theoryPages');
      fields.push(planWeekFieldHTML(weekMon,subj.id,'theoryPages',tp));
      const lc=await planComputeWeekValue(weekMon,subj.id,'lecture');
      fields.push(planWeekFieldHTML(weekMon,subj.id,'lecture',lc));
      // 月進捗を小さく表示
      const prog=await planGetProgress(yyyyMM,subj.id);
      const goals=(await planGetMonthGoals(yyyyMM))[subj.id]||{};
      const progParts=[];
      for(const cat of PLAN_CATS){
        if(goals[cat]){
          let done = prog[cat]||0;
          if(cat==='calc' && PLAN_CALC_SUBJECTS.has(subj.id)){
            done += await getCalcAutoCountInMonth(yyyyMM, subj.id);
          }
          progParts.push(`${PLAN_CAT_LABELS[cat]}${done}/${goals[cat]}`);
        }
      }
      const progHTML=progParts.length?`<div style="font-size:11px;color:var(--text3);margin-top:6px">月進捗: ${progParts.join(' / ')}</div>`:'';
      html+=`<div class="plan-subj-card"><div class="plan-subj-head"><span class="badge b-${subj.id}">${esc(subj.name)}</span></div><div class="plan-fields">${fields.join('')}</div>${progHTML}</div>`;
    }
  }
  return html;
}
function planWeekFieldHTML(weekMon,sid,cat,r){
  const label=PLAN_CAT_LABELS[cat]+(cat==='theoryPages'?'(回転)':'');
  const unit=PLAN_CAT_UNITS[cat];
  const overMark=r.overridden?'<span style="color:var(--amber,#a16207);font-size:10px;margin-left:4px">編集済</span>':'<span style="color:var(--text3);font-size:10px;margin-left:4px">自動</span>';
  return `<div class="plan-week-field"><label>${esc(label)}</label><div style="display:flex;align-items:center;gap:4px"><input type="number" min="0" value="${r.value||''}" style="width:64px" onchange="setPlanWeekValue('${weekMon}','${sid}','${cat}',this.value)"><span style="font-size:11px;color:var(--text3)">${unit}</span>${overMark}</div></div>`;
}
async function setPlanWeekValue(weekMon,sid,cat,val){
  const n=parseInt(val);
  const ov=await planGetWeekOverride(weekMon,sid);
  if(val===''||isNaN(n))delete ov[cat];
  else ov[cat]=n;
  await planSaveWeekOverride(weekMon,sid,ov);
  renderPlan();
}
function setPlanWeekMode(m){S.planWeekMode=m;renderPlan();}

// --- 週カレンダー ---
async function renderPlanWeekCalendar(weekMon){
  const start=planParseYMD(weekMon);
  const dowLabels=['月','火','水','木','金','土','日'];
  const today=effectiveTodayLocal();
  // 7日分の日付
  const dates=[];
  for(let i=0;i<7;i++){
    const d=new Date(start.getTime());d.setDate(d.getDate()+i);
    dates.push({ymd:planYMD(d),date:d});
  }
  // ヘッダ
  let html='<div class="plan-cal-week"><div class="plan-cal-head"><div class="plan-cal-subj-col"></div>';
  dates.forEach((d,i)=>{
    const isToday=d.ymd===today?' plan-cal-today':'';
    html+=`<div class="plan-cal-day-head${isToday}"><div>${dowLabels[i]}</div><div style="font-size:11px;color:var(--text3)">${d.ymd.slice(5)}</div></div>`;
  });
  html+='</div>';
  // スポット行
  const allSpots=(await getSetting('planSpotTasks'))||[];
  const spotsByDay={};dates.forEach(d=>{spotsByDay[d.ymd]=allSpots.filter(t=>t.date===d.ymd);});
  const hasAnySpot=dates.some(d=>spotsByDay[d.ymd].length>0);
  if(hasAnySpot){
    html+='<div class="plan-cal-row"><div class="plan-cal-subj-col" style="font-size:11px;color:var(--text3)">📌 スポット</div>';
    dates.forEach(d=>{
      const ss=spotsByDay[d.ymd];
      html+=`<div class="plan-cal-cell">${ss.map(s=>`<div class="plan-cal-spot" title="${esc(sName(s.subject))} - ${esc(s.title)}"><span class="badge b-${s.subject||'financial'}" style="font-size:9px;padding:1px 5px">${esc(sName(s.subject).slice(0,2))}</span></div>`).join('')}</div>`;
    });
    html+='</div>';
  }
  // 科目行
  for(const subj of SUBJECTS){
    const cells=[];
    let hasAny=false;
    for(const d of dates){
      const parts=[];
      if(PLAN_CALC_SUBJECTS.has(subj.id)){
        const r=await planComputeDayValue(d.ymd,subj.id,'calc');
        if(r.value)parts.push(`<span class="plan-cal-cat">計${r.value}${r.halvedForMock?'<span class="plan-cal-mark">半</span>':''}</span>`);
      }
      const rp=await planComputeDayValue(d.ymd,subj.id,'theoryPages');
      if(rp.value)parts.push(`<span class="plan-cal-cat">回${rp.value}</span>`);
      const rl=await planComputeDayValue(d.ymd,subj.id,'lecture');
      if(rl.value)parts.push(`<span class="plan-cal-cat">講${rl.value}</span>`);
      if(parts.length)hasAny=true;
      cells.push(parts.join(''));
    }
    if(!hasAny)continue;
    html+=`<div class="plan-cal-row"><div class="plan-cal-subj-col"><span class="badge b-${subj.id}" style="font-size:10px">${esc(subj.name)}</span></div>`;
    cells.forEach((cell,i)=>{
      const isToday=dates[i].ymd===today?' plan-cal-today':'';
      html+=`<div class="plan-cal-cell${isToday}">${cell||'<span style="color:var(--text3);font-size:11px">-</span>'}</div>`;
    });
    html+='</div>';
  }
  html+='</div>';
  return html;
}

// --- 月ビュー ---
async function renderPlanMonthView(today){
  if(!S.planMonth)S.planMonth=planMonthOf(planParseYMD(today));
  const yyyyMM=S.planMonth;
  const mode=S.planMonthMode||'card';
  const goals=await planGetMonthGoals(yyyyMM);
  let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <button class="btn btn-sm" onclick="planNavMonth(-1)">◀</button>
    <div style="font-size:15px;font-weight:500;min-width:100px;text-align:center">${esc(planMonthLabel(yyyyMM))}</div>
    <button class="btn btn-sm" onclick="planNavMonth(1)">▶</button>
    <button class="btn btn-sm" onclick="planNavMonth(0)">今月</button>
    <div class="filter-row" style="margin-left:auto"><button class="filter-btn ${mode==='card'?'active':''}" onclick="setPlanMonthMode('card')">カード</button><button class="filter-btn ${mode==='calendar'?'active':''}" onclick="setPlanMonthMode('calendar')">カレンダー</button></div>
  </div>`;
  if(mode==='calendar'){
    html+=`<div style="text-align:right;margin-bottom:6px"><button class="filter-btn ${S.planMemDue?'active':''}" onclick="togglePlanMemDue()">暗記 due 件数</button></div>`;
    html += await renderPlanMonthCalendar(yyyyMM);
    return html;
  }
  html += '<div style="font-size:11px;color:var(--text3);margin-bottom:10px">月の合計を入力 → 週/日に自動配分。⋯で期間・曜日を設定</div>';
  for(const subj of SUBJECTS){
    const g=goals[subj.id]||{};
    const prog=await planGetProgress(yyyyMM,subj.id);
    // 計算は履歴ベースの自動カウントを月進捗に加算
    let calcDone = prog.calc||0;
    if(PLAN_CALC_SUBJECTS.has(subj.id) && g.calc){
      calcDone += await getCalcAutoCountInMonth(yyyyMM, subj.id);
    }
    const calcField=PLAN_CALC_SUBJECTS.has(subj.id)
      ? `<div class="plan-month-field"><label>計算 ${planCatDetailBadge(g,'calc')}</label>
          <div style="display:flex;align-items:center;gap:4px"><input type="number" min="0" value="${g.calc||''}" style="width:60px" onchange="setPlanMonthValue('${yyyyMM}','${subj.id}','calc',this.value)"><span style="font-size:11px;color:var(--text3)">問</span><button class="btn btn-xs" onclick="openPlanCatDetail('${yyyyMM}','${subj.id}','calc')" title="期間・曜日設定">⋯</button></div>
          ${planProgressBarHTML(g.calc,calcDone,yyyyMM,subj.id,'calc')}
        </div>`
      : '<div class="plan-month-field" style="opacity:0.4"><label>計算</label><div style="font-size:12px;color:var(--text3);padding-top:4px">対象外</div></div>';
    html+=`<div class="plan-subj-card">
      <div class="plan-subj-head"><span class="badge b-${subj.id}">${esc(subj.name)}</span></div>
      <div class="plan-fields">
        ${calcField}
        <div class="plan-month-field"><label>理論回転 ${planCatDetailBadge(g,'theoryPages')}</label>
          <div style="display:flex;align-items:center;gap:4px"><input type="number" min="0" value="${g.theoryPages||''}" style="width:52px" onchange="setPlanMonthValue('${yyyyMM}','${subj.id}','theoryPages',this.value)"><span style="font-size:11px;color:var(--text3)">p</span><button class="btn btn-xs" onclick="openPlanCatDetail('${yyyyMM}','${subj.id}','theoryPages')" title="期間・曜日設定">⋯</button></div>
          ${planProgressBarHTML(g.theoryPages,prog.theoryPages,yyyyMM,subj.id,'theoryPages')}
        </div>
        <div class="plan-month-field"><label>講義 ${planCatDetailBadge(g,'lecture')}</label>
          <div style="display:flex;align-items:center;gap:4px"><input type="number" min="0" value="${g.lecture||''}" style="width:52px" onchange="setPlanMonthValue('${yyyyMM}','${subj.id}','lecture',this.value)"><span style="font-size:11px;color:var(--text3)">回</span><button class="btn btn-xs" onclick="openPlanCatDetail('${yyyyMM}','${subj.id}','lecture')" title="期間・曜日設定">⋯</button></div>
          ${planProgressBarHTML(g.lecture,prog.lecture,yyyyMM,subj.id,'lecture')}
        </div>
      </div>
    </div>`;
  }
  return html;
}
function planProgressBarHTML(goal,done,yyyyMM,sid,cat){
  if(!goal)return '';
  const d=done||0;
  const pct=Math.min(100, Math.round(d/goal*100));
  const overdue = d>=goal?'color:var(--green,#15803d);font-weight:500':'';
  return `<div style="margin-top:6px"><div style="display:flex;align-items:center;gap:4px;font-size:11px"><span style="color:var(--text3)">進捗</span><input type="number" min="0" value="${d}" style="width:48px;padding:1px 4px;font-size:11px" onchange="setPlanProgress('${yyyyMM}','${sid}','${cat}',this.value)"><span style="${overdue}">/${goal} (${pct}%)</span></div><div class="prog-bar" style="margin-top:2px;height:4px"><div class="prog-fill" style="width:${pct}%;background:${d>=goal?'var(--green,#15803d)':''}"></div></div></div>`;
}
function planCatDetailBadge(g,cat){
  // 期間 or 曜日に制限があるか判定し、小さなバッジ表示
  const hasPeriod = g[cat+'Start'] || g[cat+'End'];
  const days = g[cat+'Days'];
  const hasDays = days && Array.isArray(days) && days.length>0 && days.length<7;
  if(!hasPeriod && !hasDays) return '';
  const parts = [];
  if(hasPeriod){
    const s = g[cat+'Start']?g[cat+'Start'].slice(5).replace('-','/'):'';
    const e = g[cat+'End']?g[cat+'End'].slice(5).replace('-','/'):'';
    if(s && e) parts.push(`${s}〜${e}`);
    else if(s) parts.push(`${s}〜`);
    else if(e) parts.push(`〜${e}`);
  }
  if(hasDays){

async function renderPlanMonthCalendar(yyyyMM){
  const [y,m]=yyyyMM.split('-').map(Number);
  const firstDay=new Date(y,m-1,1);
  const lastDay=new Date(y,m,0);
  // 月の最初の日が含まれる週の月曜
  const startMon=planParseYMD(planWeekMonday(firstDay));
  // 月の最後の日が含まれる週の日曜
  const endMonDay=planParseYMD(planWeekMonday(lastDay));
  const endSun=new Date(endMonDay.getTime());endSun.setDate(endSun.getDate()+6);
  const today=effectiveTodayLocal();
  const allSpots=(await getSetting('planSpotTasks'))||[];

  // 暗記 due カウントを事前集計し月内重負担日上位3を決定
  const dueCounts=await buildMemDueCounts();
  const lastDate=new Date(y,m,0).getDate();
  const dayTotals=[];
  for(let d=1;d<=lastDate;d++){
    const ymd=`${yyyyMM}-${String(d).padStart(2,'0')}`;
    const dc=dueCounts[ymd]||{};
    const total=Object.entries(dc).reduce((s,[sid,v])=>s+(sid==='business'?Math.round(v/3):v),0);
    dayTotals.push({ymd,total});
  }
  dayTotals.sort((a,b)=>b.total-a.total);
  const heavyRank={};
  for(let i=0;i<3;i++){if(dayTotals[i]&&dayTotals[i].total>0)heavyRank[dayTotals[i].ymd]=i+1;}

  const dowLabels=['月','火','水','木','金','土','日'];
  let html='<div class="plan-mcal"><div class="plan-mcal-head">'+dowLabels.map(d=>`<div>${d}</div>`).join('')+'</div>';

  // 月の各日を「有効日数キャッシュ」のために事前計算
  const goals=await planGetMonthGoals(yyyyMM);

  let cur=new Date(startMon.getTime());
  while(cur<=endSun){
    html+='<div class="plan-mcal-row">';
    for(let i=0;i<7;i++){
      const ymd=planYMD(cur);
      const inMonth=cur.getMonth()===m-1;
      const isToday=ymd===today;
      const daySpots=allSpots.filter(t=>t.date===ymd);
      // この日に該当する科目のマーカー（科目名 + 値）
      const markers=[];
      if(inMonth){
        for(const subj of SUBJECTS){
          const g=goals[subj.id]||{};
          const parts=[];
          for(const cat of PLAN_CATS){
            if(!g[cat])continue;
            if(!planIsValidDayForCat(ymd,g,cat))continue;
            const r = await planComputeDayValue(ymd, subj.id, cat);
            const v = r.value;
            if(v>0) parts.push(`${PLAN_CAT_LABELS[cat].slice(0,1)}${v}${r.halvedForMock?'半':''}`);
          }
          if(parts.length>0){
            const label = `${subj.name.slice(0,2)} ${parts.join('/')}`;
            markers.push(`<span class="plan-mcal-task badge b-${subj.id}" title="${esc(subj.name)}: ${esc(parts.join(' / '))}">${esc(label)}</span>`);
          }
        }
      }
      // 暗記 due 行（トグル時のみ表示）
      let dueRow='';
      if(S.planMemDue&&inMonth){
        const dc=dueCounts[ymd]||{};
        const chips=SUBJECTS.filter(s=>dc[s.id]>0).map(s=>`<span class="plan-mcal-due-chip b-${s.id}" title="${esc(s.name)}: ${dc[s.id]}件">${s.name.slice(0,2)}${dc[s.id]}</span>`).join('');
        if(chips)dueRow=`<div class="plan-mcal-due-row">${chips}</div>`;
      }
      // 重負担ハイライト（planMemDue ON 時のみ）
      const rank=S.planMemDue&&inMonth?(heavyRank[ymd]||0):0;
      const cls=['plan-mcal-cell',!inMonth&&'plan-mcal-out',isToday&&'plan-mcal-today',rank&&`plan-mcal-heavy-${rank}`].filter(Boolean).join(' ');
      // スポット予定: 科目バッジで表示
      const spotChips = daySpots.map(s=>`<span class="plan-mcal-spot-chip badge b-${s.subject||'financial'}" title="${esc(s.title)} (${esc(sName(s.subject))})">📌${esc(sName(s.subject).slice(0,2))}</span>`).join('');
      html+=`<div class="${cls}"><div class="plan-mcal-date">${cur.getDate()}</div>${daySpots.length?`<div class="plan-mcal-spots">${spotChips}</div>`:''}<div class="plan-mcal-tasks">${markers.join('')}</div>${dueRow}</div>`;
      cur.setDate(cur.getDate()+1);
    }
    html+='</div>';
  }
  html+='</div>';
  // セル内に科目名が直接表示されるため凡例は不要
  return html;
}

function parseSpotBulkLines(text){
  const subjMap={};
  for(const s of SUBJECTS){subjMap[s.id]=s.id;subjMap[s.name]=s.id;}
  const results=[],errors=[];
  const lines=(text||'').split(/\r?\n/);
  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line||line.startsWith('#'))continue;
    // 分割: タブ or 2連空白 or 単一空白
    const parts=line.split(/\t+|\s{2,}|\s+/);
    if(parts.length<3){errors.push(`L${i+1}: 列数不足: ${line}`);continue;}
    const [date,subj,...rest]=parts;
    if(!/^\d{4}-\d{2}-\d{2}$/.test(date)){errors.push(`L${i+1}: 日付形式エラー: ${date}`);continue;}
    // 実日付として有効か検証（2026-13-99のような不正値を弾く）
    const _d=new Date(date+'T00:00:00');
    if(isNaN(_d.getTime())||date!==`${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`){
      errors.push(`L${i+1}: 日付が存在しません: ${date}`);continue;
    }
    const sid=subjMap[subj];
    if(!sid){errors.push(`L${i+1}: 科目エラー: ${subj}`);continue;}
    const title=rest.join(' ').trim();
    if(!title){errors.push(`L${i+1}: タイトル空`);continue;}
    results.push({date,subject:sid,title});
  }
  return {results,errors};
}
async function saveSpotBulk(){
  const p=S.planSpotBulk;if(!p)return;
  const {results,errors}=parseSpotBulkLines(p.text);
  if(errors.length){
    if(!confirm(`${errors.length}件のエラーがあります:\n\n${errors.slice(0,5).join('\n')}\n${errors.length>5?'...':''}\n\n有効な ${results.length}件 のみ追加しますか？`))return;
  }
  if(!results.length){alert('追加可能なエントリがありません');return;}
  if(!confirm(`${results.length}件 をスポット予定に追加します。よろしいですか？`))return;
  const tasks=(await getSetting('planSpotTasks'))||[];
  for(const r of results){
    tasks.push({id:uid(),date:r.date,subject:r.subject,title:r.title});
  }
  await setSetting('planSpotTasks',tasks);
  closeSpotBulk();
  alert(`${results.length}件 を追加しました`);
}

/* ===== Persistent storage ===== */
let _persistStatus={requested:false,granted:false,supported:false,quota:null,usage:null};
async function requestPersistentStorage(){
  if(!navigator.storage?.persist){_persistStatus.supported=false;return;}
  _persistStatus.supported=true;
  try{
    // Check if already granted
    if(navigator.storage.persisted){
      _persistStatus.granted=await navigator.storage.persisted();
    }
    if(!_persistStatus.granted){
      _persistStatus.granted=await navigator.storage.persist();
    }
    _persistStatus.requested=true;
    if(navigator.storage.estimate){
      const est=await navigator.storage.estimate();
      _persistStatus.quota=est.quota;_persistStatus.usage=est.usage;
    }
  }catch(e){console.warn('persist request failed',e);}
}
function fmtBytes(b){if(b==null)return'-';const u=['B','KB','MB','GB'];let i=0,v=b;while(v>=1024&&i<u.length-1){v/=1024;i++;}return v.toFixed(v<10?2:1)+' '+u[i];}

/* ===== Init ===== */
async function init(){
  await initDB();
  setupMarked();
  await requestPersistentStorage();
  // One-time migration: legacy audit records have subTopic=null; default them to '個別論点'
  try{
    const migDone=await getSetting('migratedAudit1');
    if(!migDone){
      const mems=await dbAll('memorize');
      for(const m of mems){
        if(m.subject==='audit'&&!m.subTopic){m.subTopic='個別論点';await dbPut('memorize',m);}
      }
      await setSetting('migratedAudit1','true');
    }
  }catch(e){console.warn('audit migration skipped:',e);}
  // Second migration: rename '監査論１/監査論２' → '個別論点/論点洗出'
  try{
    const migDone=await getSetting('migratedAuditRename');
    if(!migDone){
      const mems=await dbAll('memorize');
      const map={'監査論１':'個別論点','監査論１':'個別論点','監査論2':'論点洗出','監査論２':'論点洗出'};
      for(const m of mems){
        if(m.subject==='audit'&&map[m.subTopic]){m.subTopic=map[m.subTopic];await dbPut('memorize',m);}
      }
      await setSetting('migratedAuditRename','true');
    }
  }catch(e){console.warn('audit rename migration skipped:',e);}
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      if(document.querySelector('.img-zoom'))return;
      if(S.journalCtx){closeJournalModal();return;}
      if(S.studyEditing){cancelStudyEdit();return;}
      if(S.memImport){closeMemImport();return;}
      if(S.editingMem){closeMemEdit();return;}
      if(S.memMemoEditing){cancelMemMemoEdit();return;}
      if(S.planManualProgress){closeManualProgress();return;}
      if(S.studyPickerSubject!==null){closeStudyPicker();return;}
      if(S.planEditingCat){closePlanCatDetail();return;}
      if(S.planSpotBulk){closeSpotBulk();return;}
      if(S.viewingMem){closeMem();return;}
      if(S.editingCalc){closeCalcEdit();return;}
      if(S.calcMemoEditing){cancelCalcMemoEdit();return;}
      if(S.viewingCalc){closeCalc();return;}
      if(S.calcImport){closeCalcImport();return;}
      if(S.viewingQ){closeQViewer();return;}
      if(S.examImport){closeImportPreview();return;}
      if(S.examSubjectMemoEditing){cancelSubjectExamMemoEdit();return;}
      if(S.examMemoEditing){cancelExamMemoEdit();return;}
      if(S.viewingExam){closeExam();return;}
      if(S.viewingNote){closeViewer();return;}
    }
  });
  // Click-to-zoom for images inside rendered markdown (notes, previews, study cards, reader)
  document.addEventListener('click',handleGlobalImageClick);
  showView('dashboard');
}
init();
if('serviceWorker' in navigator){
  // HTTPS/localhost以外(LAN IP経由のhttp等)ではブラウザ側で登録が無視/失敗するため握りつぶす
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
