<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会計学習ノート</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A5FA8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="会計学習">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0;--card:#FFFFFF;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --text:#1C1B18;--text2:#6B6860;--text3:#A8A49E;
  --blue:#1A5FA8;--blue-bg:#EAF2FB;--blue-mid:#2E78C7;
  --teal:#0D6B51;--teal-bg:#E3F5EE;--purple:#4E44B2;--purple-bg:#EEEDFC;
  --amber:#7A4A0A;--amber-bg:#FBF0DC;--red:#9B2C2C;--red-bg:#FDF0F0;
  --green:#2D6B2D;--green-bg:#EDF7ED;--rose:#A03A55;--rose-bg:#F8E5EB;
  --r:8px;--r-lg:12px;--shadow:0 1px 3px rgba(0,0,0,0.07);
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.65;min-height:100vh}
nav{background:var(--card);border-bottom:1px solid var(--border);display:flex;position:sticky;top:0;z-index:50;overflow-x:auto}
.nav-btn{flex:1;min-width:72px;padding:13px 6px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap}
.nav-btn.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.nav-btn:hover:not(.active){background:rgba(0,0,0,0.025)}
main{max-width:780px;margin:0 auto;padding:20px 14px 60px;transition:max-width .15s ease}
body.wide-view main{max-width:1280px}
.view{display:none}.view.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.b-financial{background:var(--blue-bg);color:var(--blue)}.b-managerial{background:var(--teal-bg);color:var(--teal)}
.b-business{background:var(--purple-bg);color:var(--purple)}.b-tax{background:var(--amber-bg);color:var(--amber)}
.b-law{background:var(--green-bg);color:var(--green)}.b-audit{background:var(--rose-bg);color:var(--rose)}
.b-due{background:var(--red-bg);color:var(--red)}.b-new{background:#f0f0f0;color:var(--text2)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}
.stat-num{font-size:26px;font-weight:500;font-family:'Noto Serif JP',serif}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.section-title{font-size:16px;font-weight:500;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{padding:4px 12px;border-radius:20px;font-size:12px;font-family:inherit;border:1px solid var(--border2);background:var(--card);color:var(--text2);cursor:pointer}
.filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.filter-btn:hover:not(.active){background:var(--bg)}
.form-group{margin-bottom:13px}
label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
input[type=text],input[type=password],select,textarea{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--card);color:var(--text)}
input[type=text]:focus,input[type=password]:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue-mid)}
textarea{resize:vertical;min-height:100px;line-height:1.6}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--text)}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-primary:hover{background:var(--blue-mid)}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:transparent}
.btn-sm{padding:4px 10px;font-size:12px}.btn-lg{padding:12px 20px;font-size:14px;width:100%;justify-content:center}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.editor-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.editor-preview{background:var(--bg);padding:12px;border-radius:var(--r);min-height:160px;max-height:460px;overflow-y:auto;font-size:13px;border:1px solid var(--border)}
@media(max-width:600px){.editor-wrap{grid-template-columns:1fr}}
.list-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 15px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;box-shadow:var(--shadow)}
.list-item:hover{border-color:var(--blue-mid)}
.list-item-title{font-weight:500;font-size:14px;margin-top:5px;line-height:1.4}
.list-item-meta{font-size:11px;color:var(--text3);margin-top:3px}
.study-card-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px 22px;min-height:200px;display:flex;flex-direction:column;justify-content:center;margin-bottom:14px;box-shadow:var(--shadow)}
.study-q{font-size:15px;font-weight:500;line-height:1.7;text-align:center}
.study-divider{border:none;border-top:1px solid var(--border);margin:18px 0}
.study-a{font-size:13px;color:var(--text2);line-height:1.7}
.rating-row{display:flex;gap:10px;justify-content:center}
.btn-wrong{background:var(--red-bg);color:var(--red);border-color:transparent;padding:11px 20px;font-size:14px}
.btn-fuzzy{background:var(--amber-bg);color:var(--amber);border-color:transparent;padding:11px 20px;font-size:14px}
.btn-correct{background:var(--green-bg);color:var(--green);border-color:transparent;padding:11px 20px;font-size:14px}
.prog-bar{height:5px;background:var(--border);border-radius:3px;margin-bottom:14px}
.prog-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .3s}
.subject-row{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:8px;box-shadow:var(--shadow)}
.interval-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:6px}
.note-ref{font-size:11px;color:var(--blue);cursor:pointer;margin-top:6px;display:inline-block}
.note-ref:hover{text-decoration:underline}
.empty{text-align:center;color:var(--text3);padding:36px 20px;font-size:13px}
.alert{padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:12px;line-height:1.6}
.alert-success{background:var(--green-bg);color:var(--green)}.alert-danger{background:var(--red-bg);color:var(--red)}
.alert-info{background:var(--blue-bg);color:var(--blue)}.alert-warning{background:var(--amber-bg);color:var(--amber)}
.settings-row{padding:14px 0;border-bottom:1px solid var(--border)}.settings-row:last-child{border-bottom:none}
.settings-label{font-size:13px;font-weight:500;margin-bottom:3px}
.settings-desc{font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.7}
.drive-status{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.drive-connected{background:var(--green-bg);color:var(--green)}.drive-disconnected{background:#f0f0f0;color:var(--text2)}
.md h1{font-size:17px;font-weight:500;margin-bottom:8px;margin-top:14px;font-family:'Noto Serif JP',serif}
.md h2{font-size:15px;font-weight:500;margin-bottom:7px;margin-top:12px}
.md h3{font-size:13px;font-weight:500;margin-bottom:5px;margin-top:10px;color:var(--text2)}
.md p{margin-bottom:7px}.md ul,.md ol{padding-left:18px;margin-bottom:7px}.md li{margin-bottom:2px}
.md code{background:rgba(0,0,0,0.05);padding:1px 5px;border-radius:3px;font-size:12px;font-family:monospace}
.md pre{background:rgba(0,0,0,0.04);padding:10px;border-radius:var(--r);overflow-x:auto;margin-bottom:8px}
.md blockquote{border-left:3px solid var(--blue-mid);padding-left:11px;color:var(--text2);margin-bottom:8px}
.md table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:12px}
.md th,.md td{border:1px solid var(--border);padding:5px 9px}.md th{background:var(--bg);font-weight:500}
.md strong{font-weight:500}.md hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.md mark{background:#FFF2A8;color:inherit;padding:0 2px;border-radius:2px}
.md img{max-width:100%;height:auto;display:block;margin:8px 0;border-radius:4px;border:1px solid var(--border);cursor:zoom-in;background:#fff}
.katex-display{overflow-x:auto;padding:4px 0}
/* Journal entry (仕訳) table */
.md .journal-table{border-collapse:collapse;margin:10px 0;font-size:13px;width:auto;min-width:300px;background:var(--card);border:1.5px solid var(--text2)}
.md .journal-table caption{text-align:left;font-size:11px;color:var(--text2);padding:0 0 4px;caption-side:top;font-weight:500}
.md .journal-table th,.md .journal-table td{border:1px solid var(--border2);padding:6px 12px;line-height:1.5}
.md .journal-table thead th{background:var(--bg);font-weight:500;font-size:12px;color:var(--text2);text-align:center}
.md .journal-table tbody td{vertical-align:top}
.md .journal-table td.j-item{min-width:90px}
.md .journal-table td.j-num{text-align:right;font-variant-numeric:tabular-nums;font-feature-settings:"tnum";min-width:80px}
.md .journal-table td.j-empty{color:var(--text3);text-align:center}
.reader-content.md .journal-table{font-size:14px}
.reader-content.md .journal-table th,.reader-content.md .journal-table td{padding:8px 14px}
/* Image zoom overlay */
.img-zoom{position:fixed;inset:0;background:rgba(28,27,24,0.9);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;cursor:zoom-out;animation:rfade .15s ease-out}
.img-zoom img{max-width:100%;max-height:100%;object-fit:contain;box-shadow:0 4px 30px rgba(0,0,0,0.4);background:#fff;border-radius:4px}
.img-zoom-close{position:absolute;top:14px;right:18px;background:rgba(255,255,255,0.15);color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.img-zoom-close:hover{background:rgba(255,255,255,0.25)}
/* Tax sub-filter row */
.subfilter-row{display:flex;gap:5px;flex-wrap:wrap;margin:-6px 0 14px;padding:8px 10px;background:var(--amber-bg);border-radius:var(--r);align-items:center}
.subfilter-label{font-size:11px;color:var(--amber);font-weight:500;margin-right:2px}
.subfilter-btn{padding:3px 11px;border-radius:20px;font-size:12px;font-family:inherit;border:1px solid transparent;background:transparent;color:var(--amber);cursor:pointer}
.subfilter-btn.active{background:var(--amber);color:#fff}
.subfilter-btn:hover:not(.active){background:rgba(122,74,10,0.1)}
/* Journal input modal */
.journal-overlay{position:fixed;inset:0;background:rgba(28,27,24,0.55);z-index:250;display:flex;align-items:center;justify-content:center;padding:20px;animation:rfade .15s ease-out}
.journal-modal{background:var(--card);border-radius:var(--r-lg);width:100%;max-width:580px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.18);overflow:hidden}
.journal-modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.journal-modal-title{font-weight:500;font-size:14px}
.journal-modal-body{flex:1;overflow-y:auto;padding:14px 18px}
.journal-modal-footer{display:flex;gap:8px;justify-content:flex-end;padding:12px 18px;border-top:1px solid var(--border);background:var(--bg)}
.journal-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.journal-row{display:grid;grid-template-columns:1fr 100px 8px 1fr 100px 26px;gap:6px;align-items:center}
.journal-row input{padding:6px 9px;font-size:13px;border:1px solid var(--border2);border-radius:var(--r);font-family:inherit;width:100%;background:var(--card);color:var(--text)}
.journal-row input:focus{outline:none;border-color:var(--blue-mid)}
.journal-row input.j-num-input{text-align:right;font-variant-numeric:tabular-nums}
.journal-row-sep{color:var(--text3);text-align:center;font-size:14px}
.journal-row-del{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:2px 6px;line-height:1}
.journal-row-del:hover{color:var(--red)}
.journal-headers{display:grid;grid-template-columns:1fr 100px 8px 1fr 100px 26px;gap:6px;font-size:11px;color:var(--text2);font-weight:500;padding:0 2px 4px;margin-bottom:4px}
.journal-headers .h-debit{grid-column:1/3;background:var(--blue-bg);color:var(--blue);padding:3px 0;border-radius:3px;text-align:center}
.journal-headers .h-credit{grid-column:4/6;background:var(--rose-bg);color:var(--rose);padding:3px 0;border-radius:3px;text-align:center}
@media(max-width:600px){
  .journal-modal{max-width:100vw;max-height:100vh;height:100vh;border-radius:0}
  .journal-row{grid-template-columns:1fr 80px 26px;grid-template-rows:auto auto;gap:5px;padding-bottom:6px;border-bottom:1px dashed var(--border)}
  .journal-row .j-debit-name{grid-row:1;grid-column:1}
  .journal-row .j-debit-amt{grid-row:1;grid-column:2}
  .journal-row .j-credit-name{grid-row:2;grid-column:1}
  .journal-row .j-credit-amt{grid-row:2;grid-column:2}
  .journal-row-sep{display:none}
  .journal-row-del{grid-row:1/3;grid-column:3;align-self:center}
  .journal-headers{display:none}
}
/* Topic groups (accordion) */
.topic-group{margin-bottom:8px}
.topic-header{width:100%;display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);cursor:pointer;font-family:inherit;font-size:14px;color:var(--text);text-align:left;box-shadow:var(--shadow);transition:background .12s}
.topic-header:hover{background:var(--bg)}
.topic-arrow{font-size:10px;color:var(--text2);width:12px;flex-shrink:0}
.topic-name{flex:1;font-weight:500}
.topic-count{font-size:11px;color:var(--text2);background:var(--bg);padding:2px 9px;border-radius:10px;flex-shrink:0}
.topic-notes{margin:6px 0 14px 16px;padding-left:12px;border-left:2px solid var(--border)}
.note-row{display:flex;align-items:center;gap:8px;padding:9px 12px;margin-bottom:4px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;box-shadow:var(--shadow);transition:border-color .12s}
.note-row:hover{border-color:var(--blue-mid)}
.note-row-title{flex:1;font-size:13px;font-weight:500}
.note-row-meta{font-size:11px;color:var(--text3);flex-shrink:0}
/* Reorder buttons (↑↓) */
.move-btns{display:flex;gap:2px;flex-shrink:0}
.move-btn{padding:2px 7px;font-size:12px;line-height:1.2;border:1px solid var(--border2);background:var(--card);color:var(--text2);border-radius:var(--r);cursor:pointer;font-family:inherit}
.move-btn:hover:not(:disabled){background:var(--bg);color:var(--text)}
.move-btn:disabled{opacity:0.3;cursor:not-allowed}
.rate-hint{display:block;font-size:11px;font-weight:400;margin-top:3px;opacity:0.75}
/* Note editor toolbar */
.editor-toolbar{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap}
.tb-btn{padding:4px 10px;font-size:12px;font-family:inherit;border:1px solid var(--border2);background:var(--card);color:var(--text2);border-radius:var(--r);cursor:pointer;line-height:1.3}
.tb-btn:hover{background:var(--bg);color:var(--text)}
.tb-btn b{font-weight:700;font-size:13px}
.tb-btn i{font-style:italic;font-size:13px;font-family:'Noto Serif JP',serif}
.tb-btn code{font-family:monospace;font-size:11px;background:none;padding:0}
.tb-sep{width:1px;background:var(--border);margin:2px 4px;align-self:stretch}
/* Reader modal (large-screen note viewer) */
.reader-overlay{position:fixed;inset:0;background:rgba(28,27,24,0.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;animation:rfade .15s ease-out}
@keyframes rfade{from{opacity:0}to{opacity:1}}
.reader-modal{background:var(--card);border-radius:var(--r-lg);width:100%;max-width:1100px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.18);overflow:hidden}
.reader-header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--card)}
.reader-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.reader-actions{display:flex;gap:6px}
.reader-content{flex:1;overflow-y:auto;padding:30px 44px 40px;font-size:15px;line-height:1.85}
.reader-title{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:500;margin:0 0 22px;padding-bottom:14px;border-bottom:1px solid var(--border);line-height:1.4}
.reader-content.md h1{font-size:21px;margin-top:26px;margin-bottom:12px;font-weight:500}
.reader-content.md h2{font-size:18px;margin-top:22px;margin-bottom:10px;font-weight:500}
.reader-content.md h3{font-size:15px;margin-top:18px;margin-bottom:8px;color:var(--text);font-weight:500}
.reader-content.md p{margin-bottom:13px}
.reader-content.md ul,.reader-content.md ol{padding-left:24px;margin-bottom:13px}
.reader-content.md li{margin-bottom:5px}
.reader-content.md code{font-size:13px}
.reader-content.md table{font-size:13px}
.reader-content.md th,.reader-content.md td{padding:7px 11px}
.reader-content.md blockquote{padding:8px 14px;margin:10px 0}
@media(max-width:600px){
  .reader-overlay{padding:0}
  .reader-modal{max-width:100vw;max-height:100vh;height:100vh;border-radius:0}
  .reader-content{padding:22px 18px 28px;font-size:14px}
  .reader-title{font-size:22px;margin-bottom:18px}
  .reader-content.md h1{font-size:18px}
  .reader-content.md h2{font-size:16px}
  .reader-header{padding:11px 14px}
}
/* Exam (成績) styles */
.judg-badge{display:inline-block;min-width:22px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;text-align:center;font-family:'Inter',sans-serif}
.judg-badge.big{font-size:18px;min-width:44px;padding:6px 12px;border-radius:6px}
.j-A{background:#dcfce7;color:#166534}
.j-B{background:#dbeafe;color:#1e40af}
.j-C{background:#fef3c7;color:#92400e}
.j-D{background:#fed7aa;color:#9a3412}
.j-E{background:#fee2e2;color:#991b1b}
.j-N{background:var(--bg2);color:var(--text3)}
.exam-card{border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;background:var(--card);margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.exam-card:hover{border-color:var(--blue-mid)}
.exam-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.exam-card-title{font-size:14px;font-weight:500;line-height:1.45;flex:1;min-width:0}
.exam-card-meta{font-size:12px;color:var(--text3);margin-bottom:6px;display:flex;flex-wrap:wrap;gap:8px}
.exam-card-questions{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--text2);margin-bottom:4px}
.exam-card-questions span{display:inline-flex;align-items:center;gap:4px}
.exam-card-total{font-size:12px;color:var(--text2)}
.exam-card-total b{color:var(--text);font-weight:600;font-family:'Inter',sans-serif}
.exam-card-memo-preview{margin-top:6px;padding:6px 8px;background:var(--bg2);border-radius:4px;font-size:11px;color:var(--text2);line-height:1.5;white-space:pre-wrap;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.exam-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px}
.exam-table th,.exam-table td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
.exam-table th{background:var(--bg2);font-weight:500;color:var(--text2);font-size:12px}
.exam-table td.num{font-family:'Inter',sans-serif;text-align:right;white-space:nowrap}
.exam-table td.center{text-align:center}
.exam-table tr.total-row td{background:var(--blue-bg);font-weight:500}
.topic-chip{display:inline-block;padding:2px 8px;background:var(--bg2);border-radius:11px;font-size:11px;color:var(--text2);margin:2px 4px 2px 0;line-height:1.6}
.import-section{margin-bottom:16px}
.import-section-label{font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.import-q-row{border:1px solid var(--border);border-radius:var(--r);padding:12px;background:var(--bg2);margin-bottom:10px}
.import-q-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.import-q-grid label{font-size:11px;color:var(--text3);margin-bottom:2px;display:block}
.import-q-grid input,.import-q-grid select{font-size:13px;padding:5px 8px;width:100%;margin:0;font-family:'Inter',sans-serif}
.import-q-grid input[type="text"]{font-family:inherit}
.import-q-topics{font-size:12px}
.import-q-topics textarea{font-size:12px;padding:6px 8px;width:100%;min-height:48px;resize:vertical;font-family:inherit}
/* ===== Memorize ===== */
.mem-table{width:100%;border-collapse:collapse;font-size:15px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.mem-table th{background:var(--bg2);color:var(--text2);font-weight:500;font-size:13px;padding:10px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.mem-table td{padding:12px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.mem-table tr:last-child td{border-bottom:none}
.mem-table tr.mem-row{cursor:pointer}
.mem-table tr.mem-row:hover td{background:var(--bg2)}
.mem-table tr.mem-overdue td{background:rgba(155,44,44,0.05)}
.mem-table tr.mem-overdue:hover td{background:rgba(155,44,44,0.09)}
.mem-table tr.mem-today td{background:rgba(122,74,10,0.06)}
.mem-table tr.mem-today:hover td{background:rgba(122,74,10,0.1)}
.mem-topic{font-weight:500;color:var(--text)}
.mem-pnum{color:var(--text2);font-size:13px;font-family:'Inter',sans-serif}
.recall-chip{display:inline-block;min-width:24px;padding:3px 8px;border-radius:4px;font-size:13px;font-weight:600;text-align:center;font-family:'Inter',sans-serif}
.recall-0{background:var(--red-bg);color:var(--red)}
.recall-1{background:var(--rose-bg);color:var(--rose)}
.recall-2{background:var(--amber-bg);color:var(--amber)}
.recall-3{background:var(--blue-bg);color:var(--blue)}
.recall-4{background:var(--green-bg);color:var(--green)}
.imp-chip{display:inline-block;min-width:20px;padding:2px 7px;border-radius:3px;font-size:13px;font-weight:600;text-align:center;font-family:'Inter',sans-serif}
.imp-A{background:var(--red-bg);color:var(--red)}
.imp-B{background:var(--amber-bg);color:var(--amber)}
.imp-C{background:var(--bg2);color:var(--text2)}
.pref-chip{display:inline-block;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:600;background:var(--purple-bg,#f5f3ff);color:var(--purple,#7c3aed)}
/* 企業法 種類チップ (論点=緑 / 趣旨=黄 / 要件=ピンク / 判例=紫 / 条文番号=茶) */
.law-sub-chip{display:inline-block;padding:3px 9px;border-radius:4px;font-size:13px;font-weight:600;text-align:center;white-space:nowrap;border:1px solid transparent}
.law-sub-論点{background:#dcfce7;color:#15803d;border-color:#86efac}
.law-sub-趣旨{background:#fef3c7;color:#a16207;border-color:#fcd34d}
.law-sub-要件{background:#fce7f3;color:#be185d;border-color:#f9a8d4}
.law-sub-判例{background:#ede9fe;color:#6d28d9;border-color:#c4b5fd}
.law-sub-条文番号{background:#f5e9da;color:#78350f;border-color:#d6b48a}
.recall-btn-row{display:flex;gap:6px;flex-wrap:wrap}
.recall-btn{flex:1;min-width:48px;padding:8px 4px;border-radius:var(--r);font-size:11px;font-family:inherit;border:1px solid var(--border2);background:var(--card);color:var(--text);cursor:pointer;text-align:center;line-height:1.3}
.recall-btn:hover{background:var(--bg2)}
.recall-btn .num{display:block;font-size:18px;font-weight:600;font-family:'Inter',sans-serif;line-height:1.2}
.recall-btn .lbl{display:block;font-size:10px;color:var(--text3);margin-top:2px}
.recall-btn.lvl-0{border-color:var(--red);color:var(--red)}
.recall-btn.lvl-1{border-color:var(--rose);color:var(--rose)}
.recall-btn.lvl-2{border-color:var(--amber);color:var(--amber)}
.recall-btn.lvl-3{border-color:var(--blue);color:var(--blue)}
.recall-btn.lvl-4{border-color:var(--green);color:var(--green)}
.recall-btn.active{color:#fff}
.recall-btn.lvl-0.active{background:var(--red);border-color:var(--red)}
.recall-btn.lvl-1.active{background:var(--rose);border-color:var(--rose)}
.recall-btn.lvl-2.active{background:var(--amber);border-color:var(--amber)}
.recall-btn.lvl-3.active{background:var(--blue);border-color:var(--blue)}
.recall-btn.lvl-4.active{background:var(--green);border-color:var(--green)}
.recall-btn.active .lbl{color:rgba(255,255,255,0.85)}
.mem-due-date{font-family:'Inter',sans-serif;font-size:13px;white-space:nowrap}
.mem-due-overdue{color:var(--red);font-weight:600}
.mem-due-today{color:var(--amber);font-weight:600}
.mem-empty{text-align:center;padding:36px 12px;color:var(--text3);font-size:14px}
.subtopic-filter-bar{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.plan-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.plan-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.plan-card-head{margin-bottom:8px}
.plan-text{width:100%;min-height:80px;padding:8px 10px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit;font-size:14px;resize:vertical;box-sizing:border-box;line-height:1.6}
.plan-text:focus{outline:none;border-color:var(--blue);background:var(--card)}
.plan-todo{display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid var(--border);font-size:14px}
.plan-todo:last-child{border-bottom:none}
.plan-todo label{display:flex;align-items:center;gap:8px;flex:1;cursor:pointer;min-width:0}
.plan-todo input[type=checkbox]{width:18px;height:18px;cursor:pointer;flex-shrink:0}
.plan-todo-label{flex:1;min-width:0;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.plan-done .plan-todo-label{text-decoration:line-through;color:var(--text3)}
.plan-tag{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600;flex-shrink:0}
.plan-list-row{display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid var(--border);font-size:13px}
.plan-list-row:last-child{border-bottom:none}
.plan-day-cat{font-size:13px;background:var(--bg2);padding:2px 8px;border-radius:4px;color:var(--text2)}
.plan-day-cat b{color:var(--text);font-weight:600}
.plan-subj-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px}
.plan-subj-head{margin-bottom:8px}
.plan-fields{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.plan-month-field,.plan-week-field{background:var(--bg2);padding:8px 10px;border-radius:6px}
.plan-month-field label,.plan-week-field label{display:block;font-size:11px;color:var(--text3);margin-bottom:4px}
.plan-month-field input[type=number],.plan-week-field input[type=number]{padding:3px 6px;font-size:13px;border:1px solid var(--border2);border-radius:4px;background:var(--card)}
@media (max-width:780px){.plan-grid{grid-template-columns:1fr}.plan-fields{grid-template-columns:1fr}}
.btn-xs{font-size:10px;padding:2px 6px;line-height:1.2}
.plan-cat-badge{font-size:10px;background:var(--blue-bg);color:var(--blue);padding:1px 5px;border-radius:3px;margin-left:4px;font-weight:500;font-family:'Inter',sans-serif}
.plan-dow-row{display:flex;gap:8px;flex-wrap:wrap}
.plan-dow-check{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:13px;user-select:none}
.plan-dow-check input{margin:0}
.plan-dow-check:has(input:checked){background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
/* 予定 カレンダービュー */
.plan-cal-week{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--card);overflow-x:auto}
.plan-cal-head,.plan-cal-row{display:grid;grid-template-columns:90px repeat(7,1fr);min-width:680px}
.plan-cal-head{background:var(--bg2);border-bottom:1px solid var(--border)}
.plan-cal-day-head{padding:6px 4px;text-align:center;font-size:12px;font-weight:500;color:var(--text2);border-left:1px solid var(--border)}
.plan-cal-day-head.plan-cal-today{background:var(--blue-bg);color:var(--blue)}
.plan-cal-subj-col{padding:8px 6px;border-right:1px solid var(--border);background:var(--bg2);font-size:12px;display:flex;align-items:center}
.plan-cal-row{border-top:1px solid var(--border)}
.plan-cal-cell{padding:6px 4px;border-left:1px solid var(--border);min-height:32px;display:flex;flex-direction:column;gap:3px;align-items:center;justify-content:center}
.plan-cal-cell.plan-cal-today{background:var(--blue-bg)}
.plan-cal-cat{display:inline-block;font-size:11px;background:var(--bg2);padding:1px 5px;border-radius:3px;color:var(--text);white-space:nowrap}
.plan-cal-mark{font-size:9px;color:var(--purple,#7c3aed);margin-left:2px}
.plan-cal-spot{font-size:10px;background:var(--purple-bg,#f5f3ff);color:var(--purple,#7c3aed);padding:1px 4px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
/* 月カレンダー */
.plan-mcal{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--card)}
.plan-mcal-head{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg2);border-bottom:1px solid var(--border)}
.plan-mcal-head>div{padding:6px;text-align:center;font-size:11px;color:var(--text2);font-weight:500;border-left:1px solid var(--border)}
.plan-mcal-head>div:first-child{border-left:none}
.plan-mcal-row{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--border)}
.plan-mcal-row:first-child{border-top:none}
.plan-mcal-cell{min-height:64px;padding:4px;border-left:1px solid var(--border);position:relative;cursor:default;display:flex;flex-direction:column;gap:2px}
.plan-mcal-cell:first-child{border-left:none}
.plan-mcal-cell.plan-mcal-out{background:var(--bg2);opacity:0.5}
.plan-mcal-cell.plan-mcal-today{background:var(--blue-bg)}
.plan-mcal-date{font-size:11px;color:var(--text2);font-weight:500}
.plan-mcal-spot{font-size:11px;color:var(--purple,#7c3aed)}
.plan-mcal-spots{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.plan-mcal-spot-chip{display:inline-block;padding:1px 4px;font-size:9px;border-radius:3px;font-weight:500;line-height:1.3}
.plan-mcal-tasks{display:flex;flex-direction:column;gap:2px;margin-top:auto}
.plan-mcal-task{display:inline-block;padding:1px 4px;font-size:10px;border-radius:3px;font-weight:500;line-height:1.4;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.plan-mcal-markers{display:flex;flex-wrap:wrap;gap:2px;margin-top:auto}
.plan-mcal-mark{display:inline-block;width:10px;height:10px;border-radius:50%}
.plan-mcal-legend{display:inline-flex;align-items:center;gap:3px}
.plan-mcal-legend .plan-mcal-mark{width:8px;height:8px}
.plan-day-input{width:42px;padding:1px 4px;font-size:13px;border:1px solid var(--border2);border-radius:3px;background:var(--card);text-align:center;margin:0 2px;font-family:'Inter',sans-serif}
.plan-day-input:disabled{background:var(--bg2);color:var(--text3)}
.dash-goal-section{display:flex;flex-direction:column;gap:6px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.dash-goal-section:last-child{border-bottom:none;padding-bottom:0}
.dash-goal-section + .dash-goal-section{padding-top:8px}
.dash-goal-auto-badge{display:inline-block;min-width:74px;text-align:center;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;flex-shrink:0}
/* バッジカラーを直接マークに当てる(b-financialなどは既存) */
.plan-mcal-mark.b-financial{background:var(--blue)}
.plan-mcal-mark.b-managerial{background:var(--teal)}
.plan-mcal-mark.b-audit{background:var(--rose)}
.plan-mcal-mark.b-law{background:var(--green)}
.plan-mcal-mark.b-tax{background:var(--amber)}
.plan-mcal-mark.b-business{background:var(--purple)}
.plan-mcal-cell.plan-mcal-heavy-1:not(.plan-mcal-out){background:rgba(249,115,22,0.18)}
.plan-mcal-cell.plan-mcal-heavy-2:not(.plan-mcal-out){background:rgba(249,115,22,0.10)}
.plan-mcal-cell.plan-mcal-heavy-3:not(.plan-mcal-out){background:rgba(250,204,21,0.14)}
.plan-mcal-cell.plan-mcal-today.plan-mcal-heavy-1,.plan-mcal-cell.plan-mcal-today.plan-mcal-heavy-2,.plan-mcal-cell.plan-mcal-today.plan-mcal-heavy-3{box-shadow:inset 0 0 0 2px var(--amber,#f59e0b)}
.plan-mcal-due-row{display:flex;flex-wrap:wrap;gap:2px;padding-top:3px;margin-top:2px;border-top:1px dashed var(--border2,#e5e7eb)}
.plan-mcal-due-chip{display:inline-block;padding:1px 3px;font-size:9px;border-radius:3px;font-weight:600;line-height:1.4}


/* ダッシュボードの今日の目標カード */
.dash-goal-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;cursor:pointer;transition:border-color .15s}
.dash-goal-card:hover{border-color:var(--blue)}
.dash-goal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.dash-goal-title{font-size:13px;font-weight:500;color:var(--text)}
.dash-goal-date{font-size:11px;color:var(--text3)}
.dash-goal-spot{font-size:12px;color:var(--purple,#7c3aed);background:var(--purple-bg,#f5f3ff);padding:4px 8px;border-radius:4px;margin-bottom:8px}
.dash-goal-body{display:flex;flex-direction:column;gap:6px}
.dash-goal-row{display:flex;align-items:center;gap:10px;font-size:13px}
.dash-goal-badge{min-width:74px;text-align:center;font-size:11px;flex-shrink:0}
.dash-goal-cats{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1}
.dash-goal-cat{display:inline-flex;align-items:center;gap:3px;background:var(--bg2);padding:2px 8px;border-radius:4px;color:var(--text2);font-size:12px}
.dash-goal-cat b{color:var(--text);font-weight:600;font-size:14px}
.dash-goal-unit{color:var(--text3);font-size:11px}
.dash-goal-mark{font-size:10px;color:var(--purple,#7c3aed);background:var(--purple-bg,#f5f3ff);padding:1px 4px;border-radius:3px;margin-left:2px;font-weight:500}
.dash-goal-keep{font-size:12px;color:var(--blue);background:var(--blue-bg);padding:2px 8px;border-radius:4px;font-weight:500}
@media (max-width:780px){.dash-goal-row{flex-wrap:wrap}.dash-goal-badge{min-width:0}}
/* 科目別統合ダッシュボード */
.dash-date-header{font-size:12px;color:var(--text3);text-align:right;margin-bottom:10px;font-weight:500}
.dash-subj-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.dash-subj-card:hover{border-color:var(--blue)}
.dash-subj-header{display:flex;align-items:center;justify-content:space-between;gap:8px}
.dash-subj-exam{display:flex;flex-direction:column;align-items:center;min-width:44px;flex-shrink:0}
.dash-subj-exam-sub{font-size:9px;color:var(--text3);white-space:nowrap}
.dash-subj-body{margin-top:6px}
.dash-subj-stats{font-size:11px;color:var(--text3);margin-top:5px}
.dash-subj-spot{font-size:11px;color:var(--purple,#7c3aed);background:var(--purple-bg,#f5f3ff);padding:3px 8px;border-radius:4px;margin-top:4px}
.dash-review-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--text2);padding:10px 0}
@media(max-width:480px){.dash-subj-header{gap:4px}.dash-goal-badge{min-width:60px;font-size:10px}}
/* ダッシュボード テーブル */
.dash-table{width:100%;border-collapse:collapse;font-size:15px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.dash-table thead th{background:var(--bg2);color:var(--text3);font-weight:500;font-size:12px;padding:9px 12px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
.dash-table thead th:first-child{text-align:left;padding-left:14px}
.dash-table tbody td{padding:12px 12px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
.dash-table tbody td:first-child{text-align:left;padding-left:14px}
.dash-table tbody tr:last-child td{border-bottom:none}
.dash-total-row td{background:var(--bg2);border-top:2px solid var(--border2)!important;font-weight:600}
.dash-cell-empty{color:var(--text3);font-size:13px}
.dash-cell-val{font-weight:600;font-size:16px}
.dash-cell-unit{font-size:12px;color:var(--text3);margin-left:1px}
.dash-cell-sub{font-size:11px;margin-top:1px}
.dash-cell-done{font-weight:600;font-size:16px;color:var(--green)}
.dash-cell-slash{color:var(--text3);font-weight:400;font-size:12px;margin:0 1px}
@media(max-width:600px){.dash-table{font-size:13px}.dash-cell-val{font-size:14px}.dash-cell-done{font-size:14px}.dash-table thead th,.dash-table tbody td{padding:8px 6px}}
/* ===== 計算 ===== */
.calc-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.calc-table th{background:var(--bg2);color:var(--text2);font-weight:500;font-size:12px;padding:9px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.calc-table td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.calc-table tr:last-child td{border-bottom:none}
.calc-table tr.calc-row{cursor:pointer}
.calc-table tr.calc-row:hover td{background:var(--bg2)}
.calc-hist-row{display:inline-flex;gap:3px;flex-wrap:nowrap;align-items:center}
.calc-result-chip{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;line-height:1}
.calc-result-o{background:var(--green-bg,#dcfce7);color:var(--green,#15803d);border:1px solid var(--green,#15803d)}
.calc-result-x{background:var(--red-bg,#fee2e2);color:var(--red,#b91c1c);border:1px solid var(--red,#b91c1c)}
.calc-result-t{background:var(--amber-bg,#fef3c7);color:var(--amber,#a16207);border:1px solid var(--amber,#a16207)}
.calc-result-btn{flex:1;min-width:60px;padding:14px 8px;border-radius:var(--r);font-size:14px;font-weight:600;font-family:inherit;border:1px solid var(--border2);background:var(--card);color:var(--text);cursor:pointer;text-align:center;line-height:1.2}
.calc-result-btn:hover{background:var(--bg2)}
.calc-result-btn.r-o{border-color:var(--green,#15803d);color:var(--green,#15803d)}
.calc-result-btn.r-x{border-color:var(--red,#b91c1c);color:var(--red,#b91c1c)}
.calc-result-btn.r-t{border-color:var(--amber,#a16207);color:var(--amber,#a16207)}
.calc-result-btn.r-o:hover{background:var(--green-bg,#dcfce7)}
.calc-result-btn.r-x:hover{background:var(--red-bg,#fee2e2)}
.calc-result-btn.r-t:hover{background:var(--amber-bg,#fef3c7)}
.calc-hist-full{display:flex;flex-direction:column;gap:6px}
.calc-hist-item{display:flex;align-items:center;gap:10px;padding:6px 10px;background:var(--bg2);border-radius:4px;font-size:12px}

function initDB(){return new Promise((res,rej)=>{const r=indexedDB.open('StudyAppV2',6);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('notes')){const s=d.createObjectStore('notes',{keyPath:'id'});s.createIndex('subjectId','subjectId',{unique:false});}if(!d.objectStoreNames.contains('questions')){const s=d.createObjectStore('questions',{keyPath:'id'});s.createIndex('subjectId','subjectId',{unique:false});s.createIndex('nextReview','nextReview',{unique:false});}if(!d.objectStoreNames.contains('settings'))d.createObjectStore('settings',{keyPath:'key'});if(!d.objectStoreNames.contains('exams')){const s=d.createObjectStore('exams',{keyPath:'id'});s.createIndex('subjectInternal','subjectInternal',{unique:false});s.createIndex('examDate','examDate',{unique:false});}if(!d.objectStoreNames.contains('memorize')){const s=d.createObjectStore('memorize',{keyPath:'id'});s.createIndex('subject','subject',{unique:false});s.createIndex('nextDueDate','nextDueDate',{unique:false});}if(!d.objectStoreNames.contains('calc')){const s=d.createObjectStore('calc',{keyPath:'id'});s.createIndex('subject','subject',{unique:false});}};r.onsuccess=e=>{db=e.target.result;res();};r.onerror=rej;});}

/* ===== PKCE OAuth (ポップアップ) ===== */
let gToken=null,gExpiry=0;

function randomString(len){
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  const arr=crypto.getRandomValues(new Uint8Array(len));
  return Array.from(arr,b=>chars[b%chars.length]).join('');
}
async function codeChallenge(verifier){
  const data=new TextEncoder().encode(verifier);
  const digest=await crypto.subtle.digest('SHA-256',data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function authenticate(){
  const clientId=await getSetting('googleClientId');
  const clientSecret=await getSetting('googleClientSecret');
  if(!clientId||!clientSecret) throw new Error('クライアントIDとシークレットを設定してください');
  const verifier=randomString(64);
  const challenge=await codeChallenge(verifier);
  const redirectUri=window.location.origin+window.location.pathname;
  const params=new URLSearchParams({
    client_id:clientId,redirect_uri:redirectUri,response_type:'code',
    scope:'https://www.googleapis.com/auth/drive.file',
    code_challenge:challenge,code_challenge_method:'S256',
    access_type:'offline',prompt:'select_account'
  });
  showAlert('settings-alert','Googleアカウントの認証画面をポップアップで開きます...','info');
  const popup=window.open('https://accounts.google.com/o/oauth2/v2/auth?'+params.toString(),'oauth_popup','width=520,height=640,scrollbars=yes');
  if(!popup) throw new Error('ポップアップがブロックされました。ブラウザのアドレスバー右端の通知からポップアップを許可してください');
  return new Promise((resolve,reject)=>{
    const timer=setInterval(async()=>{
      if(popup.closed){clearInterval(timer);reject(new Error('認証がキャンセルされました'));return;}
      try{
        const url=popup.location.href;
        if(url.startsWith(redirectUri)){
          clearInterval(timer);popup.close();
          const p=new URLSearchParams(new URL(url).search);
          const err=p.get('error');if(err){reject(new Error('認証エラー: '+err));return;}
          const code=p.get('code');if(!code){reject(new Error('認証コードが取得できませんでした'));return;}
          try{
            const resp=await fetch('https://oauth2.googleapis.com/token',{
              method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
              body:new URLSearchParams({client_id:clientId,client_secret:clientSecret,code,code_verifier:verifier,grant_type:'authorization_code',redirect_uri:redirectUri})
            });
            const data=await resp.json();
            if(!data.access_token) throw new Error(data.error_description||JSON.stringify(data));
            gToken=data.access_token;
            gExpiry=Date.now()+(data.expires_in-60)*1000;
            resolve(gToken);
          }catch(e){reject(e);}
        }
      }catch(e){/* まだGoogleのドメイン上 */}
    },500);
  });
}

async function getToken(){
  if(gToken&&Date.now()<gExpiry) return gToken;
  return await authenticate();
}

/* ===== Drive API ===== */
async function driveUpload(token,filename,content){
  const q=encodeURIComponent(`name='${filename}' and trashed=false`);
  const sr=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`,{headers:{Authorization:`Bearer ${token}`}});
  const sd=await sr.json();const eid=sd.files?.[0]?.id;
  const b='sa_bound';
  const body=`--${b}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify({name:filename,mimeType:'application/json'})}\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${b}--`;
  const url=eid?`https://www.googleapis.com/upload/drive/v3/files/${eid}?uploadType=multipart`:'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  const r=await fetch(url,{method:eid?'PATCH':'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':`multipart/related; boundary=${b}`},body});
  if(!r.ok) throw new Error('Driveへの保存に失敗しました ('+r.status+')');
  return r.json();
}
async function driveDownloadLatest(token){
  const q=encodeURIComponent(`name contains 'study_backup' and trashed=false`);
  const sr=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&orderBy=modifiedTime+desc&pageSize=1&fields=files(id,name,modifiedTime)`,{headers:{Authorization:`Bearer ${token}`}});
  const d=await sr.json();if(!d.files?.length) return null;
  const r=await fetch(`https://www.googleapis.com/drive/v3/files/${d.files[0].id}?alt=media`,{headers:{Authorization:`Bearer ${token}`}});
  if(!r.ok) throw new Error('ファイルの取得に失敗しました');
  return{content:await r.text(),name:d.files[0].name,modified:d.files[0].modifiedTime};
}

async function backupToGDrive(){
  const cid=await getSetting('googleClientId'),cs=await getSetting('googleClientSecret');

    renderSettings();
  }catch(e){showAlert('settings-alert','エラー: '+e.message,'danger');}
}

async function restoreFromGDrive(){
  const cid=await getSetting('googleClientId'),cs=await getSetting('googleClientSecret');
  if(!cid||!cs){showAlert('settings-alert','クライアントIDとシークレットを先に設定・保存してください','warning');return;}
  try{
    const token=await getToken();
    showAlert('settings-alert','バックアップファイルを検索中...','info');
    const result=await driveDownloadLatest(token);

    const data=JSON.parse(result.content);
    if(!data.notes||!data.questions) throw new Error('無効なファイル形式');

    const memCount=(data.memorize||[]).length;
    const calcCount=(data.calc||[]).length;

    if(!confirm(`「${result.name}」（${md}）から復元します。現在のデータは上書きされます。続行しますか？`))return;
    await dbClear('notes');await dbClear('questions');try{await dbClear('exams');}catch(e){}try{await dbClear('memorize');}catch(e){}try{await dbClear('calc');}catch(e){}
    for(const n of data.notes) await dbPut('notes',n);
    for(const q of data.questions) await dbPut('questions',q);
    if(data.exams)for(const e of data.exams) await dbPut('exams',e);
    if(data.memorize)for(const m of data.memorize) await dbPut('memorize',m);
    if(data.calc)for(const c of data.calc) await dbPut('calc',c);
    if(data.plans) await applyPlanSettings(data.plans);
    const planCount=data.plans?Object.keys(data.plans).length:0;
    showAlert('settings-alert','✓ 復元完了: '+data.notes.length+'件のノートと'+data.questions.length+'件の問題'+(examCount?'、'+examCount+'件の答練成績':'')+(memCount?'、'+memCount+'件の暗記項目':'')+(calcCount?'、'+calcCount+'件の計算問題':'')+(planCount?'、予定データ'+planCount+'件':'')+'を復元しました','success');
    renderSettings();
  }catch(e){showAlert('settings-alert','エラー: '+e.message,'danger');}
}


// ===== 予定タブ関連の settings キー一覧 =====
// version 6 バックアップに含めるための補助関数
const PLAN_SETTING_PREFIXES = ['planMonthGoals:', 'planWeekOverride:', 'planDayOverride:', 'planProgress:', 'subjectExamMemo:'];
const PLAN_SETTING_KEYS = ['planSpotTasks'];
async function collectPlanSettings(){
  // バックアップに含める予定データを { keyName: value } 形式で返す
  const out = {};
  // 単独キー
  for(const k of PLAN_SETTING_KEYS){
    const v = await getSetting(k);
    if(v !== undefined) out[k] = v;
  }
  // 接頭辞キー（複合キー含む）→ 全列挙
  for(const prefix of PLAN_SETTING_PREFIXES){
    const keys = await listSettingsKeys(prefix);
    for(const k of keys){
      const v = await getSetting(k);
      if(v !== undefined) out[k] = v;
    }
  }
  return out;
}
async function applyPlanSettings(plans){
  if(!plans || typeof plans !== 'object') return;
  for(const [k, v] of Object.entries(plans)){
    // 安全のため、予定タブ関連のキーだけ復元する
    const isPlanKey = PLAN_SETTING_KEYS.includes(k) ||
                       PLAN_SETTING_PREFIXES.some(p => k.startsWith(p));
    if(isPlanKey) await setSetting(k, v);
  }
}

/* ===== Spaced Repetition (5-level fixed) ===== */
const REVIEW_INTERVALS=[1,3,7,14,30];
function getCardLevel(c){
  if(c.level!==undefined)return c.level;
  // Migrate from old SM-2 data
  if(c.repetitions&&c.interval!==undefined){
    const i=c.interval;
    if(i<=1)return 0;if(i<=4)return 1;if(i<=10)return 2;if(i<=21)return 3;return 4;
  }
  return 0;
}
function nextLevelFor(c,q){
  let lv=getCardLevel(c);
  if(q===2)lv=Math.min(REVIEW_INTERVALS.length-1,lv+1);
  else if(q===0)lv=Math.max(0,lv-1);
  return lv;
}
function reviewUpdate(c,q){
  c.level=nextLevelFor(c,q);
  c.interval=REVIEW_INTERVALS[c.level];
  const n=new Date();n.setDate(n.getDate()+c.interval);
  c.nextReview=n.toISOString().split('T')[0];
  c.lastReview=today();
  if(!c.history)c.history=[];
  c.history.push({date:today(),quality:q});
  return c;
}
function dayLabel(d){return d===1?'明日':d+'日後';}
// 要復習判定の切替時刻: 0:00-2:59 は前日扱い (深夜まで勉強した分を引き継ぐ)。
// 比較対象が UTC ベース(toISOString)ではなくローカル日付(YYYY-MM-DD)の場合があるため、ローカル日付で比較する。
function effectiveTodayLocal(){
  const d=new Date();
  if(d.getHours()<3)d.setDate(d.getDate()-1);
  const y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0'),da=String(d.getDate()).padStart(2,'0');
  return `${y}-${mo}-${da}`;
}
function isDue(c){return !c.nextReview||c.nextReview<=effectiveTodayLocal();}

/* ===== Topic Order & Reorder ===== */
/* Tax subjects keep separate topicOrder per tax type (法人税/消費税/所得税).
   Non-tax subjects use a single topicOrder per subject. */
function topicOrderKey(subjectId,subTopic){
  if(subjectId==='tax'&&subTopic)return `topicOrder_${subjectId}_${subTopic}`;
  return `topicOrder_${subjectId}`;
}
/* Returns the active sub-topic for filtering/saving in the given view.
   For non-tax subjects, returns ''. */
function activeSubTopicFor(view){
  if(view==='notes')return S.noteFilter==='tax'?S.noteTaxSub:'';
  if(view==='questions')return S.qFilter==='tax'?S.qTaxSub:'';
  return '';
}
async function getTopicOrder(subjectId,subTopic){return await getSetting(topicOrderKey(subjectId,subTopic))||[];}
async function setTopicOrder(subjectId,subTopic,arr){await setSetting(topicOrderKey(subjectId,subTopic),arr);}
async function ensureTopicInOrder(subjectId,subTopic,topicTag){
  if(!topicTag)return;
  const arr=await getTopicOrder(subjectId,subTopic);
  if(!arr.includes(topicTag)){arr.push(topicTag);await setTopicOrder(subjectId,subTopic,arr);}
}
async function loadEditorTopicOrders(){
  _editorTopicOrders={};
  for(const s of SUBJECTS){
    if(s.id==='tax'){
      for(const t of TAX_SUBS) _editorTopicOrders[topicOrderKey('tax',t)]=await getTopicOrder('tax',t);
    }else{
      _editorTopicOrders[topicOrderKey(s.id)]=await getTopicOrder(s.id);
    }
  }
}
async function addTopicTag(){
  if(S.noteFilter==='all'){alert('科目を選んでから論点を追加してください');return;}
  const subTopic=activeSubTopicFor('notes');
  const labelExtra=S.noteFilter==='tax'?`／${subTopic}`:'';
  const name=prompt(`論点タグ名を入力してください（${sName(S.noteFilter)}${labelExtra}）`);
  if(!name)return;
  const tag=name.trim();
  if(!tag)return;
  const existing=await getTopicOrder(S.noteFilter,subTopic);
  if(existing.includes(tag)){alert('その論点はすでに登録されています');return;}
  await ensureTopicInOrder(S.noteFilter,subTopic,tag);
  // Sync the editor cache so an open editor reflects the new topic
  _editorTopicOrders[topicOrderKey(S.noteFilter,subTopic)]=await getTopicOrder(S.noteFilter,subTopic);
  S.expandedTopics.add(tag);
  S.expandedQTopics.add(tag);
  renderNotes();
}
async function deleteEmptyTopicByIndex(idx){
  const key=_topicKeysCache[idx];
  if(!key||key==='__untagged__')return;
  if(!confirm(`論点「${key}」を削除しますか？\n（この論点に紐づくノート・問題はありません）`))return;
  const subTopic=activeSubTopicFor('notes');
  const arr=await getTopicOrder(S.noteFilter,subTopic);
  await setTopicOrder(S.noteFilter,subTopic,arr.filter(t=>t!==key));
  _editorTopicOrders[topicOrderKey(S.noteFilter,subTopic)]=await getTopicOrder(S.noteFilter,subTopic);
  S.expandedTopics.delete(key);

async function moveTopic(idx,dir,mode){
  const cache=mode==='notes'?_topicKeysCache:_qTopicKeysCache;
  const subject=mode==='notes'?S.noteFilter:S.qFilter;
  const subTopic=activeSubTopicFor(mode);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=cache.length)return;
  if(cache[idx]==='__untagged__'||cache[newIdx]==='__untagged__')return;
  const keys=[...cache];[keys[idx],keys[newIdx]]=[keys[newIdx],keys[idx]];
  await setTopicOrder(subject,subTopic,keys.filter(k=>k!=='__untagged__'));
  if(mode==='notes')renderNotes();else renderQuestions();
}
async function moveItem(id,dir,store,renderFn){
  const all=await dbAll(store);
  const item=all.find(x=>x.id===id);
  if(!item)return;
  /* For tax, siblings are scoped to same subTopic so that reordering within
     one tax type (e.g. 法人税) does not interfere with another. */
  const sameContext=x=>x.subjectId===item.subjectId&&(x.topicTag||'')===(item.topicTag||'')&&(item.subjectId!=='tax'||(x.subTopic||'')===(item.subTopic||''));
  const siblings=all.filter(sameContext).sort((a,b)=>orderVal(a)-orderVal(b));
  const idx=siblings.findIndex(x=>x.id===id),newIdx=idx+dir;
  if(newIdx<0||newIdx>=siblings.length)return;
  const other=siblings[newIdx];
  const oA=orderVal(item),oB=orderVal(other);
  item.order=oB;other.order=oA;
  await dbPut(store,item);await dbPut(store,other);
  renderFn();
}

// 旧データで残った subTopic (例: 科目変更後に残った'法人税') が他科目に紛れ込むのを防ぐ。
// rec は subjectId(notes/questions) or subject(memorize) を持つ

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderMd(t){if(!t)return'';return window.marked?marked.parse(t):t.replace(/\n/g,'<br>');}
function setupMarked(){
  if(!window.marked||!marked.use)return;
  marked.use({extensions:[{
    name:'highlight',level:'inline',
    start(src){const m=src.match(/==[^=]/);return m?m.index:undefined;},
    tokenizer(src){const m=/^==([^=]+?)==/.exec(src);if(m)return{type:'highlight',raw:m[0],text:m[1]};},
    renderer(t){return `<mark>${t.text}</mark>`;}
  },{
    /* Journal entry (仕訳) block.
       Syntax:
         ```journal
         現金 1000 | 売上 1000
         売掛金 500 |
         | 受取手数料 200
         ```
       Each line: "<debit item> <amount> | <credit item> <amount>".
       Either side may be empty. Amount must be a numeric string. */
    name:'journal',level:'block',
    start(src){const m=src.match(/^```journal[ \t]*\n/m);return m?m.index:undefined;},
    tokenizer(src){
      const m=/^```journal[ \t]*\n([\s\S]*?)\n```[ \t]*(?:\n|$)/.exec(src);
      if(!m)return;
      const rows=m[1].split('\n').filter(l=>l.length>0).map(line=>{
        const sides=line.split('|');
        const left=(sides[0]||'').trim();
        const right=(sides[1]||'').trim();
        return{debit:parseJournalSide(left),credit:parseJournalSide(right)};
      });
      return{type:'journal',raw:m[0],rows};
    },
    renderer(token){
      const rows=token.rows.map(r=>{
        const dItem=r.debit.item?`<td class="j-item">${esc(r.debit.item)}</td>`:`<td class="j-item j-empty">―</td>`;
        const dAmt=r.debit.amount?`<td class="j-num">${esc(fmtJournalNum(r.debit.amount))}</td>`:`<td class="j-num j-empty">―</td>`;
        const cItem=r.credit.item?`<td class="j-item">${esc(r.credit.item)}</td>`:`<td class="j-item j-empty">―</td>`;
        const cAmt=r.credit.amount?`<td class="j-num">${esc(fmtJournalNum(r.credit.amount))}</td>`:`<td class="j-num j-empty">―</td>`;
        return `<tr>${dItem}${dAmt}${cItem}${cAmt}</tr>`;
      }).join('');
      return `<table class="journal-table"><caption>仕訳</caption><thead><tr><th colspan="2">借方</th><th colspan="2">貸方</th></tr><tr><th>科目</th><th>金額</th><th>科目</th><th>金額</th></tr></thead><tbody>${rows}</tbody></table>`;
    }
  }]});
}
function parseJournalSide(s){
  if(!s)return{item:'',amount:''};
  // last whitespace-separated token that looks numeric is the amount
  const parts=s.split(/\s+/);
  if(parts.length>=2){
    const last=parts[parts.length-1];
    if(/^[\d.,]+円?$/.test(last)){
      return{item:parts.slice(0,-1).join(' '),amount:last.replace(/円$/,'')};
    }
  }
  // single token: if numeric, treat as amount-only; else item-only
  if(parts.length===1&&/^[\d.,]+円?$/.test(parts[0])){
    return{item:'',amount:parts[0].replace(/円$/,'')};
  }
  return{item:s,amount:''};
}
function fmtJournalNum(s){
  if(!s)return'';
  const cleaned=String(s).replace(/,/g,'');
  if(/^\d+$/.test(cleaned))return Number(cleaned).toLocaleString('ja-JP');
  if(/^\d+\.\d+$/.test(cleaned))return Number(cleaned).toLocaleString('ja-JP');
  return s;
}

function wrapSelection(taId,pre,post,placeholder){
  const ta=document.getElementById(taId);if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd,v=ta.value;
  const sel=v.slice(s,e);
  if(sel.length){
    // toggle: if already wrapped, unwrap
    if(s>=pre.length&&e+post.length<=v.length&&v.slice(s-pre.length,s)===pre&&v.slice(e,e+post.length)===post){
      ta.value=v.slice(0,s-pre.length)+sel+v.slice(e+post.length);
      ta.selectionStart=s-pre.length;ta.selectionEnd=e-pre.length;
    }else{
      ta.value=v.slice(0,s)+pre+sel+post+v.slice(e);
      ta.selectionStart=s+pre.length;ta.selectionEnd=e+pre.length;
    }
  }else{
    const ins=pre+(placeholder||'')+post;
    ta.value=v.slice(0,s)+ins+v.slice(e);
    ta.selectionStart=s+pre.length;ta.selectionEnd=s+pre.length+(placeholder||'').length;
  }
  ta.focus();updateNotePreview();
}
function prefixLines(taId,prefix,placeholder){
  const ta=document.getElementById(taId);if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd,v=ta.value;
  // expand to whole lines
  const ls=v.lastIndexOf('\n',s-1)+1;
  let le=v.indexOf('\n',e);if(le===-1)le=v.length;
  const block=v.slice(ls,le);
  if(block.length===0){
    const ins=prefix+(placeholder||'');
    ta.value=v.slice(0,ls)+ins+v.slice(le);
    ta.selectionStart=ls+prefix.length;ta.selectionEnd=ls+prefix.length+(placeholder||'').length;
  }else{
    const lines=block.split('\n');
    const allHave=lines.every(l=>l.startsWith(prefix));
    const out=allHave?lines.map(l=>l.slice(prefix.length)).join('\n'):lines.map(l=>prefix+l).join('\n');
    ta.value=v.slice(0,ls)+out+v.slice(le);
    ta.selectionStart=ls;ta.selectionEnd=ls+out.length;
  }
  ta.focus();updateNotePreview();
}

/* ===== Notion-like list editing in textarea ===== */
function handleNoteEditorKey(e){
  const ta=e.target;
  // Ctrl/Cmd+B / I / E: bold / italic / code
  if((e.ctrlKey||e.metaKey)&&!e.altKey&&!e.shiftKey&&!e.isComposing){
    const k=e.key.toLowerCase();
    if(k==='b'){e.preventDefault();wrapSelection(ta.id,'**','**','太字');return;}
    if(k==='i'){e.preventDefault();wrapSelection(ta.id,'*','*','斜体');return;}
    if(k==='e'){e.preventDefault();wrapSelection(ta.id,'`','`','コード');return;}
  }
  if(e.key==='Enter'&&!e.shiftKey&&!e.ctrlKey&&!e.metaKey&&!e.altKey&&!e.isComposing){
    const pos=ta.selectionStart,val=ta.value,before=val.slice(0,pos);
    const lineStart=before.lastIndexOf('\n')+1,beforeOnLine=before.slice(lineStart);
    const m=beforeOnLine.match(/^(\s*)([-*]|・)(\s+)(.*)$/);
    if(m){
      const indent=m[1],marker=m[2],sp=m[3],contentBeforeCursor=m[4];
      const lineEndIdx=val.indexOf('\n',pos);
      const afterOnLine=lineEndIdx===-1?val.slice(pos):val.slice(pos,lineEndIdx);
      e.preventDefault();
      if((contentBeforeCursor+afterOnLine).trim()===''){
        if(indent.length>=2){
          // empty + indented: dedent current line in place
          ta.value=val.slice(0,lineStart)+val.slice(lineStart+2);
          ta.selectionStart=ta.selectionEnd=Math.max(lineStart,pos-2);
        }else{
          // empty + not indented: exit list
          ta.value=val.slice(0,lineStart)+'\n'+val.slice(pos);
          ta.selectionStart=ta.selectionEnd=lineStart+1;
        }
      }else{
        // has content: new line at same indent level
        const ins='\n'+indent+marker+sp;
        ta.value=before+ins+val.slice(pos);
        ta.selectionStart=ta.selectionEnd=pos+ins.length;
      }
      updateNotePreview();
      return;
    }
  }
  if(e.key==='Tab'&&!e.isComposing){
    e.preventDefault();
    const pos=ta.selectionStart,val=ta.value,before=val.slice(0,pos);
    const lineStart=before.lastIndexOf('\n')+1;
    if(e.shiftKey){
      // outdent: remove leading 2 spaces if present
      if(val.slice(lineStart,lineStart+2)==='  '){
        ta.value=val.slice(0,lineStart)+val.slice(lineStart+2);
        ta.selectionStart=ta.selectionEnd=Math.max(lineStart,pos-2);
        updateNotePreview();
      }
    }else{
      // indent: add 2 spaces at start of current line
      ta.value=val.slice(0,lineStart)+'  '+val.slice(lineStart);
      ta.selectionStart=ta.selectionEnd=pos+2;
      updateNotePreview();
    }
  }
}

/* ===== Image insertion (paste / drop / file picker) ===== */
const IMG_MAX_WIDTH=1600;
const IMG_QUALITY=0.92;
async function compressImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error('画像の読み込みに失敗しました'));
    reader.onload=ev=>{
      const img=new Image();
      img.onerror=()=>reject(new Error('画像のデコードに失敗しました'));
      img.onload=()=>{
        let w=img.naturalWidth,h=img.naturalHeight;
        if(w>IMG_MAX_WIDTH){h=Math.round(h*IMG_MAX_WIDTH/w);w=IMG_MAX_WIDTH;}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        const ctx=c.getContext('2d');
        // Fill white background to avoid black PNG transparency in JPEG output
        ctx.fillStyle='#ffffff';ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        // JPEG keeps file size reasonable; quality 0.92 preserves text legibility
        resolve(c.toDataURL('image/jpeg',IMG_QUALITY));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}
async function insertImageFromFile(file,ta){
  if(!file||!file.type.startsWith('image/'))return;
  try{
    const dataUrl=await compressImage(file);
    const pos=ta.selectionStart,val=ta.value;
    const needLF=pos>0&&val[pos-1]!=='\n'?'\n':'';
    const md=needLF+`![スクリーンショット](${dataUrl})\n`;
    ta.value=val.slice(0,pos)+md+val.slice(pos);
    ta.selectionStart=ta.selectionEnd=pos+md.length;
    ta.focus();
    updateNotePreview();
  }catch(err){alert('画像の挿入に失敗しました: '+err.message);}
}
function pickImage(taId){
  const ta=document.getElementById(taId);if(!ta)return;
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{const f=e.target.files?.[0];if(f)insertImageFromFile(f,ta);};
  inp.click();
}
function handleEditorPaste(e){
  const items=e.clipboardData?.items;if(!items)return;
  for(const it of items){
    if(it.type&&it.type.startsWith('image/')){
      const file=it.getAsFile();
      if(file){e.preventDefault();insertImageFromFile(file,e.target);return;}
    }
  }
}
function handleEditorDragover(e){
  if(e.dataTransfer?.types?.includes('Files')){e.preventDefault();e.dataTransfer.dropEffect='copy';}
}
function handleEditorDrop(e){
  const files=e.dataTransfer?.files;
  if(!files||!files.length)return;
  const f=files[0];
  if(f.type.startsWith('image/')){e.preventDefault();insertImageFromFile(f,e.target);}
}

  const globalSpotsHTML=globalSpots.length?`<div class="dash-subj-spot" style="margin-bottom:8px">📌 ${globalSpots.map(t=>esc(t.title||'(無題)')).join(' / ')}</div>`:'';
  // 科目別データ収集
  const subjData=[];
  const totals={due:0,memDone:0,memGoal:0,calc:0,calcAuto:0,pages:0,pagesDone:0,lec:0,lecDone:0};
  const spotsNotices=[];
  for(const subj of SUBJECTS){
    const sq=qs.filter(q=>q.subjectId===subj.id);
    const sd=sq.filter(isDue).length;
    const smems=mems.filter(m=>m.subject===subj.id);
    const smemDue=smems.filter(memIsDue).length;
    const memDoneToday=smems.filter(memChangedToday).length;
    const memGoal=smemDue+memDoneToday;
    const subjNotesCnt=notes.filter(n=>n.subjectId===subj.id).length;
    let calcVal=0,calcAuto=0,calcMark='',pagesVal=0,lecVal=0;
    if(PLAN_CALC_SUBJECTS.has(subj.id)){
      const r=await planComputeDayValue(_today,subj.id,'calc');
      calcVal=r.value||0;calcMark=r.halvedForMock?'半':'';
      calcAuto=await getCalcAutoCountForDay(_today,subj.id);
    }
    const rp=await planComputeDayValue(_today,subj.id,'theoryPages');
    if(rp.value)pagesVal=rp.value;
    const rl=await planComputeDayValue(_today,subj.id,'lecture');
    if(rl.value)lecVal=rl.value;
    const _dayChk=_todayChecks['day_'+subj.id];
    const pagesDone=(_dayChk?.committed?.theoryPages)||0;
    const lecDone=(_dayChk?.committed?.lecture)||0;
    const m=latestMockBySubject[subj.id];
    const subjSpots=_todaySpots.filter(t=>t.subject===subj.id);
    if(subjSpots.length)spotsNotices.push(`<span class="badge b-${subj.id}" style="font-size:10px">${esc(subj.name)}</span> ${subjSpots.map(t=>esc(t.title||'(無題)')).join(' / ')}`);
    totals.due+=sd;
    totals.memDone+=memDoneToday;
    totals.memGoal+=memGoal;
    totals.calc+=calcVal;
    totals.calcAuto+=calcAuto;
    totals.pages+=pagesVal;
    totals.pagesDone+=pagesDone;
    totals.lec+=lecVal;
    totals.lecDone+=lecDone;
    subjData.push({subj,sq,sd,smems,smemDue,memDoneToday,memGoal,subjNotesCnt,calcVal,calcAuto,calcMark,pagesVal,lecVal,pagesDone,lecDone,m});
  }
  const cellEmpty=`<span class="dash-cell-empty">-</span>`;
  const progCell=(done,goal,unit,extra='')=>{
    if(!goal&&!done)return cellEmpty;
    if(!goal)return `<span class="dash-cell-val">${done}</span><span class="dash-cell-unit">${unit}</span>${extra}`;
    const ok=done>=goal;
    const cls=ok?'dash-cell-done':'dash-cell-val';
    const mark=ok?' ✓':'';
    return `<span class="${cls}">${done}<span class="dash-cell-slash">/</span>${goal}</span><span class="dash-cell-unit">${unit}${mark}</span>${extra}`;
  };
  const rowsHTML=subjData.map(({subj,sq,sd,smems,smemDue,memDoneToday,memGoal,subjNotesCnt,calcVal,calcAuto,calcMark,pagesVal,lecVal,pagesDone,lecDone,m})=>{
    const overall=m?.total?.overallJudgment||'';
    const pct=m?.total?.rankLive?(m.total.rankLive.rank/m.total.rankLive.total*100).toFixed(1)+'%':'';
    const judgColor=overall==='A'?'var(--green)':overall==='B'?'var(--blue)':overall==='C'?'var(--amber)':overall==='D'?'var(--rose)':overall==='E'?'var(--red)':'var(--text3)';
    const mTitle=m?`${m.examName||''}${examSortDate(m)?' ('+examSortDate(m)+')':''}`:'';
    const examCell=m?`<span style="font-size:18px;font-weight:700;color:${judgColor};cursor:pointer" onclick="event.stopPropagation();openExam('${m.id}')" title="${esc(mTitle)}">${overall}</span>${pct?`<div style="font-size:10px;color:var(--text3)">${pct}</div>`:''}`:cellEmpty;
    const dueCell=sd>0?`<span class="dash-cell-val" style="color:var(--blue);cursor:pointer" onclick="event.stopPropagation();startStudyFromDashboard('${subj.id}')" title="復習を開始">${sd}</span><span class="dash-cell-unit">問</span>`:cellEmpty;
    const memInner=progCell(memDoneToday,memGoal,'件');
    const memCell=memGoal>0?(smemDue>0?`<span style="cursor:pointer" onclick="event.stopPropagation();showView('memorize')" title="暗記タブへ">${memInner}</span>`:memInner):cellEmpty;
    const calcExtra=calcMark?`<span class="dash-goal-mark" style="margin-left:3px">${calcMark}</span>`:'';
    const calcCell=PLAN_CALC_SUBJECTS.has(subj.id)?progCell(calcAuto,calcVal,'問',calcExtra):`<span class="dash-cell-empty">—</span>`;
    const pagesCell=progCell(pagesDone,pagesVal,'p');
    const lecCell=progCell(lecDone,lecVal,'回');
    return `<tr><td><span class="badge b-${subj.id}" style="font-size:12px">${esc(subj.name)}</span><div style="font-size:11px;color:var(--text3);margin-top:3px">問 ${sq.length} / ノ ${subjNotesCnt} / 暗 ${smems.length}</div></td><td>${dueCell}</td><td>${memCell}</td><td>${calcCell}</td><td>${pagesCell}</td><td>${lecCell}</td><td>${examCell}</td></tr>`;
  }).join('');
  const totalRow=`<tr class="dash-total-row"><td>合計</td><td>${totals.due>0?`<span class="dash-cell-val" style="color:var(--blue)">${totals.due}</span><span class="dash-cell-unit">問</span>`:cellEmpty}</td><td>${progCell(totals.memDone,totals.memGoal,'件')}</td><td>${progCell(totals.calcAuto,totals.calc,'問')}</td><td>${progCell(totals.pagesDone,totals.pages,'p')}</td><td>${progCell(totals.lecDone,totals.lec,'回')}</td><td></td></tr>`;
  const spotsSectionHTML=spotsNotices.length?`<div class="dash-subj-spot" style="margin-top:8px">📌 ${spotsNotices.join(' / ')}</div>`:'';
  const reviewHTML=due.length>0
    ?`<div class="dash-review-row"><span>今日の復習 <b>${due.length}問</b></span><button class="btn btn-primary btn-sm" onclick="startStudyFromDashboard('all')">一括開始</button></div>`
    :`<div class="dash-review-row"><span class="alert alert-success" style="padding:4px 10px;display:inline-block;margin:0">今日の復習は完了</span></div>`;
  document.getElementById('view-dashboard').innerHTML=`
    <div class="dash-date-header">${esc(dateStr)}</div>
    ${globalSpotsHTML}
    <table class="dash-table">
      <thead><tr><th>科目</th><th>復習</th><th>暗記</th><th>計算</th><th>回転</th><th>講義</th><th>答練</th></tr></thead>
      <tbody>${rowsHTML}${totalRow}</tbody>
    </table>
    ${spotsSectionHTML}
    <div style="margin-top:6px">${reviewHTML}</div>`;
}

function renderGroupedNotes(notes,topicOrder){
  const groups={};
  notes.forEach(n=>{const k=n.topicTag||'__untagged__';(groups[k]=groups[k]||[]).push(n);});
  // Include topics registered in topicOrder even when they have no notes yet
  topicOrder.forEach(t=>{if(!groups[t])groups[t]=[];});
  const keys=buildOrderedKeys(groups,topicOrder);
  _topicKeysCache=keys;
  // auto-expand only when there's exactly one non-empty group
  const nonEmpty=keys.filter(k=>groups[k].length>0);
  const autoExpand=nonEmpty.length===1?nonEmpty[0]:null;
  // moveable topic count = non-untagged count
  const movable=keys.filter(k=>k!=='__untagged__').length;
  return keys.map((key,i)=>{
    const tn=[...groups[key]].sort((a,b)=>orderVal(a)-orderVal(b));
    const display=key==='__untagged__'?'(論点未設定)':key;
    const expanded=key===autoExpand||S.expandedTopics.has(key);
    const arrow=expanded?'▼':'▶';
    const isUntag=key==='__untagged__';
    const upDis=isUntag||i===0?'disabled':'';
    const dnDis=isUntag||i>=movable-1?'disabled':'';
    const moveBtns=isUntag?'':`<span class="move-btns" onclick="event.stopPropagation()"><button class="move-btn" ${upDis} onclick="moveTopic(${i},-1,'notes')">↑</button><button class="move-btn" ${dnDis} onclick="moveTopic(${i},1,'notes')">↓</button></span>`;
    const delBtn=!isUntag&&tn.length===0?`<button class="move-btn" onclick="event.stopPropagation();deleteEmptyTopicByIndex(${i})" title="この空の論点を削除" style="color:var(--red);margin-left:4px">×</button>`:'';
    let inner='';
    if(expanded){
      if(tn.length){
        inner=`<div class="topic-notes">${tn.map((n,j)=>`<div class="note-row" onclick="openNote('${n.id}')">${showSubTopic(n)?`<span class="badge b-new" style="font-size:10px">${esc(n.subTopic)}</span>`:''}<span class="note-row-title">${esc(n.title)||'(無題)'}</span><span class="note-row-meta">${n.updatedAt||''}</span><span class="move-btns" onclick="event.stopPropagation()"><button class="move-btn" ${j===0?'disabled':''} onclick="moveNoteItem('${n.id}',-1)">↑</button><button class="move-btn" ${j===tn.length-1?'disabled':''} onclick="moveNoteItem('${n.id}',1)">↓</button></span></div>`).join('')}</div>`;
      }else{
        inner=`<div class="topic-notes" style="padding:8px 4px;color:var(--text3);font-size:12px">まだノートがありません</div>`;
      }
    }
    return `<div class="topic-group"><div class="topic-header" onclick="toggleTopic(${i})"><span class="topic-arrow">${arrow}</span><span class="topic-name">${esc(display)}</span><span class="topic-count">${tn.length}</span>${moveBtns}${delBtn}</div>${inner}</div>`;
  }).join('');
}

async function renderNotes(){
  const notes=await dbAll('notes');
  let f,activeSub='';
  if(S.noteFilter==='all'){
    f=notes;
  }else if(S.noteFilter==='tax'){
    activeSub=S.noteTaxSub||'法人税';
    // Legacy tax notes without subTopic are treated as 法人税 so they remain visible after this upgrade
    f=notes.filter(n=>n.subjectId==='tax'&&(n.subTopic||'法人税')===activeSub);
  }else{
    f=notes.filter(n=>n.subjectId===S.noteFilter);
  }
  let lh;
  if(f.length===0){
    lh='<div class="empty">ノートがありません<br><small>「+ 新規」から作成してください</small></div>';
  }else if(S.noteFilter==='all'){
    const sorted=[...f].sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||''));
    lh=sorted.map(n=>`<div class="list-item" onclick="openNote('${n.id}')"><div style="display:flex;align-items:center;gap:6px"><span class="badge b-${n.subjectId}" style="font-size:10px">${sName(n.subjectId)}</span>${showSubTopic(n)?`<span class="badge b-new" style="font-size:10px">${esc(n.subTopic)}</span>`:''}${n.topicTag?`<span style="font-size:11px;color:var(--text3)"># ${esc(n.topicTag)}</span>`:''}</div><div class="list-item-title">${esc(n.title)||'(無題)'}</div><div class="list-item-meta">${n.updatedAt||''}</div></div>`).join('');
  }else{
    const topicOrder=await getTopicOrder(S.noteFilter,activeSub);
    // Also gather topics that legacy-stored only in topicOrder_tax (no subTopic) and appear in matching notes
    if(S.noteFilter==='tax'){
      const legacyOrder=await getTopicOrder('tax','');
      const presentTags=new Set(f.filter(n=>n.topicTag).map(n=>n.topicTag));
      const known=new Set(topicOrder);
      for(const t of legacyOrder){if(presentTags.has(t)&&!known.has(t)){topicOrder.push(t);known.add(t);}}
    }
    lh=renderGroupedNotes(f,topicOrder);
  }
  const eh=S.editingNote!==null?noteEditorHTML(S.editingNote,notes):'';
  // Tax sub-filter row (only when 租税法 is selected)
  const subFilterHTML=S.noteFilter==='tax'?`<div class="subfilter-row"><span class="subfilter-label">税目</span>${TAX_SUBS.map(t=>`<button class="subfilter-btn ${S.noteTaxSub===t?'active':''}" onclick="setNoteTaxSub('${t}')">${t}</button>`).join('')}</div>`:'';
  document.getElementById('view-notes').innerHTML=`<div class="section-title">ノート <span style="display:flex;gap:6px"><button class="btn btn-sm" onclick="addTopicTag()">+ 論点</button><button class="btn btn-primary btn-sm" onclick="openNote(null)">+ 新規</button></span></div><div class="filter-row">${SUBJECTS.map(s=>`<button class="filter-btn ${S.noteFilter===s.id?'active':''}" onclick="setNoteFilter('${s.id}')">${s.name}</button>`).join('')}</div>${subFilterHTML}<div id="note-editor-slot">${eh}</div><div id="notes-list">${lh}</div>`;
  if(S.editingNote!==null){updateNotePreview();document.getElementById('note-editor-slot')?.scrollIntoView({behavior:'smooth',block:'start'});}
}
function buildOrderedKeys(groups,topicOrder){
  const present=Object.keys(groups),pset=new Set(present);
  const ordered=topicOrder.filter(k=>pset.has(k)),oset=new Set(ordered);
  const newK=present.filter(k=>!oset.has(k)).sort((a,b)=>{if(a==='__untagged__')return 1;if(b==='__untagged__')return -1;return a.localeCompare(b,'ja');});
  let keys=[...ordered,...newK];
  const ui=keys.indexOf('__untagged__');
  if(ui!==-1&&ui!==keys.length-1){keys.splice(ui,1);keys.push('__untagged__');}
  return keys;
}

async function editFromViewer(){S.editingNote=S.viewingNote;S.viewingNote=null;document.getElementById('viewer-slot').innerHTML='';await loadEditorTopicOrders();if(S.view!=='notes')showView('notes');else renderNotes();}

async function saveNote(){
  const title=document.getElementById('n-title')?.value.trim();
  const content=document.getElementById('n-content')?.value||'';
  const subjectId=document.getElementById('n-subj')?.value;
  const tagSel=document.getElementById('n-tag-select')?.value||'';
  const tagNew=document.getElementById('n-tag-new')?.value.trim()||'';
  const topicTag=tagSel==='__new__'?tagNew:tagSel;
  const subTopicRaw=document.getElementById('n-subtopic')?.value||'';
  // 科目の subs 定義に含まれない subTopic は空にする (科目変更等で残ったゴミを防ぐ)
  const subjSubs=SUBJECTS.find(s=>s.id===subjectId)?.subs||[];
  const subTopic=subjSubs.includes(subTopicRaw)?subTopicRaw:'';
  if(!title){alert('タイトルを入力してください');return;}
  if(subjectId==='tax'&&!subTopic){alert('租税法では税目（法人税／消費税／所得税）を選択してください');return;}
  const note={...S.editingNote,id:S.editingNote.id||uid(),title,content,subjectId,topicTag,subTopic,updatedAt:today(),createdAt:S.editingNote.createdAt||today()};
  if(note.order===undefined)note.order=-Date.now();
  await dbPut('notes',note);
  await ensureTopicInOrder(subjectId,subTopic,topicTag);
  // refresh editor cache so a subsequently opened editor sees the new topic
  _editorTopicOrders[topicOrderKey(subjectId,subTopic)]=await getTopicOrder(subjectId,subTopic);
  S.expandedTopics.add(topicTag||'__untagged__');
  S.expandedQTopics.add(topicTag||'__untagged__');
  // Keep current filter aligned with the saved note so user sees it
  if(subjectId==='tax')S.noteTaxSub=subTopic;
  S.editingNote=null;
  renderNotes();
}
async function deleteNote(id){if(!confirm('削除しますか？'))return;await dbDelete('notes',id);S.editingNote=null;renderNotes();}
