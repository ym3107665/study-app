// =================== Storage wrapper (localStorage) ===================
window.storage = {
  get: async (key) => {
    try {
      const value = localStorage.getItem(key);
      return value !== null ? { key, value } : null;
    } catch (e) { console.error('storage.get', key, e); return null; }
  },
  set: async (key, value) => {
    try {
      localStorage.setItem(key, value);
      return { key, value };
    } catch (e) { console.error('storage.set', key, e); throw e; }
  },
  delete: async (key) => {
    try { localStorage.removeItem(key); return { key, deleted: true }; }
    catch (e) { console.error('storage.delete', key, e); return null; }
  }
};

// =================== Google Drive (PKCE OAuth) ===================
let gToken = null, gExpiry = 0;
function randomString(len) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  const arr = crypto.getRandomValues(new Uint8Array(len));
  return Array.from(arr, b => chars[b % chars.length]).join('');
}
async function codeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}
async function gAuthenticate() {
  const clientId = localStorage.getItem('googleClientId');
  const clientSecret = localStorage.getItem('googleClientSecret');
  if (!clientId || !clientSecret) throw new Error('クライアントIDとシークレットを設定してください');
  const verifier = randomString(64);
  const challenge = await codeChallenge(verifier);
  const redirectUri = window.location.origin + window.location.pathname;
  const params = new URLSearchParams({
    client_id: clientId, redirect_uri: redirectUri, response_type: 'code',
    scope: 'https://www.googleapis.com/auth/drive.file',
    code_challenge: challenge, code_challenge_method: 'S256',
    access_type: 'offline', prompt: 'select_account'
  });
  const popup = window.open('https://accounts.google.com/o/oauth2/v2/auth?' + params.toString(), 'oauth_popup', 'width=520,height=640,scrollbars=yes');
  if (!popup) throw new Error('ポップアップがブロックされました。許可してください');
  return new Promise((resolve, reject) => {
    const timer = setInterval(async () => {
      if (popup.closed) { clearInterval(timer); reject(new Error('認証がキャンセルされました')); return; }
      try {
        const url = popup.location.href;
        if (url.startsWith(redirectUri)) {
          clearInterval(timer); popup.close();
          const p = new URLSearchParams(new URL(url).search);
          const err = p.get('error'); if (err) { reject(new Error('認証エラー: ' + err)); return; }
          const code = p.get('code'); if (!code) { reject(new Error('認証コードが取得できませんでした')); return; }
          try {
            const resp = await fetch('https://oauth2.googleapis.com/token', {
              method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body: new URLSearchParams({ client_id: clientId, client_secret: clientSecret, code, code_verifier: verifier, grant_type: 'authorization_code', redirect_uri: redirectUri })
            });
            const data = await resp.json();
            if (!data.access_token) throw new Error(data.error_description || JSON.stringify(data));
            gToken = data.access_token;
            gExpiry = Date.now() + (data.expires_in - 60) * 1000;
            resolve(gToken);
          } catch (e) { reject(e); }
        }
      } catch (e) { /* まだGoogleのドメイン上 */ }
    }, 500);
  });
}
async function gGetToken() {
  if (gToken && Date.now() < gExpiry) return gToken;
  return await gAuthenticate();
}
async function gDriveUpload(token, filename, content) {
  const q = encodeURIComponent(`name='${filename}' and trashed=false`);
  const sr = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`, { headers: { Authorization: `Bearer ${token}` } });
  const sd = await sr.json(); const eid = sd.files?.[0]?.id;
  const b = 'll_bound';
  const body = `--${b}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify({ name: filename, mimeType: 'application/json' })}\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${b}--`;
  const url = eid ? `https://www.googleapis.com/upload/drive/v3/files/${eid}?uploadType=multipart` : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  const r = await fetch(url, { method: eid ? 'PATCH' : 'POST', headers: { Authorization: `Bearer ${token}`, 'Content-Type': `multipart/related; boundary=${b}` }, body });
  if (!r.ok) throw new Error('Driveへの保存に失敗しました (' + r.status + ')');
  return r.json();
}
async function gDriveListBackups(token) {
  const q = encodeURIComponent(`name contains 'lifelog_backup' and trashed=false`);
  const sr = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&orderBy=modifiedTime+desc&pageSize=20&fields=files(id,name,modifiedTime,size)`, { headers: { Authorization: `Bearer ${token}` } });
  const d = await sr.json();
  return d.files || [];
}
async function gDriveDownload(token, fileId) {
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { Authorization: `Bearer ${token}` } });
  if (!r.ok) throw new Error('ファイルの取得に失敗しました');
  return await r.text();
}

  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
};

  const d = new Date();
  if (d.getHours() < DAY_BOUNDARY_HOUR) d.setDate(d.getDate() - 1);
  return formatLocalDate(d);
};

function calcSleep(wake, bed) {
  if (!wake || !bed) return 0;
  const [wh, wm] = wake.split(':').map(Number);
  const [bh, bm] = bed.split(':').map(Number);
  const wakeMin = wh * 60 + wm;
  const bedMin = bh * 60 + bm;
  const diff = bedMin > wakeMin ? (24 * 60 - bedMin) + wakeMin : wakeMin - bedMin;
  return diff / 60;
}

function calcActiveTime(wakeTime, bedTime) {
  if (!wakeTime || !bedTime) return 0;
  const [wh, wm] = wakeTime.split(':').map(Number);
  const [bh, bm] = bedTime.split(':').map(Number);
  const wakeMin = wh * 60 + wm;
  const bedMin = bh * 60 + bm;
  if (bedMin > wakeMin) return (bedMin - wakeMin) / 60;
  return ((24 * 60 - wakeMin) + bedMin) / 60;
}

function getYesterdayStr(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() - 1);
  return formatLocalDate(d);
}

function getSleepHours(date, entries) {
  const today = entries[date];
  if (!today?.wakeTime) return 0;
  const delay = Number(today.sleepDelay) || 0;
  const yesterday = entries[getYesterdayStr(date)];
  if (yesterday?.bedTime) return Math.max(0, calcSleep(today.wakeTime, yesterday.bedTime) - delay);
  if (today.bedTime) return Math.max(0, calcSleep(today.wakeTime, today.bedTime) - delay);
  return 0;
}

function getSleepHoursDraft(date, draft, entries) {
  if (!draft?.wakeTime) return 0;
  const delay = Number(draft.sleepDelay) || 0;
  const yesterday = entries[getYesterdayStr(date)];
  if (yesterday?.bedTime) return Math.max(0, calcSleep(draft.wakeTime, yesterday.bedTime) - delay);
  if (draft.bedTime) return Math.max(0, calcSleep(draft.wakeTime, draft.bedTime) - delay);
  return 0;
}

function hmToHours(h, m) { return (Number(h) || 0) + (Number(m) || 0) / 60; }
function hoursToHM(decimal) { const total = Math.round((Number(decimal) || 0) * 60); return { h: Math.floor(total / 60), m: total % 60 }; }
function formatHM(decimal) { const { h, m } = hoursToHM(decimal); return `${h}:${String(m).padStart(2, '0')}`; }
function formatElapsedMs(ms) {
  const total = Math.max(0, Math.floor(ms / 1000));
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}
function emptyStopwatch() { return { startedAt: null, accumulated: 0, category: 'work', date: todayStr(), studyRecordId: null }; }
function emptyDiary() { return { mood: 3, wakeTime: '07:00', bedTime: '23:00', sleepDelay: 0, weight: '', planned: { work: 8, life: 3, other: 1 }, actual: { work: 0, life: 0, other: 0 }, note: '' }; }
function emptyDayPlan() { return { overall: '', overallDone: false, blocks: [] }; }
function getDayPlan(dayPlans, date) {
  const p = dayPlans[date];
  if (!p) return emptyDayPlan();
  return { overall: p.overall || '', overallDone: !!p.overallDone, blocks: p.blocks || [] };
}
function tomorrowOf(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + 1);
  return formatLocalDate(d);
}
function nowHM() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}
function isBlockNow(block) {
  if (!block.start || !block.end) return false;
  const n = nowHM();
  if (block.start <= block.end) return n >= block.start && n < block.end;
  return n >= block.start || n < block.end; // 日付をまたぐブロック
}
function blockDurationHours(block) {
  if (!block.start || !block.end) return 0;
  const [sh, sm] = block.start.split(':').map(Number);
  const [eh, em] = block.end.split(':').map(Number);
  const sMin = sh * 60 + sm, eMin = eh * 60 + em;
  const diff = eMin >= sMin ? eMin - sMin : (24 * 60 - sMin) + eMin;
  return diff / 60;
}
function getWeekStart(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  return formatLocalDate(d);
}
function daysBetween(a, b) { return Math.round((new Date(b + 'T00:00:00') - new Date(a + 'T00:00:00')) / (1000 * 60 * 60 * 24)); }

function buildWeekSummary(weekStart, entries, studyRecords, dayPlans) {
  const today = todayStr();
  let moodSum = 0, moodCount = 0, sleepSum = 0, sleepCount = 0, studyHours = 0;
  let overallSet = 0, overallDone = 0, blockTotal = 0, blockDone = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart + 'T00:00:00'); d.setDate(d.getDate() + i);
    const ds = formatLocalDate(d);
    if (ds > today) continue; // 未来日は集計しない
    const e = entries[ds];
    if (e) { moodSum += e.mood; moodCount++; sleepSum += getSleepHours(ds, entries); sleepCount++; }
    studyHours += getWorkActualForDate(ds, entries, studyRecords);
    const plan = getDayPlan(dayPlans, ds);
    if (plan.overall) { overallSet++; if (plan.overallDone) overallDone++; }
    if (plan.blocks.length > 0) { blockTotal += plan.blocks.length; blockDone += plan.blocks.filter(b => b.done).length; }
  }
  return {
    weekStart,
    label: weekStart.slice(5).replace('-', '/') + '週',
    studyHours,
    avgMood: moodCount ? moodSum / moodCount : null,
    avgSleep: sleepCount ? sleepSum / sleepCount : null,
    overallRate: overallSet ? Math.round((overallDone / overallSet) * 100) : null,
    blockRate: blockTotal ? Math.round((blockDone / blockTotal) * 100) : null,
  };
}

function isRecurringActiveOn(rec, dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const r = rec.recurrence;
  if (r.type === 'daily') return true;
  if (r.type === 'weekly') {
    if (!(r.days || []).includes(d.getDay())) return false;
    const interval = r.interval || 1;
    if (interval === 1) return true;
    const anchor = r.anchor || rec.createdDate || dateStr;
    const weeksDiff = Math.floor(daysBetween(getWeekStart(anchor), getWeekStart(dateStr)) / 7);
    return weeksDiff >= 0 && weeksDiff % interval === 0;
  }
  if (r.type === 'monthly') return (r.dates || []).includes(d.getDate());
  return false;
}

function getRecurringLabel(rec) {
  if (rec.type === 'daily') return '毎日';
  if (rec.type === 'weekly') {
    const interval = rec.interval || 1;
    const prefix = interval === 1 ? '毎週' : interval === 2 ? '隔週' : `${interval}週ごと`;
    if (!rec.days || rec.days.length === 0) return prefix + '(未設定)';
    return prefix + rec.days.slice().sort().map(i => weekdayLabels[i]).join('・');
  }
  if (rec.type === 'monthly') {
    if (!rec.dates || rec.dates.length === 0) return '毎月(未設定)';
    return '毎月' + rec.dates.slice().sort((a, b) => a - b).join('・') + '日';
  }
  return '';
}

function getWorkActualForDate(date, diaryEntries, studyRecords) {
  const records = studyRecords.filter(r => r.date === date);
  if (records.length > 0) return records.reduce((s, r) => s + (Number(r.actual) || 0), 0);
  return Number(diaryEntries[date]?.actual?.work) || 0;
}

function parseNotionDate(str) {
  if (!str) return null;
  const s = String(str).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  const jp = s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (jp) return `${jp[1]}-${String(jp[2]).padStart(2, '0')}-${String(jp[3]).padStart(2, '0')}`;
  const d = new Date(s);
  if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
  return null;
}

function parseCSV(text) {
  const rows = [];
  let cur = [], field = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuote) {
      if (ch === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQuote = false; }
      else field += ch;
    } else {
      if (ch === '"') inQuote = true;
      else if (ch === ',') { cur.push(field); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && text[i + 1] === '\n') i++;
        cur.push(field); rows.push(cur); cur = []; field = '';
      } else field += ch;
    }
  }
  if (field.length > 0 || cur.length > 0) { cur.push(field); rows.push(cur); }
  return rows.filter(r => r.length > 0 && r.some(c => c.trim() !== ''));
}

function App() {
  const [tab, setTab] = useState('home');
  const [diaryEntries, setDiaryEntries] = useState({});
  const [tasks, setTasks] = useState([]);
  const [wishlists, setWishlists] = useState([{ id: 'default', name: 'やりたいこと', items: [] }]);
  const [recurring, setRecurring] = useState([]);
  const [recurringCategories, setRecurringCategories] = useState(['家事', '健康', '仕事', 'その他']);
  const [recurringDone, setRecurringDone] = useState({});
  const [dayPlans, setDayPlans] = useState({});
  const [stopwatch, setStopwatch] = useState(emptyStopwatch());
  const [pomodoro, setPomodoro] = useState(emptyPomodoro());
  const [studyRecords, setStudyRecords] = useState([]);
  const [studySubjects, setStudySubjects] = useState([]);
  const [memos, setMemos] = useState([]);
  const [journals, setJournals] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedDate, setSelectedDate] = useState(todayStr());
  const [saveStatus, setSaveStatus] = useState('');
  // 常に最新の state を保持する refs（非同期保存時の取りこぼし防止）
  const diaryEntriesRef = useRef(diaryEntries);
  const studyRecordsRef = useRef(studyRecords);
  const stateRef = useRef({});
  stateRef.current = {
    diaryEntries, tasks, wishlists, recurring, recurringCategories, recurringDone,
    dayPlans, stopwatch, pomodoro, studyRecords, studySubjects, memos, journals
  };
  useEffect(() => { diaryEntriesRef.current = diaryEntries; }, [diaryEntries]);
  useEffect(() => { studyRecordsRef.current = studyRecords; }, [studyRecords]);
  const loadedRef = useRef(false);
  // ページ非表示・離脱時に最新の全データを再保存（書き込み取り逃し防止）
  useEffect(() => {
    const reSaveAll = () => {
      if (!loadedRef.current) return; // 初回読み込み完了前は未読込のデフォルト値で上書きしてしまうため何もしない
      const s = stateRef.current;
      const entries = [
        ['diary-entries', s.diaryEntries], ['tasks', s.tasks], ['wishlists', s.wishlists],
        ['recurring-tasks', s.recurring], ['recurring-categories', s.recurringCategories],
        ['recurring-done', s.recurringDone], ['day-plans', s.dayPlans],
        ['stopwatch', s.stopwatch], ['pomodoro', s.pomodoro],
        ['study-records', s.studyRecords], ['study-subjects', s.studySubjects], ['memos', s.memos], ['journals', s.journals]
      ];
      for (const [k, v] of entries) {
        if (v === undefined) continue;
        try { window.storage.set(k, JSON.stringify(v)); } catch (e) {}
      }
    };
    const handleVisibility = () => { if (document.visibilityState === 'hidden') reSaveAll(); };
    document.addEventListener('visibilitychange', handleVisibility);
    window.addEventListener('pagehide', reSaveAll);
    return () => {
      document.removeEventListener('visibilitychange', handleVisibility);
      window.removeEventListener('pagehide', reSaveAll);
      reSaveAll(); // アンマウント時にも保存試行
    };
  }, []);

  useEffect(() => {
    async function load() {
      const tryLoad = async (key, setter) => {
        try { const r = await window.storage.get(key); if (r?.value) { setter(JSON.parse(r.value)); return; } } catch (e) {}
        if (key in BACKUP_DATA) { setter(BACKUP_DATA[key]); try { await window.storage.set(key, JSON.stringify(BACKUP_DATA[key])); } catch (e) {} }
      };
      await tryLoad('diary-entries', setDiaryEntries);
      await tryLoad('tasks', setTasks);
      await tryLoad('wishlists', setWishlists);
      await tryLoad('recurring-tasks', setRecurring);
      await tryLoad('recurring-categories', setRecurringCategories);
      await tryLoad('recurring-done', setRecurringDone);
      await tryLoad('day-plans', setDayPlans);
      try { const r = await window.storage.get('stopwatch'); if (r?.value) setStopwatch(JSON.parse(r.value)); } catch (e) {}
      try { const r = await window.storage.get('pomodoro'); if (r?.value) { const p = JSON.parse(r.value); if (p.lastDate !== todayStr()) { p.completedToday = 0; p.lastDate = todayStr(); } setPomodoro(p); } } catch (e) {}
      try { const r = await window.storage.get('study-records'); if (r?.value) setStudyRecords(JSON.parse(r.value)); } catch (e) {}
      try { const r = await window.storage.get('study-subjects'); if (r?.value) setStudySubjects(JSON.parse(r.value)); } catch (e) {}
      try { const r = await window.storage.get('memos'); if (r?.value) setMemos(JSON.parse(r.value)); } catch (e) {}
      try { const r = await window.storage.get('journals'); if (r?.value) setJournals(JSON.parse(r.value)); } catch (e) {}
      loadedRef.current = true;
      setLoading(false);
    }
    load();
  }, []);

  const persist = async (key, value) => {
    const serialized = JSON.stringify(value);
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        await window.storage.set(key, serialized);
        return;
      } catch (e) {
        if (attempt === 2) console.error(`Failed to persist ${key} after 3 attempts:`, e);
      }
      await new Promise(r => setTimeout(r, 50 * (attempt + 1)));
    }
  };
  const saveDiary = async (date, entry) => { const u = { ...diaryEntries, [date]: entry }; setDiaryEntries(u); await persist('diary-entries', u); setSaveStatus('✓ 保存しました'); setTimeout(() => setSaveStatus(''), 2000); };
  const saveTasks = async (v) => { setTasks(v); await persist('tasks', v); };
  const saveWishlists = async (v) => { setWishlists(v); await persist('wishlists', v); };
  const saveRecurring = async (v) => { setRecurring(v); await persist('recurring-tasks', v); };
  const saveRecurringCategories = async (v) => { setRecurringCategories(v); await persist('recurring-categories', v); };
  const saveRecurringDone = async (v) => { setRecurringDone(v); await persist('recurring-done', v); };
  const saveDayPlan = async (date, plan) => { const u = { ...dayPlans, [date]: plan }; setDayPlans(u); await persist('day-plans', u); };
  const updateStopwatch = async (n) => { setStopwatch(n); await persist('stopwatch', n); };
  const updatePomodoro = async (n) => { setPomodoro(n); await persist('pomodoro', n); };
  const saveStudyRecords = async (updater) => {
    const next = typeof updater === 'function' ? updater(studyRecordsRef.current) : updater;
    studyRecordsRef.current = next;
    setStudyRecords(next);
    try { await persist('study-records', next); }
    catch (e) { console.error('study-records persist failed', e); setSaveStatus('⚠️ 保存失敗'); setTimeout(() => setSaveStatus(''), 3000); }
  };
  const saveStudySubjects = async (v) => { setStudySubjects(v); await persist('study-subjects', v); };
  const saveMemos = async (v) => { setMemos(v); await persist('memos', v); };
  const saveJournals = async (v) => { setJournals(v); await persist('journals', v); };

  useEffect(() => {
    if (!pomodoro.startedAt) return;
    const totalMs = (pomodoro.mode === 'focus' ? pomodoro.focusMinutes : pomodoro.breakMinutes) * 60000;
    const elapsed = Date.now() - pomodoro.startedAt;
    const remaining = Math.max(0, totalMs - elapsed);
    const transition = () => {
      playPomodoroSound(pomodoro.mode);
      const next = { ...pomodoro, mode: pomodoro.mode === 'focus' ? 'break' : 'focus', startedAt: Date.now(), pausedRemaining: null, completedToday: pomodoro.mode === 'focus' ? pomodoro.completedToday + 1 : pomodoro.completedToday, lastDate: todayStr() };
      setPomodoro(next); persist('pomodoro', next);
    };
    if (remaining === 0) { transition(); return; }
    const id = setTimeout(transition, remaining);
    return () => clearTimeout(id);
  }, [pomodoro.startedAt, pomodoro.mode, pomodoro.focusMinutes, pomodoro.breakMinutes]);

  const recordStopwatchToDiary = async (date, category, hours, studyRecordId) => {
    if (category === 'work' && studyRecordId) {
      await saveStudyRecords(prev => {
        const found = prev.some(r => r.id === studyRecordId);
        if (!found) {
          return [...prev, { id: 'study_recovered_' + Date.now(), date, subject: '⚠️ 復元(元項目消失)', activityType: '復習', subCategory: null, estimated: 0, actual: hours }];
        }
        return prev.map(r => r.id === studyRecordId ? { ...r, actual: (Number(r.actual) || 0) + hours } : r);
      });
    } else if (category !== 'work') {
      const prev = diaryEntriesRef.current;
      const cur = prev[date] || emptyDiary();
      const upd = { ...cur, actual: { ...cur.actual, [category]: (Number(cur.actual[category]) || 0) + hours } };
      const next = { ...prev, [date]: upd };
      diaryEntriesRef.current = next;
      setDiaryEntries(next);
      try { await persist('diary-entries', next); }
      catch (e) { console.error('diary persist failed', e); setSaveStatus('⚠️ 保存失敗'); setTimeout(() => setSaveStatus(''), 3000); }
    }
  };

  if (loading) return <div className="min-h-screen bg-stone-50 flex items-center justify-center"><div className="text-stone-500">読み込み中...</div></div>;

  return (
    <div className="min-h-screen bg-stone-50 text-stone-800">
      <div className="max-w-5xl mx-auto p-4 md:p-6">
        <header className="no-print mb-4 flex items-center justify-between">
          <h1 className="text-2xl md:text-3xl font-bold text-stone-800">📔 ライフログ</h1>
          <button onClick={() => setTab('settings')} className={`p-2 rounded-lg transition ${tab === 'settings' ? 'bg-emerald-600 text-white' : 'text-stone-500 hover:bg-stone-100'}`}><Settings size={18} /></button>
        </header>
        <nav className="no-print flex gap-0.5 mb-4 bg-white rounded-xl p-1 shadow-sm border border-stone-200 overflow-x-auto">
          <TabButton active={tab === 'home'} onClick={() => setTab('home')} icon={<Home size={14} />}>ホーム</TabButton>
          <TabButton active={tab === 'diary'} onClick={() => setTab('diary')} icon={<Book size={14} />}>日記</TabButton>
          <TabButton active={tab === 'study'} onClick={() => setTab('study')} icon={<GraduationCap size={14} />}>勉強</TabButton>
          <TabButton active={tab === 'tasks'} onClick={() => setTab('tasks')} icon={<CheckSquare size={14} />}>タスク</TabButton>
          <TabButton active={tab === 'memo'} onClick={() => setTab('memo')} icon={<StickyNote size={14} />}>メモ</TabButton>
          <TabButton active={tab === 'journal'} onClick={() => setTab('journal')} icon={<Book size={14} />}>自省録</TabButton>
          <TabButton active={tab === 'wish'} onClick={() => setTab('wish')} icon={<Star size={14} />}>リスト</TabButton>
          <TabButton active={tab === 'dashboard'} onClick={() => setTab('dashboard')} icon={<BarChart3 size={14} />}>振返</TabButton>
        </nav>
        {stopwatch.startedAt && tab !== 'home' && <RunningIndicator stopwatch={stopwatch} studyRecords={studyRecords} onClick={() => setTab('home')} />}
        {tab === 'home' && <HomeView entries={diaryEntries} tasks={tasks} recurring={recurring} recurringDone={recurringDone} dayPlans={dayPlans} stopwatch={stopwatch} studyRecords={studyRecords} studySubjects={studySubjects} onStopwatchChange={updateStopwatch} onStopwatchRecord={recordStopwatchToDiary} onStudyRecordsChange={saveStudyRecords} onTasksChange={saveTasks} onRecurringDoneChange={saveRecurringDone} onDayPlanChange={saveDayPlan} onNavigate={setTab} />}
        {tab === 'diary' && <DiaryView entries={diaryEntries} studyRecords={studyRecords} selectedDate={selectedDate} setSelectedDate={setSelectedDate} onSave={saveDiary} saveStatus={saveStatus} />}
        {tab === 'study' && <StudyView studyRecords={studyRecords} studySubjects={studySubjects} pomodoro={pomodoro} onPomodoroChange={updatePomodoro} onRecordsChange={saveStudyRecords} onSubjectsChange={saveStudySubjects} />}
        {tab === 'tasks' && <TasksView tasks={tasks} recurring={recurring} recurringCategories={recurringCategories} onTasksChange={saveTasks} onRecurringChange={saveRecurring} onRecurringCategoriesChange={saveRecurringCategories} />}
        {tab === 'memo' && <MemoView memos={memos} onChange={saveMemos} />}
        {tab === 'journal' && <JournalView journals={journals} onChange={saveJournals} />}
        {tab === 'wish' && <WishlistView wishlists={wishlists} onChange={saveWishlists} />}
        {tab === 'dashboard' && <DashboardView entries={diaryEntries} studyRecords={studyRecords} dayPlans={dayPlans} />}
        {tab === 'settings' && <SettingsView data={{ 'diary-entries': diaryEntries, 'tasks': tasks, 'wishlists': wishlists, 'recurring-tasks': recurring, 'recurring-categories': recurringCategories, 'recurring-done': recurringDone, 'day-plans': dayPlans, 'study-records': studyRecords, 'study-subjects': studySubjects, 'memos': memos, 'journals': journals }} onImport={async (imp, mode) => {
          const merge = (o, n, isObj) => {
            if (mode === 'replace') return n;
            if (isObj && typeof o === 'object' && typeof n === 'object' && !Array.isArray(o)) return { ...o, ...n };
            if (Array.isArray(o) && Array.isArray(n)) { const seen = new Set(o.map(x => x?.id).filter(Boolean)); return [...o, ...n.filter(x => !x?.id || !seen.has(x.id))]; }
            return n;
          };
          if ('diary-entries' in imp) { const m = merge(diaryEntries, imp['diary-entries'], true); setDiaryEntries(m); await persist('diary-entries', m); }
          if ('tasks' in imp) { const m = merge(tasks, imp['tasks'], false); setTasks(m); await persist('tasks', m); }
          if ('wishlists' in imp) { const m = merge(wishlists, imp['wishlists'], false); setWishlists(m); await persist('wishlists', m); }
          if ('recurring-tasks' in imp) { const m = merge(recurring, imp['recurring-tasks'], false); setRecurring(m); await persist('recurring-tasks', m); }
          if ('recurring-categories' in imp) { const m = mode === 'replace' ? imp['recurring-categories'] : Array.from(new Set([...recurringCategories, ...imp['recurring-categories']])); setRecurringCategories(m); await persist('recurring-categories', m); }
          if ('recurring-done' in imp) { const m = merge(recurringDone, imp['recurring-done'], true); setRecurringDone(m); await persist('recurring-done', m); }
          if ('day-plans' in imp) { const m = merge(dayPlans, imp['day-plans'], true); setDayPlans(m); await persist('day-plans', m); }
          if ('study-records' in imp) { const m = merge(studyRecords, imp['study-records'], false); setStudyRecords(m); await persist('study-records', m); }
          if ('study-subjects' in imp) { const m = mode === 'replace' ? imp['study-subjects'] : Array.from(new Set([...studySubjects, ...imp['study-subjects']])); setStudySubjects(m); await persist('study-subjects', m); }
          if ('memos' in imp) { const m = merge(memos, imp['memos'], false); setMemos(m); await persist('memos', m); }
          if ('journals' in imp) { const m = merge(journals, imp['journals'], false); setJournals(m); await persist('journals', m); }
        }} />}
      </div>
    </div>
  );
}

function TabButton({ active, onClick, icon, children }) {
  return <button onClick={onClick} className={`flex-1 flex items-center justify-center gap-1 px-1 py-2 rounded-lg text-xs font-medium transition whitespace-nowrap ${active ? 'bg-emerald-600 text-white shadow-sm' : 'text-stone-600 hover:bg-stone-100'}`}>{icon}<span>{children}</span></button>;
}

const CATEGORY_LABELS = { work: '📚 勉強', life: '🍽️ 生活必要', other: '🛒 その他必要' };

function RunningIndicator({ stopwatch, studyRecords, onClick }) {
  const [, setTick] = useState(0);
  useEffect(() => { const id = setInterval(() => setTick(t => t + 1), 1000); return () => clearInterval(id); }, []);
  const elapsed = stopwatch.startedAt ? stopwatch.accumulated + (Date.now() - stopwatch.startedAt) : stopwatch.accumulated;
  let label = CATEGORY_LABELS[stopwatch.category];
  if (stopwatch.category === 'work' && stopwatch.studyRecordId) {
    const rec = studyRecords.find(r => r.id === stopwatch.studyRecordId);
    if (rec) label = `📚 ${rec.subject}（${rec.activityType}${rec.subCategory ? '・' + rec.subCategory : ''}）`;
  }
  return <button onClick={onClick} className="w-full mb-3 px-4 py-2.5 bg-emerald-600 text-white rounded-xl flex items-center justify-between shadow-sm animate-pulse"><span className="flex items-center gap-2 text-sm font-medium truncate"><Timer size={16} className="flex-shrink-0" />{label}を計測中</span><span className="text-base font-mono font-bold tabular-nums flex-shrink-0 ml-2">{formatElapsedMs(elapsed)}</span></button>;
}

function StopwatchCard({ stopwatch, studyRecords, studySubjects, onChange, onRecord, onStudyRecordsChange }) {
  const [, setTick] = useState(0);
  const running = !!stopwatch.startedAt;
  const today = todayStr();
  const todayStudyRecords = studyRecords.filter(r => r.date === today);
  const [creatingItem, setCreatingItem] = useState(false);
  useEffect(() => { if (!running) return; const id = setInterval(() => setTick(t => t + 1), 1000); return () => clearInterval(id); }, [running]);
  const elapsedMs = running ? stopwatch.accumulated + (Date.now() - stopwatch.startedAt) : stopwatch.accumulated;
  const start = () => onChange({ ...stopwatch, startedAt: Date.now(), date: stopwatch.accumulated === 0 ? todayStr() : stopwatch.date });
  const pause = () => { const newAcc = stopwatch.accumulated + (Date.now() - stopwatch.startedAt); onChange({ ...stopwatch, startedAt: null, accumulated: newAcc }); };
  const reset = () => { if (elapsedMs > 0 && !confirm('計測中の時間を破棄してリセットしますか？')) return; onChange({ ...emptyStopwatch(), category: stopwatch.category }); };
  const saveAndReset = async () => {
    const totalMs = running ? stopwatch.accumulated + (Date.now() - stopwatch.startedAt) : stopwatch.accumulated;
    if (totalMs < 1000) return;
    const hours = totalMs / 3600000;
    await onRecord(stopwatch.date, stopwatch.category, hours, stopwatch.studyRecordId);
    onChange({ ...emptyStopwatch(), category: stopwatch.category });
  };
  const dateWarning = stopwatch.date !== today && elapsedMs > 0;
  const isWork = stopwatch.category === 'work';
  const selectedStudy = isWork && stopwatch.studyRecordId ? todayStudyRecords.find(r => r.id === stopwatch.studyRecordId) : null;
  const needsStudyItem = isWork && !stopwatch.studyRecordId;
  const createNewItem = (subject, activityType, subCategory) => {
    const newRec = { id: 'study_' + Date.now(), date: today, subject, activityType, subCategory: subCategory || null, estimated: 0, actual: 0 };
    onStudyRecordsChange(prev => [...prev, newRec]);
    onChange({ ...stopwatch, studyRecordId: newRec.id });
    setCreatingItem(false);
  };
  return (
    <div className={`rounded-xl p-4 border-2 transition shadow-sm ${running ? 'bg-emerald-50 border-emerald-400' : elapsedMs > 0 ? 'bg-amber-50 border-amber-300' : 'bg-white border-stone-200'}`}>
      <div className="flex items-center justify-between mb-2">
        <h3 className="text-sm font-semibold text-stone-700 flex items-center gap-1.5"><Timer size={16} className={running ? 'text-emerald-600' : 'text-stone-500'} />ストップウォッチ{running && <span className="text-xs text-emerald-600 font-normal">● 計測中</span>}{!running && elapsedMs > 0 && <span className="text-xs text-amber-600 font-normal">⏸ 一時停止中</span>}</h3>
        <select value={stopwatch.category} onChange={(e) => onChange({ ...stopwatch, category: e.target.value, studyRecordId: null })} disabled={running || elapsedMs > 0} className="text-xs px-2 py-1 border border-stone-300 rounded bg-white disabled:opacity-60"><option value="work">📚 勉強</option><option value="life">🍽️ 生活必要</option><option value="other">🛒 その他</option></select>
      </div>
      {isWork && !running && elapsedMs === 0 && (
        <div className="mb-3 p-3 bg-stone-50 rounded-lg border border-stone-200">
          {!creatingItem ? (
            <>
              <div className="text-xs text-stone-500 mb-1.5">対象の勉強項目</div>
              {todayStudyRecords.length > 0 ? (
                <div className="space-y-1 mb-2">{todayStudyRecords.map(r => (
                  <button key={r.id} onClick={() => onChange({ ...stopwatch, studyRecordId: r.id })} className={`w-full text-left px-2.5 py-1.5 rounded text-sm flex items-center gap-1.5 ${stopwatch.studyRecordId === r.id ? 'bg-emerald-600 text-white' : 'bg-white border border-stone-200 hover:bg-stone-50'}`}>
                    <span className="flex-1 truncate">{r.subject}</span>
                    <span className={`text-xs px-1.5 py-0.5 rounded ${stopwatch.studyRecordId === r.id ? 'bg-emerald-700' : activityColors[r.activityType]}`}>{r.activityType}</span>
                    {r.subCategory && <span className={`text-xs px-1.5 py-0.5 rounded ${stopwatch.studyRecordId === r.id ? 'bg-emerald-700' : subCategoryColors[r.subCategory]}`}>{r.subCategory}</span>}
                    <span className="text-xs opacity-75">{formatHM(r.actual)}</span>
                  </button>
                ))}</div>
              ) : <div className="text-xs text-stone-400 text-center py-2 mb-2">今日の勉強項目はまだありません</div>}

const COUNTDOWN_EVENTS = [{ name: '模試', start: '2026-07-18', end: '2026-07-21', emoji: '📝' }, { name: '本試験', start: '2026-08-21', end: '2026-08-23', emoji: '🎯' }];
function ExamCountdown() {
  const today = todayStr();
  const active = COUNTDOWN_EVENTS.map(e => { const startDays = daysBetween(today, e.start); const fullDays = startDays - 1; const isPeriod = today >= e.start && today <= e.end; const isPast = today > e.end; return { ...e, startDays, fullDays, isPeriod, isPast }; }).filter(e => !e.isPast).sort((a, b) => a.startDays - b.startDays);
  if (active.length === 0) return null;
  return (
    <div className="grid grid-cols-2 gap-2">
      {active.map(e => {
        const isUrgent = !e.isPeriod && e.fullDays <= 30;
        const isSoon = !e.isPeriod && e.fullDays > 30 && e.fullDays <= 90;
        const bg = e.isPeriod || isUrgent ? 'from-red-50 to-amber-50 border-red-300' : isSoon ? 'from-amber-50 to-emerald-50 border-amber-300' : 'from-emerald-50 to-sky-50 border-emerald-300';
        const accent = e.isPeriod || isUrgent ? 'text-red-700' : isSoon ? 'text-amber-700' : 'text-emerald-700';
        return (
          <div key={e.name} className={`bg-gradient-to-br rounded-xl p-3 border ${bg}`}>
            <div className="text-xs text-stone-500">{e.emoji} {e.name}</div>
            <div className="text-xs font-medium text-stone-700 mt-0.5">{e.start.slice(5).replace('-', '/')} 〜 {e.end.slice(5).replace('-', '/')}</div>
            <div className={`${accent} mt-1`}>
              {e.isPeriod ? <div className="text-sm font-bold">期間中</div> : e.fullDays === 0 ? <div className="text-xl font-bold">明日</div> : e.fullDays < 0 ? <div className="text-sm font-bold">本日</div> : <div className="flex items-baseline gap-1"><span className="text-2xl font-bold tabular-nums">{e.fullDays}</span><span className="text-xs">日後</span></div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function emptyPomodoro() { return { mode: 'focus', startedAt: null, pausedRemaining: null, focusMinutes: 25, breakMinutes: 5, completedToday: 0, lastDate: todayStr() }; }
function playPomodoroSound(endedMode) {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    const ctx = new Ctx();
    if (ctx.state === 'suspended') ctx.resume();
    const playNote = (freq, startSec, duration) => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      osc.connect(gain); gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime + startSec);
      gain.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + startSec + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + startSec + duration);
      osc.start(ctx.currentTime + startSec); osc.stop(ctx.currentTime + startSec + duration + 0.05);
    };
    if (endedMode === 'focus') { playNote(523.25, 0, 0.25); playNote(659.25, 0.3, 0.25); playNote(783.99, 0.6, 0.5); }
    else { playNote(880, 0, 0.2); playNote(880, 0.3, 0.2); playNote(880, 0.6, 0.4); }
  } catch (e) {}
}

function PomodoroTimer({ pomodoro, onChange }) {
  const [, setTick] = useState(0);
  const [showSettings, setShowSettings] = useState(false);
  const running = !!pomodoro.startedAt;
  const totalMs = (pomodoro.mode === 'focus' ? pomodoro.focusMinutes : pomodoro.breakMinutes) * 60000;
  useEffect(() => { if (!running) return; const id = setInterval(() => setTick(t => t + 1), 1000); return () => clearInterval(id); }, [running]);
  let remainingMs;
  if (running) remainingMs = Math.max(0, totalMs - (Date.now() - pomodoro.startedAt));
  else if (pomodoro.pausedRemaining !== null) remainingMs = pomodoro.pausedRemaining;
  else remainingMs = totalMs;
  const start = () => { try { const c = new (window.AudioContext || window.webkitAudioContext)(); if (c.state === 'suspended') c.resume(); c.close(); } catch (e) {} const baseRemaining = pomodoro.pausedRemaining ?? totalMs; const newStartedAt = Date.now() - (totalMs - baseRemaining); onChange({ ...pomodoro, startedAt: newStartedAt, pausedRemaining: null }); };
  const pause = () => onChange({ ...pomodoro, startedAt: null, pausedRemaining: remainingMs });
  const reset = () => onChange({ ...pomodoro, startedAt: null, pausedRemaining: null });
  const skip = () => onChange({ ...pomodoro, mode: pomodoro.mode === 'focus' ? 'break' : 'focus', startedAt: null, pausedRemaining: null, completedToday: pomodoro.mode === 'focus' ? pomodoro.completedToday + 1 : pomodoro.completedToday, lastDate: todayStr() });
  const minutes = Math.floor(remainingMs / 60000);
  const seconds = Math.floor((remainingMs % 60000) / 1000);
  const progress = ((totalMs - remainingMs) / totalMs) * 100;
  const isFocus = pomodoro.mode === 'focus';
  const cardColor = isFocus ? 'from-emerald-50 to-sky-50 border-emerald-300' : 'from-amber-50 to-rose-50 border-amber-300';
  const accentColor = isFocus ? 'text-emerald-700' : 'text-amber-700';
  const barColor = isFocus ? 'bg-emerald-500' : 'bg-amber-500';
  return (
    <div className={`bg-gradient-to-br rounded-xl p-4 border-2 ${cardColor}`}>
      <div className="flex items-center justify-between mb-2"><h3 className="text-sm font-semibold text-stone-700 flex items-center gap-1.5">🍅 ポモドーロタイマー<span className={`text-xs font-normal ${accentColor}`}>{isFocus ? '集中' : '休憩'}</span></h3><div className="flex gap-2 items-center"><span className="text-xs text-stone-500">今日 {pomodoro.completedToday}セット</span><button onClick={() => setShowSettings(!showSettings)} className="text-stone-400"><Settings size={14} /></button></div></div>
      {showSettings && <div className="bg-white rounded-lg p-3 mb-3 border border-stone-200 space-y-2"><div className="text-xs font-semibold text-stone-700">設定（次のセットから反映）</div><div className="grid grid-cols-2 gap-2"><div><label className="text-xs text-stone-500 block mb-1">集中(分)</label><input type="number" min="1" max="120" value={pomodoro.focusMinutes} onChange={(e) => onChange({ ...pomodoro, focusMinutes: Math.max(1, parseInt(e.target.value) || 25) })} className="w-full px-2 py-1.5 border border-stone-300 rounded text-sm text-center" /></div><div><label className="text-xs text-stone-500 block mb-1">休憩(分)</label><input type="number" min="1" max="60" value={pomodoro.breakMinutes} onChange={(e) => onChange({ ...pomodoro, breakMinutes: Math.max(1, parseInt(e.target.value) || 5) })} className="w-full px-2 py-1.5 border border-stone-300 rounded text-sm text-center" /></div></div></div>}
      <div className={`text-5xl font-bold text-center my-3 font-mono tabular-nums ${accentColor}`}>{String(minutes).padStart(2, '0')}:{String(seconds).padStart(2, '0')}</div>
      <div className="h-1.5 bg-white rounded-full overflow-hidden mb-3"><div className={`h-full ${barColor} transition-all`} style={{ width: `${progress}%` }} /></div>
      <div className="flex gap-2">
        {running ? <button onClick={pause} className="flex-1 py-2 bg-amber-500 text-white rounded-lg font-medium text-sm flex items-center justify-center gap-1.5"><Pause size={14} />一時停止</button> : <button onClick={start} className={`flex-1 py-2 ${isFocus ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-amber-600 hover:bg-amber-700'} text-white rounded-lg font-medium text-sm flex items-center justify-center gap-1.5`}><Play size={14} />{pomodoro.pausedRemaining !== null ? '再開' : isFocus ? '集中開始' : '休憩開始'}</button>}
        <button onClick={skip} className="px-3 py-2 bg-stone-200 text-stone-700 rounded-lg text-sm font-medium" title="スキップ">⏭</button>
        <button onClick={reset} className="px-3 py-2 bg-stone-200 text-stone-700 rounded-lg text-sm" title="リセット"><RotateCcw size={14} /></button>
      </div>
    </div>
  );
}

function StudyView({ studyRecords, studySubjects, pomodoro, onPomodoroChange, onRecordsChange, onSubjectsChange }) {
  const [selDate, setSelDate] = useState(todayStr());
  const [adding, setAdding] = useState(false);
  const [editing, setEditing] = useState(null);
  const [managingSubjects, setManagingSubjects] = useState(false);
  const [importing, setImporting] = useState(false);
  const [pasteOpen, setPasteOpen] = useState(false);
  const [pasteText, setPasteText] = useState('');
  const [confirmImport, setConfirmImport] = useState(null);
  const [importMsg, setImportMsg] = useState('');
  const fileRef = useRef(null);
  const dateRecords = studyRecords.filter(r => r.date === selDate);
  const totalEst = dateRecords.reduce((s, r) => s + (Number(r.estimated) || 0), 0);
  const totalAct = dateRecords.reduce((s, r) => s + (Number(r.actual) || 0), 0);
  const addRecord = (rec) => { onRecordsChange(prev => [...prev, { ...rec, id: 'study_' + Date.now() }]); setAdding(false); };
  const updateRecord = (rec) => { onRecordsChange(prev => prev.map(r => r.id === rec.id ? rec : r)); setEditing(null); };
  const deleteRecord = (id) => onRecordsChange(prev => prev.filter(r => r.id !== id));
  const sourceDate = (() => { const dates = [...new Set(studyRecords.map(r => r.date))].filter(d => d < selDate).sort(); return dates[dates.length - 1] || null; })();
  const copyFromPrevDay = () => { 
    if (!sourceDate) return; 
    const src = studyRecords.filter(r => r.date === sourceDate); 
    const newRecs = src.map((r, i) => ({ ...r, id: 'study_' + Date.now() + '_' + i, date: selDate, actual: 0 })); 
    onRecordsChange(prev => [...prev, ...newRecs]); 
  };
  const parseAndPrepare = (text) => {
    setImportMsg(''); setConfirmImport(null);
    try {
      const rows = parseCSV(text);
      if (rows.length < 2) throw new Error('データが不足しています');
      const headers = rows[0].map(h => h.trim());
      const idx = { name: headers.indexOf('名前'), act1: headers.indexOf('内容1'), act2: headers.indexOf('内容2'), date: headers.indexOf('日付'), actual: headers.indexOf('実際時間') };
      if (idx.name === -1 || idx.date === -1 || idx.actual === -1) throw new Error('必要な列(名前/日付/実際時間)が見つかりません');
      const subjectsSet = new Set(studySubjects);
      const newRecords = [];
      let skipped = 0;
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        const subject = (r[idx.name] || '').trim();
        const date = parseNotionDate(r[idx.date]);
        const actual = parseFloat((r[idx.actual] || '').trim()) || 0;
        if (!subject || !date || actual <= 0) { skipped++; continue; }
        const act1 = (r[idx.act1] || '').trim() || '復習';
        const act2 = (r[idx.act2] || '').trim();
        subjectsSet.add(subject);
        newRecords.push({ id: 'study_imp_' + Date.now() + '_' + i, date, subject, activityType: ACTIVITY_TYPES.includes(act1) ? act1 : '復習', subCategory: act2 === '計算' || act2 === '理論' ? act2 : null, estimated: 0, actual });
      }
      if (newRecords.length === 0) { setImportMsg('❌ 取り込める行がありませんでした'); return; }
      setConfirmImport({ records: newRecords, subjects: Array.from(subjectsSet).sort(), skipped, newSubjectCount: Array.from(subjectsSet).length - studySubjects.length });
    } catch (err) { setImportMsg('❌ ' + err.message); }
  };
  const confirmAndImport = async () => {
    if (!confirmImport) return;
    setImporting(true);
    try {
      await onSubjectsChange(confirmImport.subjects);
      await onRecordsChange(prev => [...prev, ...confirmImport.records]);
      setImportMsg(`✓ ${confirmImport.records.length}件をインポートしました`);
      setConfirmImport(null); setPasteText('');
      setTimeout(() => { setPasteOpen(false); setImportMsg(''); }, 2000);
    } catch (err) { setImportMsg('❌ 保存失敗: ' + err.message); } finally { setImporting(false); }
  };
  const handleCSVImport = async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    try { const text = await file.text(); parseAndPrepare(text); }
    catch (err) { setImportMsg('❌ ファイル読み込み失敗: ' + err.message); }
    finally { if (fileRef.current) fileRef.current.value = ''; }
  };
  return (
    <div className="space-y-4">
      <PomodoroTimer pomodoro={pomodoro} onChange={onPomodoroChange} />
      <div className="bg-white rounded-xl p-4 shadow-sm border border-stone-200">
        <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
          <h3 className="text-sm font-semibold text-stone-700 flex items-center gap-1.5"><GraduationCap size={16} className="text-emerald-600" />勉強記録</h3>
          <div className="flex gap-2">
            <button onClick={() => setManagingSubjects(!managingSubjects)} className="text-xs text-stone-500 hover:text-emerald-700 flex items-center gap-1"><FolderPlus size={13} />科目管理</button>
            <input ref={fileRef} type="file" accept=".csv" onChange={handleCSVImport} className="hidden" />
            <button onClick={() => setPasteOpen(true)} disabled={importing} className="text-xs text-emerald-700 flex items-center gap-1 disabled:opacity-50"><Upload size={13} />CSV取込</button>
          </div>
        </div>
        <label className="text-xs text-stone-500 block mb-1.5">📅 日付</label>
        <input type="date" value={selDate} onChange={(e) => setSelDate(e.target.value)} className="w-full md:w-auto px-3 py-2 border border-stone-300 rounded-lg text-sm" />
      </div>
      {managingSubjects && <SubjectManager subjects={studySubjects} onChange={onSubjectsChange} records={studyRecords} onRecordsChange={onRecordsChange} onClose={() => setManagingSubjects(false)} />}
      {pasteOpen && (
        <div className="bg-white rounded-xl p-4 shadow-sm border-2 border-emerald-300">
          <div className="flex justify-between items-center mb-3"><h3 className="text-sm font-semibold text-stone-700">📥 CSVインポート</h3><button onClick={() => { setPasteOpen(false); setPasteText(''); setConfirmImport(null); setImportMsg(''); }} className="text-stone-400"><X size={14} /></button></div>
          {!confirmImport && <>
            <p className="text-xs text-stone-500 mb-3">Notionの「タスク」CSVから勉強記録を取り込みます。</p>
            <div className="space-y-2">
              <button onClick={() => fileRef.current?.click()} disabled={importing} className="w-full py-2 bg-stone-800 text-white rounded-lg text-sm font-medium disabled:opacity-50 flex items-center justify-center gap-2"><Upload size={14} />ファイルから選択</button>
              <div className="text-xs text-stone-400 text-center py-1">— または —</div>
              <textarea value={pasteText} onChange={(e) => setPasteText(e.target.value)} placeholder="CSVの中身をすべて貼り付け" rows={6} className="w-full p-2 border border-stone-300 rounded text-xs font-mono" />
              <button onClick={() => parseAndPrepare(pasteText)} disabled={importing || !pasteText.trim()} className="w-full py-2 bg-emerald-600 text-white rounded-lg text-sm font-medium disabled:opacity-50">貼り付けた内容を解析</button>
            </div>
          </>}
          {confirmImport && <div className="space-y-3">
            <div className="p-3 bg-emerald-50 rounded-lg border border-emerald-200 text-sm space-y-1">
              <div className="font-semibold text-emerald-800">✓ 解析完了：</div>
              <div className="text-stone-700">📚 勉強記録: <span className="font-bold">{confirmImport.records.length}件</span></div>
              <div className="text-stone-700">📖 科目: <span className="font-bold">{confirmImport.subjects.length}個</span>（新規 {confirmImport.newSubjectCount}個）</div>
              {confirmImport.skipped > 0 && <div className="text-amber-700">⚠️ スキップ: {confirmImport.skipped}件</div>}
            </div>
            <div className="flex gap-2"><button onClick={confirmAndImport} disabled={importing} className="flex-1 py-2 bg-emerald-600 text-white rounded-lg text-sm font-medium disabled:opacity-50">{importing ? '保存中...' : '取り込む'}</button><button onClick={() => setConfirmImport(null)} disabled={importing} className="px-4 py-2 text-stone-500 text-sm">キャンセル</button></div>
          </div>}
          {importMsg && <div className={`mt-3 p-2 rounded text-xs ${importMsg.startsWith('✓') ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}`}>{importMsg}</div>}
        </div>
      )}
      <div className="bg-white rounded-xl p-4 shadow-sm border border-stone-200">
        <div className="flex items-center justify-between mb-3 flex-wrap gap-2"><h3 className="text-sm font-semibold text-stone-700">{selDate} の計画と実績</h3>{!adding && !editing && <div className="flex gap-2">{sourceDate && <button onClick={copyFromPrevDay} className="text-xs text-stone-500 hover:text-emerald-700 flex items-center gap-1">📋 前日コピー</button>}<button onClick={() => setAdding(true)} className="text-xs text-emerald-700 flex items-center gap-1"><Plus size={13} />項目追加</button></div>}</div>
        {adding && <StudyRecordForm subjects={studySubjects} date={selDate} onSave={addRecord} onCancel={() => setAdding(false)} />}
        {editing && <StudyRecordForm subjects={studySubjects} date={selDate} initial={editing} onSave={updateRecord} onCancel={() => setEditing(null)} />}
        {dateRecords.length === 0 && !adding && <div className="text-xs text-stone-400 text-center py-6">この日の勉強項目はまだありません</div>}
        {dateRecords.length > 0 && <>
          <div className="space-y-1.5">{dateRecords.map(r => (
            <div key={r.id} className="flex items-center gap-2 p-2.5 rounded-lg bg-stone-50 border border-stone-100">
              <div className="flex-1 min-w-0"><div className="text-sm text-stone-800 truncate">{r.subject}</div><div className="flex items-center gap-1 mt-1"><span className={`text-xs px-1.5 py-0.5 rounded ${activityColors[r.activityType]}`}>{r.activityType}</span>{r.subCategory && <span className={`text-xs px-1.5 py-0.5 rounded ${subCategoryColors[r.subCategory]}`}>{r.subCategory}</span>}</div></div>
              <div className="text-right text-xs"><div className="text-stone-500">見積 {formatHM(r.estimated)}</div><div className="text-stone-800 font-semibold">実績 {formatHM(r.actual)}</div></div>
              <button onClick={() => setEditing(r)} className="text-stone-400 hover:text-emerald-600"><Edit2 size={14} /></button>
              <button onClick={() => deleteRecord(r.id)} className="text-stone-400 hover:text-red-500"><Trash2 size={14} /></button>
            </div>
          ))}</div>
          <div className="mt-3 pt-3 border-t border-stone-100 grid grid-cols-3 gap-2 text-center">
            <div><div className="text-xs text-stone-500">見積合計</div><div className="text-base font-bold text-stone-700">{formatHM(totalEst)}</div></div>
            <div><div className="text-xs text-stone-500">実績合計</div><div className="text-base font-bold text-emerald-700">{formatHM(totalAct)}</div></div>
            <div><div className="text-xs text-stone-500">達成率</div><div className="text-base font-bold text-stone-700">{totalEst > 0 ? Math.round(totalAct / totalEst * 100) : '—'}%</div></div>
          </div>
        </>}
      </div>
      <SubjectStatsCard records={studyRecords} subjects={studySubjects} />
    </div>
  );
}

function SubjectManager({ subjects, onChange, records, onRecordsChange, onClose }) {
  const [newSubject, setNewSubject] = useState('');
  const add = () => { if (!newSubject.trim() || subjects.includes(newSubject.trim())) return; onChange([...subjects, newSubject.trim()].sort()); setNewSubject(''); };
  const remove = (s) => { const usedCount = records.filter(r => r.subject === s).length; if (usedCount > 0 && !confirm(`「${s}」は${usedCount}件で使用中。削除しますか？`)) return; onChange(subjects.filter(x => x !== s)); };
  return (
    <div className="bg-amber-50 rounded-xl p-3 border border-amber-200">
      <div className="flex justify-between items-center mb-2"><div className="text-xs font-semibold text-stone-700">科目マスター</div><button onClick={onClose} className="text-stone-400"><X size={14} /></button></div>
      <div className="space-y-1.5 mb-2 max-h-60 overflow-y-auto">
        {subjects.length === 0 && <div className="text-xs text-stone-500 text-center py-2">科目がまだありません</div>}
        {subjects.map(s => <div key={s} className="flex items-center gap-2 p-1.5 bg-white rounded"><span className="flex-1 text-sm">{s}</span><span className="text-xs text-stone-400">{records.filter(r => r.subject === s).length}件</span><button onClick={() => remove(s)} className="text-stone-400 hover:text-red-500"><Trash2 size={12} /></button></div>)}
      </div>
      <div className="flex gap-2"><input type="text" value={newSubject} onChange={(e) => setNewSubject(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && add()} placeholder="新しい科目..." className="flex-1 px-2 py-1.5 border border-stone-300 rounded text-sm bg-white" /><button onClick={add} className="px-3 py-1.5 bg-emerald-600 text-white rounded text-sm">追加</button></div>
    </div>
  );
}

function SubjectStatsCard({ records, subjects }) {
  const stats = useMemo(() => {
    const all = new Set([...subjects, ...records.map(r => r.subject)]);
    const result = [];
    for (const s of all) { const recs = records.filter(r => r.subject === s); if (recs.length === 0) continue; result.push({ subject: s, count: recs.length, totalHours: recs.reduce((sum, r) => sum + (Number(r.actual) || 0), 0) }); }
    return result.sort((a, b) => b.totalHours - a.totalHours);
  }, [records, subjects]);
  if (stats.length === 0) return null;
  const maxHours = Math.max(...stats.map(s => s.totalHours), 1);
  return (
    <div className="bg-white rounded-xl p-4 shadow-sm border border-stone-200">
      <h3 className="text-sm font-semibold text-stone-700 mb-3">📊 科目別累計時間</h3>
      <div className="space-y-2">{stats.map(s => <div key={s.subject}><div className="flex justify-between text-xs mb-0.5"><span className="text-stone-700">{s.subject}</span><span className="text-stone-500">{formatHM(s.totalHours)} ({s.count}回)</span></div><div className="h-2 bg-stone-100 rounded overflow-hidden"><div className="h-full bg-emerald-500 rounded" style={{ width: `${(s.totalHours / maxHours) * 100}%` }} /></div></div>)}</div>
    </div>
  );
}

function HMInput({ value, onChange }) {
  const [text, setText] = useState(formatHM(value));
  const [focused, setFocused] = useState(false);
  useEffect(() => { if (!focused) setText(formatHM(value)); }, [value, focused]);
  const commit = () => {
    setFocused(false);
    const cleaned = text.trim().replace(/[::]/g, ':');
    if (cleaned === '') { onChange(0); setText('0:00'); return; }
    const cm = cleaned.match(/^(\d+):(\d{1,2})$/);
    const nm = cleaned.match(/^(\d+(?:\.\d+)?)$/);
    if (cm) { const h = parseInt(cm[1]) || 0; const m = Math.min(59, parseInt(cm[2]) || 0); const v = hmToHours(h, m); onChange(v); setText(formatHM(v)); }
    else if (nm) { const v = parseFloat(nm[1]) || 0; onChange(v); setText(formatHM(v)); }
    else setText(formatHM(value));
  };
  return <input type="text" inputMode="numeric" value={text} onChange={(e) => setText(e.target.value)} onFocus={() => setFocused(true)} onBlur={commit} onKeyDown={(e) => { if (e.key === 'Enter') e.target.blur(); }} placeholder="0:00" className="w-full px-1 py-1.5 border border-stone-300 rounded text-center text-sm" />;
}

function NoteEditor({ value, onChange }) {
  const ref = useRef(null);
  const [text, setText] = useState(value || '');
  useEffect(() => { if (text !== value) setText(value || ''); }, [value]);
  const handleChange = (e) => { setText(e.target.value); onChange(e.target.value); };
  const getLineInfo = (val, pos) => { const lineStart = val.lastIndexOf('\n', pos - 1) + 1; const nextNewline = val.indexOf('\n', pos); const lineEnd = nextNewline === -1 ? val.length : nextNewline; return { lineStart, lineEnd, line: val.slice(lineStart, lineEnd) }; };
  const setSelection = (start, end) => { requestAnimationFrame(() => { if (ref.current) { ref.current.focus(); ref.current.setSelectionRange(start, end ?? start); } }); };
  const matchPrefix = (line) => { const b = line.match(/^(\s*)([•・\-])( ?)/); if (b) return { indent: b[1], marker: b[2], prefix: b[0], type: 'bullet' }; const n = line.match(/^(\s*)(\d+)\.( ?)/); if (n) return { indent: n[1], marker: n[2] + '.', prefix: n[0], type: 'number' }; return null; };
  const handleKeyDown = (e) => {
    const el = e.target, pos = el.selectionStart, end = el.selectionEnd, val = el.value;
    if (e.key === 'Enter' && !e.shiftKey && pos === end) {
      const { lineStart, line } = getLineInfo(val, pos); const m = matchPrefix(line);
      if (m) {
        const contentAfterPrefix = line.slice(m.prefix.length);
        if (contentAfterPrefix.trim() === '') { e.preventDefault(); const newVal = val.slice(0, lineStart) + val.slice(lineStart + line.length); setText(newVal); onChange(newVal); setSelection(lineStart); return; }
        e.preventDefault();
        const sep = m.prefix.endsWith(' ') ? ' ' : '';
        const nextPrefix = m.type === 'bullet' ? m.indent + m.marker + sep : m.indent + (parseInt(m.marker) + 1) + '.' + sep;
        const newVal = val.slice(0, pos) + '\n' + nextPrefix + val.slice(end);
        setText(newVal); onChange(newVal); setSelection(pos + 1 + nextPrefix.length); return;
      }
    }
    if (e.key === 'Tab') {
      e.preventDefault(); const { lineStart, lineEnd, line } = getLineInfo(val, pos); const m = matchPrefix(line);
      if (e.shiftKey) {
        if (m && m.indent.length >= 2) { const nv = val.slice(0, lineStart) + line.slice(2) + val.slice(lineEnd); setText(nv); onChange(nv); setSelection(Math.max(lineStart, pos - 2)); }
        else if (m && m.indent.length > 0) { const nv = val.slice(0, lineStart) + line.slice(m.indent.length) + val.slice(lineEnd); setText(nv); onChange(nv); setSelection(Math.max(lineStart, pos - m.indent.length)); }
        else if (line.startsWith('  ')) { const nv = val.slice(0, lineStart) + line.slice(2) + val.slice(lineEnd); setText(nv); onChange(nv); setSelection(Math.max(lineStart, pos - 2)); }
      } else {
        const nv = val.slice(0, lineStart) + '  ' + line + val.slice(lineEnd); setText(nv); onChange(nv); setSelection(pos + 2);
      }
      return;
    }
  };
  return <div><textarea ref={ref} value={text} onChange={handleChange} onKeyDown={handleKeyDown} placeholder="今日はどんな1日でしたか？" rows={8} className="w-full p-3 border border-stone-300 rounded-lg text-sm font-mono resize-y focus:outline-none focus:border-emerald-500 leading-relaxed" style={{ tabSize: 2 }} /><p className="text-xs text-stone-400 mt-1.5">💡 「・」「-」「1.」で箇条書き / Tab で字下げ</p></div>;
}

function getDraftFor(entries, selectedDate) {
  if (entries[selectedDate]) {
    const e = entries[selectedDate];
    return { ...emptyDiary(), ...e, planned: { ...emptyDiary().planned, ...(e.planned || {}) }, actual: { ...emptyDiary().actual, ...(e.actual || {}) }, sleepDelay: e.sleepDelay ?? 0 };
  }
  const past = Object.keys(entries).filter(d => d < selectedDate).sort();
  const base = emptyDiary();
  if (past.length > 0) { const recent = entries[past[past.length - 1]]; if (recent && recent.planned) return { ...base, planned: { ...recent.planned } }; }
  return base;
}

function DiaryView({ entries, studyRecords, selectedDate, setSelectedDate, onSave, saveStatus }) {
  const [draft, setDraft] = useState(() => getDraftFor(entries, selectedDate));
  useEffect(() => { setDraft(getDraftFor(entries, selectedDate)); }, [selectedDate, entries]);
  const sleep = useMemo(() => getSleepHoursDraft(selectedDate, draft, entries), [draft.wakeTime, draft.bedTime, draft.sleepDelay, selectedDate, entries]);
  const activeTime = useMemo(() => calcActiveTime(draft.wakeTime, draft.bedTime), [draft.wakeTime, draft.bedTime]);
  const yesterdayEntry = entries[getYesterdayStr(selectedDate)];
  const hasYesterdayBed = !!yesterdayEntry?.bedTime;
  const dateStudyRecords = studyRecords.filter(r => r.date === selectedDate);
  const hasStudyRecords = dateStudyRecords.length > 0;
  const computedWork = dateStudyRecords.reduce((s, r) => s + (Number(r.actual) || 0), 0);
  const aw = hasStudyRecords ? computedWork : (Number(draft.actual.work) || 0);
  const al = Number(draft.actual.life) || 0;
  const ao = Number(draft.actual.other) || 0;
  const sleepDelayH = Number(draft.sleepDelay) || 0;
  const studyAvailable = Math.max(0, (activeTime - al - ao) * (50 / 60));
  const studyBreak = aw / 5;
  const surplus = activeTime - aw * (6 / 5) - al - ao;
  const plannedSum = studyAvailable + (Number(draft.planned.life) || 0) + (Number(draft.planned.other) || 0) + sleep + sleepDelayH;
  const actualSum = aw + studyBreak + al + ao + sleep + sleepDelayH + Math.max(0, surplus);
  const isPriorPlanCarried = !entries[selectedDate] && Object.keys(entries).some(d => d < selectedDate);
  const pieData = [
    { name: '勉強', value: aw, color: '#10b981' },
    { name: '休憩', value: studyBreak, color: '#6ee7b7' },
    { name: '生活必要', value: al, color: '#f59e0b' },
    { name: 'その他必要', value: ao, color: '#8b5cf6' },
    { name: '睡眠', value: sleep, color: '#64748b' },
    { name: '寝つき待ち', value: sleepDelayH, color: '#94a3b8' },
    { name: '余剰時間', value: Math.max(0, surplus), color: '#fde68a' }
  ].filter(d => d.value > 0);
  const updatePlanned = (k, v) => setDraft({ ...draft, planned: { ...draft.planned, [k]: v } });
  const updateActual = (k, v) => setDraft({ ...draft, actual: { ...draft.actual, [k]: v } });
  return (
    <div className="space-y-4">
      <div className="bg-white rounded-xl p-4 shadow-sm border border-stone-200">
        <label className="text-xs text-stone-500 block mb-1.5">📅 日付</label>
        <input type="date" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} className="w-full md:w-auto px-3 py-2 border border-stone-300 rounded-lg text-sm" />
      </div>
      <div className="bg-white rounded-xl p-4 shadow-sm border border-stone-200">
        <h3 className="text-sm font-semibold text-stone-700 mb-3">😊 今日のメンタル状況</h3>
        <div className="flex gap-1.5">{[1, 2, 3, 4, 5].map(level => <button key={level} onClick={() => setDraft({ ...draft, mood: level })} className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 rounded-lg border-2 transition ${draft.mood === level ? 'border-emerald-500 bg-emerald-50' : 'border-stone-200 hover:bg-stone-50'}`}><span className="text-xl">{moodEmojis[level - 1]}</span><span className="text-xs text-stone-500">{level}</span></button>)}</div>
        <p className="text-xs text-stone-500 mt-2 text-center">{moodLabels[draft.mood - 1]}</p>
      </div>
      <div className="bg-white rounded-xl p-4 shadow-sm border border-stone-200">
        <h3 className="text-sm font-semibold text-stone-700 mb-3">😴 睡眠・体重</h3>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <div><label className="text-xs text-stone-500 block mb-1">起床（今日）</label><input type="time" value={draft.wakeTime} onChange={(e) => setDraft({ ...draft, wakeTime: e.target.value })} className="w-full px-2 py-2 border border-stone-300 rounded-lg text-sm" /></div>
          <div><label className="text-xs text-stone-500 block mb-1">就寝（今日）</label><input type="time" value={draft.bedTime} onChange={(e) => setDraft({ ...draft, bedTime: e.target.value })} className="w-full px-2 py-2 border border-stone-300 rounded-lg text-sm" /></div>
        </div>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <div><label className="text-xs text-stone-500 block mb-1">😪 寝つきにかかった時間</label><HMInput value={sleepDelayH} onChange={(v) => setDraft({ ...draft, sleepDelay: v })} /></div>
          <div><label className="text-xs text-stone-500 block mb-1">⚖️ 体重 (kg)</label><input type="number" step="0.1" min="0" value={draft.weight ?? ''} onChange={(e) => setDraft({ ...draft, weight: e.target.value })} placeholder="例: 65.2" className="w-full px-2 py-2 border border-stone-300 rounded-lg text-sm text-center" /></div>
        </div>
        <div className="grid grid-cols-2 gap-2">
          <div><label className="text-xs text-stone-500 block mb-1">睡眠時間 {hasYesterdayBed ? '' : '(暫定)'}</label><div className="px-2 py-2 bg-emerald-50 text-emerald-700 rounded-lg text-sm font-semibold text-center">{formatHM(sleep)}</div></div>
          <div><label className="text-xs text-stone-500 block mb-1">活動時間 (起床〜就寝)</label><div className="px-2 py-2 bg-amber-50 text-amber-700 rounded-lg text-sm font-semibold text-center">{formatHM(activeTime)}</div></div>
        </div>
        <p className="text-xs text-stone-400 mt-2 leading-relaxed">💡 睡眠時間 = 前日就寝 → 今日起床 − 寝つき待ち時間{!hasYesterdayBed && <span className="block text-amber-600 mt-0.5">⚠️ 前日のデータがないため、今日の就寝時刻から仮計算</span>}</p>
      </div>
      <div className="bg-white rounded-xl p-4 shadow-sm border border-stone-200">
        <h3 className="text-sm font-semibold text-stone-700 mb-1">📊 時間配分</h3>
        <p className="text-xs text-stone-400 mb-3">📚 勉強の可能時間は活動時間({formatHM(activeTime)})から自動算出{hasStudyRecords && <span className="ml-2 text-emerald-600">✓ 勉強実績は記録から自動集計</span>}{isPriorPlanCarried && <span className="ml-2 text-emerald-600">✓ 前回の予定を引き継ぎ</span>}</p>
        <div className="space-y-2.5">
          <div className="grid grid-cols-12 gap-2 text-xs text-stone-400 pb-1 border-b border-stone-100"><div className="col-span-4"></div><div className="col-span-3 text-center">可能/予定</div><div className="col-span-3 text-center">実績</div><div className="col-span-2 text-right">差異</div></div>
          <TimeRow label="📚 勉強" plan={studyAvailable} actual={aw} onActualChange={(v) => updateActual('work', v)} readOnlyPlan readOnlyActual={hasStudyRecords} />
          <TimeRow label="🍽️ 生活必要" plan={draft.planned.life} actual={draft.actual.life} onPlanChange={(v) => updatePlanned('life', v)} onActualChange={(v) => updateActual('life', v)} invertVariance />
          <TimeRow label="🛒 その他必要" plan={draft.planned.other} actual={draft.actual.other} onPlanChange={(v) => updatePlanned('other', v)} onActualChange={(v) => updateActual('other', v)} invertVariance />
          <div className="grid grid-cols-12 gap-2 items-center text-sm"><div className="col-span-4 text-stone-600">😴 睡眠</div><div className="col-span-3 text-center text-stone-400 text-xs">自動</div><div className="col-span-3 text-center font-medium text-stone-700">{formatHM(sleep)}</div><div className="col-span-2 text-right text-xs text-stone-400">—</div></div>
          {sleepDelayH > 0 && <div className="grid grid-cols-12 gap-2 items-center text-sm"><div className="col-span-4 text-stone-500 text-xs">😪 寝つき待ち</div><div className="col-span-3 text-center text-stone-400 text-xs">—</div><div className="col-span-3 text-center font-medium text-stone-600 text-xs">{formatHM(sleepDelayH)}</div><div className="col-span-2 text-right text-xs text-stone-400">—</div></div>}
          <div className="border-t border-stone-200 pt-2.5 grid grid-cols-12 gap-2 items-center text-sm"><div className="col-span-4 font-semibold text-stone-700">合計</div><div className="col-span-3 text-center font-medium text-stone-700">{formatHM(plannedSum)}</div><div className="col-span-3 text-center font-medium text-stone-700">{formatHM(actualSum)}</div><div className={`col-span-2 text-right text-xs font-medium ${actualSum > 24.05 ? 'text-red-500' : 'text-stone-400'}`}>/ 24:00</div></div>
          <div className="border-t border-dashed border-stone-200 pt-2.5 grid grid-cols-12 gap-2 items-center text-sm"><div className="col-span-4 text-stone-600">⏳ 余剰時間</div><div className="col-span-3 text-center text-stone-400 text-xs">—</div><div className={`col-span-3 text-center font-semibold ${surplus < 0 ? 'text-red-500' : surplus < 0.5 ? 'text-emerald-600' : 'text-amber-500'}`}>{surplus < 0 ? '−' : ''}{formatHM(Math.abs(surplus))}</div><div className="col-span-2 text-right text-xs text-stone-400">娯楽等</div></div>
        </div>
        {pieData.length > 0 && <div className="mt-4 pt-4 border-t border-stone-100"><p className="text-xs text-stone-500 mb-2">実績の24時間配分</p><ResponsiveContainer width="100%" height={200}><PieChart><Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={70} label={(d) => `${d.name} ${formatHM(d.value)}`}>{pieData.map((d, i) => <Cell key={i} fill={d.color} />)}</Pie><Tooltip formatter={(v) => formatHM(v)} /></PieChart></ResponsiveContainer></div>}
      </div>
      <div className="bg-white rounded-xl p-4 shadow-sm border border-stone-200"><h3 className="text-sm font-semibold text-stone-700 mb-3">✍️ 今日の日記</h3><NoteEditor value={draft.note} onChange={(v) => setDraft({ ...draft, note: v })} /></div>
