function TimeRow({ label, plan, actual, onPlanChange, onActualChange, invertVariance, readOnlyPlan, readOnlyActual }) {
  const diff = (Number(actual) || 0) - (Number(plan) || 0);
  const absStr = formatHM(Math.abs(diff));
  const diffSign = diff > 0.001 ? '+' : diff < -0.001 ? '−' : '';
  const diffColor = invertVariance ? (diff > 0.001 ? 'text-red-500' : diff < -0.001 ? 'text-blue-600' : 'text-stone-400') : (diff > 0.001 ? 'text-blue-600' : diff < -0.001 ? 'text-red-500' : 'text-stone-400');
  return <div className="grid grid-cols-12 gap-2 items-center text-sm"><div className="col-span-4 text-stone-700">{label}</div><div className="col-span-3">{readOnlyPlan ? <div className="px-1 py-1.5 bg-emerald-50 border border-emerald-200 rounded text-center text-sm font-medium text-emerald-700">{formatHM(plan)}</div> : <HMInput value={plan} onChange={onPlanChange} />}</div><div className="col-span-3">{readOnlyActual ? <div className="px-1 py-1.5 bg-emerald-50 border border-emerald-200 rounded text-center text-sm font-medium text-emerald-700">{formatHM(actual)}</div> : <HMInput value={actual} onChange={onActualChange} />}</div><div className={`col-span-2 text-right text-xs font-semibold ${diffColor}`}>{diffSign}{absStr}</div></div>;
}

// ============== MEMO VIEW ==============

function MemoView({ memos, onChange }) {
  const [adding, setAdding] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [search, setSearch] = useState('');
  const [filterTag, setFilterTag] = useState('all');
  const [newText, setNewText] = useState('');
  const [newTags, setNewTags] = useState('');

  const allTags = useMemo(() => {
    const set = new Set();
    memos.forEach(m => (m.tags || []).forEach(t => set.add(t)));
    return Array.from(set).sort();
  }, [memos]);

  const filtered = useMemo(() => {
    let list = [...memos];
    if (filterTag !== 'all') list = list.filter(m => (m.tags || []).includes(filterTag));
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      list = list.filter(m => (m.text || '').toLowerCase().includes(q) || (m.tags || []).some(t => t.toLowerCase().includes(q)));
    }
    // ピン留めを上に、その後は更新日時の降順
    list.sort((a, b) => {
      if (!!a.pinned !== !!b.pinned) return a.pinned ? -1 : 1;
      return (b.updatedAt || b.createdAt || '').localeCompare(a.updatedAt || a.createdAt || '');
    });
    return list;
  }, [memos, search, filterTag]);

  const parseTags = (s) => s.split(/[,、,\s]+/).map(t => t.trim()).filter(Boolean);

  const add = () => {
    if (!newText.trim()) return;
    const now = new Date().toISOString();
    onChange([{ id: 'memo_' + Date.now(), text: newText.trim(), tags: parseTags(newTags), pinned: false, createdAt: now, updatedAt: now }, ...memos]);
    setNewText(''); setNewTags(''); setAdding(false);
  };

  const update = (id, patch) => {
    onChange(memos.map(m => m.id === id ? { ...m, ...patch, updatedAt: new Date().toISOString() } : m));
  };

  const togglePin = (id) => {
    const m = memos.find(x => x.id === id);
    if (!m) return;
    update(id, { pinned: !m.pinned });
  };

  const remove = (id) => {
    if (!confirm('このメモを削除しますか？')) return;
    onChange(memos.filter(m => m.id !== id));
  };

  return (
    <div className="space-y-3">
      <div className="bg-white rounded-xl p-4 shadow-sm border border-stone-200">
        <div className="flex items-center justify-between mb-3">
          <h3 className="text-sm font-semibold text-stone-700 flex items-center gap-1.5"><StickyNote size={16} className="text-emerald-600" />思いつきメモ<span className="text-xs text-stone-400 font-normal">{memos.length}件</span></h3>
          {!adding && <button onClick={() => setAdding(true)} className="text-xs text-emerald-700 flex items-center gap-1"><Plus size={13} />新規</button>}
        </div>

        {adding ? (
          <div className="space-y-2 mb-3 p-3 bg-amber-50 rounded-lg border border-amber-200">
            <textarea value={newText} onChange={(e) => setNewText(e.target.value)} placeholder="思いついたことを書く..." autoFocus rows={4} className="w-full p-2 border border-stone-300 rounded text-sm bg-white resize-y" />
            <input type="text" value={newTags} onChange={(e) => setNewTags(e.target.value)} placeholder="タグ（カンマ区切り、任意） 例: アイデア, 仕事" list="memo-tags" className="w-full px-2 py-1.5 border border-stone-300 rounded text-sm bg-white" />
            <datalist id="memo-tags">{allTags.map(t => <option key={t} value={t} />)}</datalist>
            <div className="flex gap-2">
              <button onClick={add} disabled={!newText.trim()} className="flex-1 py-1.5 bg-emerald-600 text-white rounded text-sm disabled:opacity-50">追加</button>
              <button onClick={() => { setAdding(false); setNewText(''); setNewTags(''); }} className="px-3 py-1.5 text-stone-500 text-sm">キャンセル</button>
            </div>
          </div>
        ) : (
          <div className="flex gap-2 mb-2">
            <div className="flex-1 relative">
              <Search size={14} className="absolute left-2 top-1/2 -translate-y-1/2 text-stone-400" />
              <input type="text" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="メモを検索..." className="w-full pl-7 pr-2 py-1.5 border border-stone-300 rounded text-sm" />
            </div>
          </div>
        )}

        {allTags.length > 0 && !adding && (
          <div className="flex gap-1 flex-wrap">
            <button onClick={() => setFilterTag('all')} className={`px-2.5 py-1 rounded-full text-xs ${filterTag === 'all' ? 'bg-stone-800 text-white' : 'bg-stone-100 text-stone-600'}`}>すべて</button>
            {allTags.map(t => <button key={t} onClick={() => setFilterTag(t)} className={`px-2.5 py-1 rounded-full text-xs ${filterTag === t ? 'bg-emerald-600 text-white' : 'bg-emerald-50 text-emerald-700'}`}>#{t}</button>)}
          </div>
        )}
      </div>

      <div className="space-y-2">
        {filtered.length === 0 && (
          <div className="bg-white rounded-xl p-8 text-center text-stone-400 text-sm border border-stone-200">
            {memos.length === 0 ? '思いついたことをここに書き留めましょう' : '該当するメモがありません'}
          </div>
        )}
        {filtered.map(m => editingId === m.id ? (
          <MemoEditRow key={m.id} memo={m} allTags={allTags} onSave={(patch) => { update(m.id, patch); setEditingId(null); }} onCancel={() => setEditingId(null)} />
        ) : (
          <div key={m.id} className={`rounded-xl p-3 shadow-sm border ${m.pinned ? 'bg-amber-50 border-amber-300' : 'bg-white border-stone-200'}`}>
            <div className="flex items-start gap-2">
              <button onClick={() => togglePin(m.id)} className={`flex-shrink-0 mt-0.5 ${m.pinned ? 'text-amber-600' : 'text-stone-300 hover:text-amber-500'}`} title={m.pinned ? 'ピン留め解除' : 'ピン留め'}>
                <Pin size={14} className={m.pinned ? 'fill-current' : ''} />
              </button>
              <div className="flex-1 min-w-0">
                <div className="text-sm text-stone-800 whitespace-pre-wrap break-words">{m.text}</div>
                <div className="flex items-center gap-2 mt-1.5 flex-wrap">
                  {(m.tags || []).map(t => <span key={t} className="text-xs px-1.5 py-0.5 rounded bg-emerald-50 text-emerald-700">#{t}</span>)}
                  <span className="text-xs text-stone-400">{(m.updatedAt || m.createdAt || '').slice(0, 16).replace('T', ' ')}</span>
                </div>
              </div>
              <button onClick={() => setEditingId(m.id)} className="text-stone-400 hover:text-emerald-600 flex-shrink-0"><Edit2 size={14} /></button>
              <button onClick={() => remove(m.id)} className="text-stone-400 hover:text-red-500 flex-shrink-0"><Trash2 size={14} /></button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function MemoEditRow({ memo, allTags, onSave, onCancel }) {
  const [text, setText] = useState(memo.text);
  const [tags, setTags] = useState((memo.tags || []).join(', '));
  const parseTags = (s) => s.split(/[,、,\s]+/).map(t => t.trim()).filter(Boolean);
  return (
    <div className="bg-amber-50 rounded-xl p-3 border border-amber-200 space-y-2">
      <textarea value={text} onChange={(e) => setText(e.target.value)} autoFocus rows={4} className="w-full p-2 border border-stone-300 rounded text-sm bg-white resize-y" />
      <input type="text" value={tags} onChange={(e) => setTags(e.target.value)} placeholder="タグ" list="memo-edit-tags" className="w-full px-2 py-1.5 border border-stone-300 rounded text-sm bg-white" />
      <datalist id="memo-edit-tags">{allTags.map(t => <option key={t} value={t} />)}</datalist>
      <div className="flex gap-2"><button onClick={() => onSave({ text: text.trim(), tags: parseTags(tags) })} disabled={!text.trim()} className="flex-1 py-1.5 bg-emerald-600 text-white rounded text-sm disabled:opacity-50">更新</button><button onClick={onCancel} className="px-3 py-1.5 text-stone-500 text-sm">キャンセル</button></div>
    </div>
  );
}

// ============== JOURNAL (自省録) ==============

function newBullet(level = 0) {
  return { id: 'b_' + Date.now() + '_' + Math.random().toString(36).slice(2), text: '', level };
}

function BulletEditor({ bullets, onChange }) {
  const inputRefs = useRef([]);
  const items = bullets.length > 0 ? bullets : [newBullet(0)];

  const focusIdx = (idx) => {
    setTimeout(() => {
      const el = inputRefs.current[idx];
      if (el) { el.focus(); const len = el.value.length; el.setSelectionRange(len, len); }
    }, 0);
  };

  const update = (idx, text) => {
    const next = items.map((b, i) => i === idx ? { ...b, text } : b);
    onChange(next);
  };

  const handleKeyDown = (e, idx) => {
    const bullet = items[idx];

    if (e.key === 'Enter') {
      e.preventDefault();
      if (bullet.text === '' && bullet.level > 0) {
        // 空行でインデントあり → 一段上がる
        const next = items.map((b, i) => i === idx ? { ...b, level: b.level - 1 } : b);
        onChange(next);
        focusIdx(idx);
      } else {
        // 新しい行を現在の位置の後ろに追加
        const nb = newBullet(bullet.level);
        const next = [...items.slice(0, idx + 1), nb, ...items.slice(idx + 1)];
        onChange(next);
        focusIdx(idx + 1);
      }
    } else if (e.key === 'Tab') {
      e.preventDefault();
      if (e.shiftKey) {
        if (bullet.level > 0) {
          const next = items.map((b, i) => i === idx ? { ...b, level: b.level - 1 } : b);
          onChange(next);
        }
      } else {
        if (bullet.level < 4) {
          const next = items.map((b, i) => i === idx ? { ...b, level: b.level + 1 } : b);
          onChange(next);
        }
      }
    } else if (e.key === 'Backspace' && bullet.text === '') {
      e.preventDefault();
      if (bullet.level > 0) {
        const next = items.map((b, i) => i === idx ? { ...b, level: b.level - 1 } : b);
        onChange(next);
      } else if (items.length > 1) {
        const next = items.filter((_, i) => i !== idx);
        onChange(next);
        focusIdx(Math.max(0, idx - 1));
      }
    } else if (e.key === 'ArrowUp' && idx > 0) {
      e.preventDefault(); focusIdx(idx - 1);
    } else if (e.key === 'ArrowDown' && idx < items.length - 1) {
      e.preventDefault(); focusIdx(idx + 1);
    }
  };

  return (
    <div className="space-y-0.5">
      {items.map((b, idx) => (
        <div key={b.id} className="flex items-center" style={{ paddingLeft: `${b.level * 20}px` }}>
          <span className="text-stone-400 mr-2 text-sm select-none flex-shrink-0">•</span>
          <input
            ref={el => inputRefs.current[idx] = el}
            type="text"
            value={b.text}
            onChange={e => update(idx, e.target.value)}
            onKeyDown={e => handleKeyDown(e, idx)}
            placeholder={idx === 0 && items.length === 1 ? 'テキストを入力...' : ''}
            className="flex-1 bg-transparent outline-none text-sm text-stone-800 py-0.5 placeholder-stone-300"
          />
        </div>
      ))}
    </div>
  );
}

function JournalEntryEditor({ entry, onSave, onDelete, onClose }) {
  const [subtitle, setSubtitle] = useState(entry.subtitle || '');
  const [date, setDate] = useState(entry.date || todayStr());
  const [bullets, setBullets] = useState(
    entry.bullets && entry.bullets.length > 0 ? entry.bullets : [newBullet(0)]
  );

  const save = () => {
    onSave({ ...entry, subtitle, date, bullets: bullets.filter(b => b.text.trim() !== '' || bullets.length === 1) });
  };

  return (
    <div className="space-y-3">
      <div className="flex items-center gap-2">
        <button onClick={onClose} className="text-stone-400 hover:text-stone-600 text-sm flex items-center gap-1">
          <X size={14} />
        </button>
        <span className="text-xs text-stone-400">エントリーを編集</span>
      </div>
      <div className="space-y-2">
        <input
          type="text"
          value={subtitle}
          onChange={e => setSubtitle(e.target.value)}
          placeholder="小題（タイトル）"
          className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white font-medium"
          autoFocus
        />
        <input
          type="date"
          value={date}
          onChange={e => setDate(e.target.value)}
          className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white"
        />
      </div>
      <div className="bg-white rounded-lg border border-stone-200 p-3 min-h-32">
        <BulletEditor bullets={bullets} onChange={setBullets} />
      </div>
      <div className="flex gap-2">
        <button onClick={save} className="flex-1 py-2 bg-emerald-600 text-white rounded-lg text-sm font-medium">保存</button>
        <button onClick={onDelete} className="px-3 py-2 text-red-500 hover:text-red-700 text-sm"><Trash2 size={14} /></button>
        <button onClick={onClose} className="px-3 py-2 text-stone-500 text-sm">閉じる</button>
      </div>
    </div>
  );
}

function JournalView({ journals, onChange }) {
  const [selectedCatId, setSelectedCatId] = useState(null);
  const [editingEntryId, setEditingEntryId] = useState(null);
  const [addingCat, setAddingCat] = useState(false);
  const [newCatTitle, setNewCatTitle] = useState('');
  const [editingCatId, setEditingCatId] = useState(null);
  const [editingCatTitle, setEditingCatTitle] = useState('');
  const [dragCatId, setDragCatId] = useState(null);
  const [dragOverCatId, setDragOverCatId] = useState(null);
  const [dragEntryId, setDragEntryId] = useState(null);
  const [dragOverEntryId, setDragOverEntryId] = useState(null);

  const selectedCat = journals.find(j => j.id === selectedCatId) || null;

  const addCategory = () => {
    if (!newCatTitle.trim()) return;
    const cat = { id: 'j_' + Date.now(), title: newCatTitle.trim(), createdAt: new Date().toISOString(), entries: [] };
    onChange([...journals, cat]);
    setSelectedCatId(cat.id);
    setNewCatTitle('');
    setAddingCat(false);
  };

  const deleteCategory = (id) => {
    if (!confirm('このカテゴリとすべてのエントリーを削除しますか？')) return;
    onChange(journals.filter(j => j.id !== id));
    if (selectedCatId === id) setSelectedCatId(null);
  };

  const renameCategory = (id) => {
    if (!editingCatTitle.trim()) return;
    onChange(journals.map(j => j.id === id ? { ...j, title: editingCatTitle.trim() } : j));
    setEditingCatId(null);
    setEditingCatTitle('');
  };

  const addEntry = () => {
    if (!selectedCat) return;
    const entry = { id: 'e_' + Date.now(), subtitle: '', date: todayStr(), bullets: [newBullet(0)] };
    onChange(journals.map(j => j.id === selectedCatId ? { ...j, entries: [entry, ...j.entries] } : j));
    setEditingEntryId(entry.id);
  };

  const saveEntry = (entry) => {
    onChange(journals.map(j => j.id === selectedCatId
      ? { ...j, entries: j.entries.map(e => e.id === entry.id ? entry : e) }
      : j));
    setEditingEntryId(null);
  };

  const deleteEntry = (entryId) => {
    if (!confirm('このエントリーを削除しますか？')) return;
    onChange(journals.map(j => j.id === selectedCatId
      ? { ...j, entries: j.entries.filter(e => e.id !== entryId) }
      : j));
    setEditingEntryId(null);
  };

  // カテゴリのドラッグ＆ドロップ
  const onCatDragStart = (e, id) => { setDragCatId(id); e.dataTransfer.effectAllowed = 'move'; };
  const onCatDragOver = (e, id) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; if (id !== dragCatId) setDragOverCatId(id); };
  const onCatDrop = (e, targetId) => {
    e.preventDefault();
    if (!dragCatId || dragCatId === targetId) { setDragCatId(null); setDragOverCatId(null); return; }
    const from = journals.findIndex(j => j.id === dragCatId);
    const to = journals.findIndex(j => j.id === targetId);
    if (from === -1 || to === -1) return;
    const next = [...journals];
    next.splice(to, 0, next.splice(from, 1)[0]);
    onChange(next);
    setDragCatId(null); setDragOverCatId(null);
  };
  const onCatDragEnd = () => { setDragCatId(null); setDragOverCatId(null); };

  // エントリーのドラッグ＆ドロップ
  const onEntryDragStart = (e, id) => { setDragEntryId(id); e.dataTransfer.effectAllowed = 'move'; };
  const onEntryDragOver = (e, id) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; if (id !== dragEntryId) setDragOverEntryId(id); };
  const onEntryDrop = (e, targetId) => {
    e.preventDefault();
    if (!dragEntryId || dragEntryId === targetId || !selectedCat) { setDragEntryId(null); setDragOverEntryId(null); return; }
    const entries = selectedCat.entries;
    const from = entries.findIndex(en => en.id === dragEntryId);
    const to = entries.findIndex(en => en.id === targetId);
    if (from === -1 || to === -1) return;
    const next = [...entries];
    next.splice(to, 0, next.splice(from, 1)[0]);
    onChange(journals.map(j => j.id === selectedCatId ? { ...j, entries: next } : j));
    setDragEntryId(null); setDragOverEntryId(null);
  };
  const onEntryDragEnd = () => { setDragEntryId(null); setDragOverEntryId(null); };

  const editingEntry = selectedCat?.entries.find(e => e.id === editingEntryId) || null;

  return (
    <div className="flex gap-4 min-h-96">
      {/* 左：カテゴリリスト */}
      <div className="w-48 flex-shrink-0">
        <div className="bg-white rounded-xl border border-stone-200 shadow-sm overflow-hidden">
          <div className="flex items-center justify-between px-3 py-2.5 border-b border-stone-100">
            <span className="text-xs font-semibold text-stone-600">カテゴリ</span>
            <button onClick={() => setAddingCat(true)} className="text-emerald-600 hover:text-emerald-700" title="追加">
              <Plus size={14} />
            </button>
          </div>
          {addingCat && (
            <div className="p-2 border-b border-stone-100">
              <input
                type="text"
                value={newCatTitle}
                onChange={e => setNewCatTitle(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') addCategory(); if (e.key === 'Escape') { setAddingCat(false); setNewCatTitle(''); } }}
                placeholder="カテゴリ名..."
                autoFocus
                className="w-full px-2 py-1 text-xs border border-stone-300 rounded bg-white"
              />
              <div className="flex gap-1 mt-1">
                <button onClick={addCategory} className="flex-1 py-1 bg-emerald-600 text-white rounded text-xs">追加</button>
                <button onClick={() => { setAddingCat(false); setNewCatTitle(''); }} className="px-2 py-1 text-stone-400 text-xs">×</button>
              </div>
            </div>
          )}
          <div>
            {journals.length === 0 && !addingCat && (
              <div className="p-3 text-center text-xs text-stone-400">カテゴリを追加</div>
            )}
            {journals.map(j => (
              <div
                key={j.id}
                draggable={editingCatId !== j.id}
                onDragStart={e => onCatDragStart(e, j.id)}
                onDragOver={e => onCatDragOver(e, j.id)}
                onDrop={e => onCatDrop(e, j.id)}
                onDragEnd={onCatDragEnd}
                className={`border-b border-stone-100 last:border-0 transition-colors ${dragOverCatId === j.id ? 'bg-emerald-50 border-t-2 border-t-emerald-400' : ''}`}
              >
                {editingCatId === j.id ? (
                  <div className="p-2">
                    <input
                      type="text"
                      value={editingCatTitle}
                      onChange={e => setEditingCatTitle(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') renameCategory(j.id); if (e.key === 'Escape') setEditingCatId(null); }}
                      autoFocus
                      className="w-full px-2 py-1 text-xs border border-stone-300 rounded bg-white"
                    />
                    <div className="flex gap-1 mt-1">
                      <button onClick={() => renameCategory(j.id)} className="flex-1 py-1 bg-emerald-600 text-white rounded text-xs">保存</button>
                      <button onClick={() => setEditingCatId(null)} className="px-2 py-1 text-stone-400 text-xs">×</button>
                    </div>
                  </div>
                ) : (
                  <div
                    onClick={() => { setSelectedCatId(j.id); setEditingEntryId(null); }}
                    onDoubleClick={() => { setEditingCatId(j.id); setEditingCatTitle(j.title); }}
                    className={`px-2 py-2.5 text-sm flex items-center gap-1.5 group cursor-pointer transition ${selectedCatId === j.id ? 'bg-emerald-50 text-emerald-700 font-medium' : 'text-stone-700 hover:bg-stone-50'} ${dragCatId === j.id ? 'opacity-40' : ''}`}
                  >
                    <span className="text-stone-300 hover:text-stone-400 cursor-grab flex-shrink-0" onMouseDown={e => e.stopPropagation()}>
                      <GripVertical size={12} />
                    </span>
                    <span className="flex-1 truncate">{j.title}</span>
                    <button
                      onClick={e => { e.stopPropagation(); deleteCategory(j.id); }}
                      className="opacity-0 group-hover:opacity-100 text-stone-300 hover:text-red-400 flex-shrink-0"
                    >
                      <X size={11} />
                    </button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
        <p className="text-xs text-stone-400 mt-2 px-1">ダブルクリックで名前変更</p>
      </div>

      {/* 右：エントリーリスト or エディタ */}
      <div className="flex-1 min-w-0">
        {!selectedCat ? (
          <div className="bg-white rounded-xl border border-stone-200 shadow-sm p-8 text-center text-stone-400 text-sm">
            左のカテゴリを選択してください
          </div>
        ) : editingEntry ? (
          <div className="bg-white rounded-xl border border-stone-200 shadow-sm p-4">
            <JournalEntryEditor
              entry={editingEntry}
              onSave={saveEntry}
              onDelete={() => deleteEntry(editingEntry.id)}
              onClose={() => setEditingEntryId(null)}
            />
          </div>
        ) : (
          <div className="space-y-2">
            <div className="bg-white rounded-xl border border-stone-200 shadow-sm">
              <div className="flex items-center justify-between px-4 py-3 border-b border-stone-100">
                <h2 className="font-semibold text-stone-800">{selectedCat.title}</h2>
                <button onClick={addEntry} className="flex items-center gap-1 text-xs text-emerald-700 hover:text-emerald-800">
                  <Plus size={14} />新規エントリー
                </button>
              </div>
              {selectedCat.entries.length === 0 ? (
                <div className="p-8 text-center text-stone-400 text-sm">
                  「新規エントリー」を押して追加しましょう
                </div>
              ) : (
                <div className="divide-y divide-stone-100">
                  {selectedCat.entries.map(entry => (
                    <div
                      key={entry.id}
                      draggable
                      onDragStart={e => onEntryDragStart(e, entry.id)}
                      onDragOver={e => onEntryDragOver(e, entry.id)}
                      onDrop={e => onEntryDrop(e, entry.id)}
                      onDragEnd={onEntryDragEnd}
                      className={`group transition-colors ${dragOverEntryId === entry.id ? 'bg-emerald-50 border-t-2 border-t-emerald-400' : 'hover:bg-stone-50'} ${dragEntryId === entry.id ? 'opacity-40' : ''}`}
                    >
                      <div className="flex items-start gap-2 px-4 py-4">
                        <span className="text-stone-200 hover:text-stone-400 cursor-grab flex-shrink-0 mt-0.5">
                          <GripVertical size={14} />
                        </span>
                        <div className="flex-1 min-w-0 cursor-pointer" onClick={() => setEditingEntryId(entry.id)}>
                          <div className="text-sm font-medium text-stone-800">
                            {entry.subtitle || '（無題）'}
                          </div>
                          <div className="text-xs text-stone-400 mt-0.5">{entry.date}</div>
                          {entry.bullets && entry.bullets.some(b => b.text.trim()) && (
                            <div className="mt-1.5 space-y-1">
                              {entry.bullets.filter(b => b.text.trim()).slice(0, 3).map(b => (
                                <div key={b.id} className="flex items-start text-xs text-stone-500" style={{ paddingLeft: `${b.level * 12}px` }}>
                                  <span className="mr-1 flex-shrink-0 mt-0.5">•</span>
                                  <span className="leading-relaxed">{b.text}</span>
                                </div>
                              ))}
                              {entry.bullets.filter(b => b.text.trim()).length > 3 && (
                                <div className="text-xs text-stone-400 pl-3">…他{entry.bullets.filter(b => b.text.trim()).length - 3}件</div>
                              )}
                            </div>
                          )}
                        </div>
                        <Edit2 size={13} className="text-stone-300 group-hover:text-stone-500 flex-shrink-0 mt-0.5 cursor-pointer" onClick={() => setEditingEntryId(entry.id)} />
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ============== TASKS / WISHLIST ==============

function TasksView({ tasks, recurring, recurringCategories, onTasksChange, onRecurringChange, onRecurringCategoriesChange }) {
  return <div className="space-y-4"><RecurringSection recurring={recurring} categories={recurringCategories} onChange={onRecurringChange} onCategoriesChange={onRecurringCategoriesChange} /><OneOffSection tasks={tasks} onChange={onTasksChange} /></div>;
}

function RecurringSection({ recurring, categories, onChange, onCategoriesChange }) {
  const [adding, setAdding] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filterCat, setFilterCat] = useState('all');
  const [managingCats, setManagingCats] = useState(false);
  const remove = (id) => onChange(recurring.filter(r => r.id !== id));
  const update = (rec) => { onChange(recurring.map(r => r.id === rec.id ? rec : r)); setEditing(null); };
  const filtered = filterCat === 'all' ? recurring : recurring.filter(r => r.category === filterCat);
  const grouped = {}; for (const r of filtered) { const cat = r.category || '未分類'; if (!grouped[cat]) grouped[cat] = []; grouped[cat].push(r); }
  return (
    <div className="bg-white rounded-xl p-4 shadow-sm border border-stone-200">
      <div className="flex justify-between items-center mb-3"><h3 className="text-sm font-semibold text-stone-700 flex items-center gap-1.5"><Repeat size={16} className="text-emerald-600" />繰り返しタスク</h3>{!adding && !editing && <div className="flex gap-2"><button onClick={() => setManagingCats(!managingCats)} className="text-xs text-stone-500 flex items-center gap-1"><FolderPlus size={13} />分類</button><button onClick={() => setAdding(true)} className="text-xs text-emerald-700 flex items-center gap-1"><Plus size={13} />追加</button></div>}</div>
      {managingCats && <CategoryManager categories={categories} onChange={onCategoriesChange} recurring={recurring} onRecurringChange={onChange} onClose={() => setManagingCats(false)} />}
      {adding && <RecurringForm categories={categories} onSave={(rec) => { onChange([...recurring, rec]); setAdding(false); }} onCancel={() => setAdding(false)} />}
      {editing && <RecurringForm categories={categories} initial={editing} onSave={update} onCancel={() => setEditing(null)} />}
      {recurring.length > 0 && !adding && !editing && <div className="flex gap-1 mb-3 flex-wrap"><button onClick={() => setFilterCat('all')} className={`px-2.5 py-1 rounded-full text-xs ${filterCat === 'all' ? 'bg-stone-800 text-white' : 'bg-stone-100 text-stone-600'}`}>すべて</button>{categories.map(c => <button key={c} onClick={() => setFilterCat(c)} className={`px-2.5 py-1 rounded-full text-xs ${filterCat === c ? 'bg-stone-800 text-white' : 'bg-stone-100 text-stone-600'}`}>{c}</button>)}</div>}
      {recurring.length === 0 && !adding && <div className="text-xs text-stone-400 text-center py-4">繰り返すタスクを設定すると、ホームに自動表示されます</div>}
      <div className="space-y-3">{Object.entries(grouped).map(([cat, items]) => <div key={cat}><div className="text-xs text-stone-500 font-medium mb-1.5">{cat}</div><div className="space-y-1.5">{items.map(r => <div key={r.id} className="flex items-center gap-2 p-2.5 rounded-lg bg-stone-50 border border-stone-100"><div className="flex-1 min-w-0"><div className="text-sm text-stone-800">{r.text}</div><div className="text-xs text-stone-500 mt-0.5">{getRecurringLabel(r.recurrence)}</div></div><span className={`text-xs px-2 py-0.5 rounded-full ${priorityColors[r.priority]}`}>{priorityLabels[r.priority]}</span><button onClick={() => setEditing(r)} className="text-stone-400"><Edit2 size={14} /></button><button onClick={() => remove(r.id)} className="text-stone-400 hover:text-red-500"><Trash2 size={14} /></button></div>)}</div></div>)}</div>
    </div>
  );
}

function CategoryManager({ categories, onChange, recurring, onRecurringChange, onClose }) {
  const [newCat, setNewCat] = useState('');
  const add = () => { if (!newCat.trim() || categories.includes(newCat.trim())) return; onChange([...categories, newCat.trim()]); setNewCat(''); };
  const remove = (cat) => { onChange(categories.filter(c => c !== cat)); onRecurringChange(recurring.map(r => r.category === cat ? { ...r, category: 'その他' } : r)); };
  return <div className="p-3 bg-amber-50 rounded-lg mb-3 border border-amber-200"><div className="flex justify-between items-center mb-2"><div className="text-xs font-semibold text-stone-700">分類の管理</div><button onClick={onClose}><X size={14} /></button></div><div className="space-y-1.5 mb-2">{categories.map(c => <div key={c} className="flex items-center gap-2 p-1.5 bg-white rounded"><span className="flex-1 text-sm">{c}</span><button onClick={() => remove(c)} className="text-stone-400 hover:text-red-500"><Trash2 size={12} /></button></div>)}</div><div className="flex gap-2"><input type="text" value={newCat} onChange={(e) => setNewCat(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && add()} placeholder="新しい分類..." className="flex-1 px-2 py-1.5 border border-stone-300 rounded text-sm bg-white" /><button onClick={add} className="px-3 py-1.5 bg-emerald-600 text-white rounded text-sm">追加</button></div></div>;
}

function RecurringForm({ initial, categories, onSave, onCancel }) {
  const [text, setText] = useState(initial?.text || '');
  const [priority, setPriority] = useState(initial?.priority || 'medium');
  const [category, setCategory] = useState(initial?.category || categories[0] || '');
  const [type, setType] = useState(initial?.recurrence.type || 'weekly');
  const [days, setDays] = useState(initial?.recurrence.days || []);
  const [dates, setDates] = useState(initial?.recurrence.dates || []);
  const [interval, setIntervalVal] = useState(initial?.recurrence.interval || 1);
  const [anchor, setAnchor] = useState(initial?.recurrence.anchor || todayStr());
  const toggleDay = (d) => setDays(days.includes(d) ? days.filter(x => x !== d) : [...days, d]);
  const toggleDate = (d) => setDates(dates.includes(d) ? dates.filter(x => x !== d) : [...dates, d]);
  const valid = text.trim() && (type === 'daily' || (type === 'weekly' && days.length > 0) || (type === 'monthly' && dates.length > 0));
  const submit = () => { if (!valid) return; onSave({ id: initial?.id || 'rec_' + Date.now(), text: text.trim(), priority, category, createdDate: initial?.createdDate || todayStr(), recurrence: { type, ...(type === 'weekly' ? { days, interval, anchor } : {}), ...(type === 'monthly' ? { dates } : {}) } }); };
  return (
    <div className="p-3 bg-stone-50 rounded-lg space-y-3 mb-3 border border-stone-200">
      <input type="text" value={text} onChange={(e) => setText(e.target.value)} placeholder="タスク名" autoFocus className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm bg-white" />
      <div className="flex gap-2"><select value={category} onChange={(e) => setCategory(e.target.value)} className="flex-1 px-2 py-1.5 border border-stone-300 rounded text-sm bg-white">{categories.map(c => <option key={c} value={c}>{c}</option>)}</select><select value={priority} onChange={(e) => setPriority(e.target.value)} className="px-2 py-1.5 border border-stone-300 rounded text-sm bg-white"><option value="high">優先度: 高</option><option value="medium">優先度: 中</option><option value="low">優先度: 低</option></select></div>
      <div className="flex gap-2"><select value={type} onChange={(e) => setType(e.target.value)} className="flex-1 px-2 py-1.5 border border-stone-300 rounded text-sm bg-white"><option value="daily">毎日</option><option value="weekly">週単位</option><option value="monthly">毎月</option></select>{type === 'weekly' && <select value={interval} onChange={(e) => setIntervalVal(parseInt(e.target.value))} className="px-2 py-1.5 border border-stone-300 rounded text-sm bg-white"><option value={1}>毎週</option><option value={2}>隔週</option><option value={3}>3週ごと</option><option value={4}>4週ごと</option></select>}</div>
      {type === 'weekly' && <><div className="flex gap-1">{weekdayLabels.map((label, i) => <button key={i} onClick={() => toggleDay(i)} className={`flex-1 py-1.5 rounded text-xs font-medium ${days.includes(i) ? 'bg-emerald-600 text-white' : 'bg-white border border-stone-200 text-stone-600'}`}>{label}</button>)}</div>{interval > 1 && <input type="date" value={anchor} onChange={(e) => setAnchor(e.target.value)} className="w-full px-2 py-1.5 border border-stone-300 rounded text-sm bg-white" />}</>}

function OneOffSection({ tasks, onChange }) {
  const [input, setInput] = useState('');
  const [priority, setPriority] = useState('medium');
  const [taskDate, setTaskDate] = useState(todayStr());
  const [filterDate, setFilterDate] = useState('upcoming');
  const [editing, setEditing] = useState(null);
  const [expandedNotes, setExpandedNotes] = useState({});
  const toggleNote = (id) => setExpandedNotes(s => ({ ...s, [id]: !s[id] }));
  const updateNote = (id, note) => onChange(tasks.map(t => t.id === id ? { ...t, note } : t));
  const add = () => { if (!input.trim()) return; onChange([...tasks, { id: 'task_' + Date.now(), text: input.trim(), priority, done: false, date: taskDate, note: '' }]); setInput(''); };
  const toggle = (id) => onChange(tasks.map(t => t.id === id ? { ...t, done: !t.done } : t));
  const del = (id) => onChange(tasks.filter(t => t.id !== id));
  const update = (u) => { onChange(tasks.map(t => t.id === u.id ? u : t)); setEditing(null); };
  const today = todayStr();
  let displayed = tasks;
  if (filterDate === 'today') displayed = tasks.filter(t => t.date === today);
  else if (filterDate === 'upcoming') displayed = tasks.filter(t => t.date >= today);
  const grouped = {}; for (const t of displayed) { if (!grouped[t.date]) grouped[t.date] = []; grouped[t.date].push(t); }
  const sortedDates = Object.keys(grouped).sort();
  const order = { high: 0, medium: 1, low: 2 };
  for (const d of sortedDates) grouped[d].sort((a, b) => { if (a.done !== b.done) return a.done ? 1 : -1; return order[a.priority] - order[b.priority]; });
  const dateLabel = (d) => { if (d === today) return `今日 (${d})`; const diff = daysBetween(today, d); if (diff === 1) return `明日 (${d})`; if (diff === -1) return `昨日 (${d})`; if (diff > 0 && diff <= 7) return `${diff}日後 (${d})`; return d; };

        <div className="space-y-2 mb-3"><input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && add()} placeholder="新しいタスク..." className="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm" /><div className="flex gap-2"><input type="date" value={taskDate} onChange={(e) => setTaskDate(e.target.value)} className="flex-1 px-2 py-2 border border-stone-300 rounded-lg text-sm" /><select value={priority} onChange={(e) => setPriority(e.target.value)} className="px-2 py-2 border border-stone-300 rounded-lg text-sm"><option value="high">高</option><option value="medium">中</option><option value="low">低</option></select><button onClick={add} className="px-3 py-2 bg-emerald-600 text-white rounded-lg"><Plus size={18} /></button></div></div>
        <div className="flex gap-1">{[{ v: 'today', l: '今日' }, { v: 'upcoming', l: '今日以降' }, { v: 'all', l: 'すべて' }].map(f => <button key={f.v} onClick={() => setFilterDate(f.v)} className={`px-3 py-1 rounded-full text-xs font-medium ${filterDate === f.v ? 'bg-stone-800 text-white' : 'bg-stone-100 text-stone-600'}`}>{f.l}</button>)}</div>
      </div>
      <div className="space-y-3">
        {sortedDates.length === 0 && <div className="bg-white rounded-xl p-6 text-center text-stone-400 text-sm border border-stone-200">タスクはまだありません</div>}
        {sortedDates.map(d => <div key={d}><div className="text-xs text-stone-500 font-medium mb-1.5 px-1">{dateLabel(d)}</div><div className="space-y-1.5">{grouped[d].map(task => editing === task.id ? <TaskEditRow key={task.id} task={task} onSave={update} onCancel={() => setEditing(null)} /> : <div key={task.id} className={`bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden ${task.done ? 'opacity-60' : ''}`}><div className="p-3 flex items-center gap-2"><button onClick={() => toggle(task.id)} className={`w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0 ${task.done ? 'bg-emerald-600 border-emerald-600' : 'border-stone-300'}`}>{task.done && <Check size={12} className="text-white" />}</button><span className={`flex-1 text-sm ${task.done ? 'line-through text-stone-400' : 'text-stone-800'}`}>{task.text}</span><span className={`text-xs px-2 py-0.5 rounded-full ${priorityColors[task.priority]}`}>{priorityLabels[task.priority]}</span><button onClick={() => toggleNote(task.id)} className={`flex-shrink-0 ${task.note ? 'text-emerald-600' : 'text-stone-300 hover:text-stone-500'}`}>📝</button><button onClick={() => setEditing(task.id)} className="text-stone-400 hover:text-emerald-600"><Edit2 size={14} /></button><button onClick={() => del(task.id)} className="text-stone-400 hover:text-red-500"><Trash2 size={14} /></button></div>{expandedNotes[task.id] && <div className="px-3 pb-3 pt-0"><textarea value={task.note || ''} onChange={(e) => updateNote(task.id, e.target.value)} placeholder="詳細メモ..." rows={3} className="w-full p-2 border border-stone-300 rounded text-sm resize-y bg-stone-50 focus:bg-white focus:border-emerald-500 focus:outline-none" /></div>}</div>)}</div></div>)}
      </div>
    </div>
  );
}

function DashboardView({ entries, studyRecords, dayPlans }) {
  const [range, setRange] = useState('week');
  const [customDays, setCustomDays] = useState(14);
  const days = range === 'week' ? 7 : range === 'month' ? 30 : customDays;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days + 1);
  const cutoffStr = cutoff.toISOString().split('T')[0];
  const todayS = todayStr();
  const filteredDates = Object.keys(entries).filter(d => d >= cutoffStr).sort();
  const data = filteredDates.map(d => {
    const e = entries[d];
    const sl = getSleepHours(d, entries);
    const at = calcActiveTime(e.wakeTime, e.bedTime);
    const al = Number(e.actual.life) || 0; const ao = Number(e.actual.other) || 0;
    const aw = getWorkActualForDate(d, entries, studyRecords);
    return { date: d.slice(5).replace('-', '/'), fullDate: d, mood: e.mood, sleep: sl, weight: e.weight ? parseFloat(e.weight) : null, workPlan: Math.max(0, (at - al - ao) * (50 / 60)), workActual: aw };
  });
  const avgMood = data.length ? (data.reduce((s, d) => s + d.mood, 0) / data.length).toFixed(1) : '—';
  const avgSleepNum = data.length ? data.reduce((s, d) => s + d.sleep, 0) / data.length : null;
  const totalPlan = data.reduce((s, d) => s + d.workPlan, 0);
  const totalActual = data.reduce((s, d) => s + d.workActual, 0);
  const achievementRate = totalPlan > 0 ? Math.round((totalActual / totalPlan) * 100) : 0;
  const weightData = data.filter(d => d.weight !== null && !isNaN(d.weight));

  // 目標達成度（日記の有無に関わらず、期間内の全カレンダー日で集計）
  const planData = [];
  for (let d = new Date(cutoffStr + 'T00:00:00'), end = new Date(todayS + 'T00:00:00'); d <= end; d.setDate(d.getDate() + 1)) {
    const ds = formatLocalDate(d);
    const plan = getDayPlan(dayPlans, ds);
    const hasOverall = !!plan.overall;
    const blockTotal = plan.blocks.length;
    const blockDone = plan.blocks.filter(b => b.done).length;
    planData.push({
      date: ds.slice(5).replace('-', '/'),
      overallRate: hasOverall ? (plan.overallDone ? 100 : 0) : null,
      blockRate: blockTotal > 0 ? Math.round((blockDone / blockTotal) * 100) : null,
    });
  }
  const overallDays = planData.filter(d => d.overallRate !== null);
  const avgOverallRate = overallDays.length ? Math.round(overallDays.reduce((s, d) => s + d.overallRate, 0) / overallDays.length) : null;
  const blockDays = planData.filter(d => d.blockRate !== null);
  const avgBlockRate = blockDays.length ? Math.round(blockDays.reduce((s, d) => s + d.blockRate, 0) / blockDays.length) : null;
  const hasPlanData = overallDays.length > 0 || blockDays.length > 0;

  return (
    <div className="space-y-3">
      <div className="no-print bg-white rounded-xl p-3 shadow-sm border border-stone-200">
        <div className="flex items-center justify-between mb-2">
          <div className="text-xs text-stone-500">期間</div>
          <button onClick={() => window.print()} className="text-xs px-3 py-1.5 bg-stone-800 text-white rounded-lg font-medium flex items-center gap-1.5"><Download size={12} />PDFとして保存</button>
        </div>
        <div className="flex gap-2 mb-2">
          <button onClick={() => setRange('week')} className={`flex-1 py-2 rounded-lg text-sm font-medium ${range === 'week' ? 'bg-emerald-600 text-white' : 'bg-stone-100 text-stone-600'}`}>過去1週間</button>
          <button onClick={() => setRange('month')} className={`flex-1 py-2 rounded-lg text-sm font-medium ${range === 'month' ? 'bg-emerald-600 text-white' : 'bg-stone-100 text-stone-600'}`}>過去1ヶ月</button>
          <button onClick={() => setRange('custom')} className={`flex-1 py-2 rounded-lg text-sm font-medium ${range === 'custom' ? 'bg-emerald-600 text-white' : 'bg-stone-100 text-stone-600'}`}>カスタム</button>
        </div>
        {range === 'custom' && <div className="flex items-center gap-2"><label className="text-xs text-stone-500">過去</label><input type="number" min="1" max="365" value={customDays} onChange={(e) => setCustomDays(Math.max(1, parseInt(e.target.value) || 1))} className="w-20 px-2 py-1 border border-stone-300 rounded text-sm text-center" /><label className="text-xs text-stone-500">日間</label></div>}
      </div>
      <div className="print-report">
        <div className="hidden print:block mb-2">
          <h2 className="text-lg font-bold text-stone-800">📔 ライフログ 振り返りレポート</h2>
          <div className="text-xs text-stone-500">出力日: {todayS}（対象期間: {cutoffStr} 〜 {todayS}）</div>
        </div>
        <div className="no-print"><ClaudeReportHint /></div>
        <div className="grid grid-cols-3 gap-2">
          <StatCard label="平均メンタル" value={avgMood} unit="/ 5" />
          <StatCard label="平均睡眠" value={avgSleepNum !== null ? formatHM(avgSleepNum) : '—'} unit="" />

          <ChartCard title="😴 睡眠時間の推移"><ResponsiveContainer width="100%" height={180}><BarChart data={data} margin={{ top: 5, right: 10, left: -20, bottom: 0 }}><CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} /><YAxis tick={{ fontSize: 10 }} /><Tooltip formatter={(v) => formatHM(v)} /><Bar dataKey="sleep" fill="#64748b" radius={[4, 4, 0, 0]} /></BarChart></ResponsiveContainer></ChartCard>
          {weightData.length > 0 && <ChartCard title="⚖️ 体重の推移"><ResponsiveContainer width="100%" height={180}><LineChart data={weightData} margin={{ top: 5, right: 10, left: -20, bottom: 0 }}><CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} /><YAxis domain={['auto', 'auto']} tick={{ fontSize: 10 }} /><Tooltip formatter={(v) => `${v} kg`} /><Line type="monotone" dataKey="weight" stroke="#f59e0b" strokeWidth={2.5} dot={{ r: 4, fill: '#f59e0b' }} /></LineChart></ResponsiveContainer></ChartCard>}
          <ChartCard title="📚 勉強時間（可能 vs 実績）"><ResponsiveContainer width="100%" height={180}><BarChart data={data} margin={{ top: 5, right: 10, left: -20, bottom: 0 }}><CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} /><YAxis tick={{ fontSize: 10 }} /><Tooltip formatter={(v) => formatHM(v)} /><Legend wrapperStyle={{ fontSize: 11 }} /><Bar dataKey="workPlan" name="可能時間" fill="#cbd5e1" radius={[4, 4, 0, 0]} /><Bar dataKey="workActual" name="実績" fill="#10b981" radius={[4, 4, 0, 0]} /></BarChart></ResponsiveContainer></ChartCard>
        </div>}
        {hasPlanData && <ChartCard title="🎯 目標達成度の推移"><ResponsiveContainer width="100%" height={180}><LineChart data={planData} margin={{ top: 5, right: 10, left: -20, bottom: 0 }}><CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" /><XAxis dataKey="date" tick={{ fontSize: 10 }} /><YAxis domain={[0, 100]} tick={{ fontSize: 10 }} /><Tooltip formatter={(v) => v + '%'} /><Legend wrapperStyle={{ fontSize: 11 }} /><Line type="monotone" dataKey="overallRate" name="総合目標" stroke="#8b5cf6" strokeWidth={2.5} dot={{ r: 3 }} connectNulls /><Line type="monotone" dataKey="blockRate" name="時間ごとの目標" stroke="#0ea5e9" strokeWidth={2.5} dot={{ r: 3 }} connectNulls /></LineChart></ResponsiveContainer></ChartCard>}
        <WeeklyReportSection entries={entries} studyRecords={studyRecords} dayPlans={dayPlans} />
      </div>
    </div>
  );
}

function WeeklyReportSection({ entries, studyRecords, dayPlans }) {
  const weeklyTrend = useMemo(() => {
    const thisWeekStart = getWeekStart(todayStr());
    const weeks = [];
    for (let i = 7; i >= 0; i--) {
      const d = new Date(thisWeekStart + 'T00:00:00'); d.setDate(d.getDate() - i * 7);
      weeks.push(buildWeekSummary(formatLocalDate(d), entries, studyRecords, dayPlans));
    }
    return weeks;
  }, [entries, studyRecords, dayPlans]);
  const thisWeek = weeklyTrend[weeklyTrend.length - 1];
  const lastWeek = weeklyTrend[weeklyTrend.length - 2];
  return (
    <div className="space-y-3 mt-3">
      <div className="bg-white rounded-xl p-4 shadow-sm border border-stone-200">
        <h3 className="text-sm font-semibold text-stone-700 mb-1">📋 今週 vs 先週</h3>
        <div className="text-xs text-stone-400 mb-2">{thisWeek.label}（今週） / {lastWeek.label}（先週）</div>
        <CompareRow label="📚 勉強時間" current={thisWeek.studyHours} previous={lastWeek.studyHours} fmt={formatHM} deltaFmt={formatHM} />
        <CompareRow label="😊 平均メンタル" current={thisWeek.avgMood} previous={lastWeek.avgMood} fmt={(v) => v.toFixed(1)} deltaFmt={(v) => v.toFixed(1)} />
        <CompareRow label="😴 平均睡眠" current={thisWeek.avgSleep} previous={lastWeek.avgSleep} fmt={formatHM} deltaFmt={formatHM} />
        <CompareRow label="🎯 総合目標達成率" current={thisWeek.overallRate} previous={lastWeek.overallRate} fmt={(v) => Math.round(v) + '%'} deltaFmt={(v) => Math.round(v) + '%'} />
        <CompareRow label="⏰ 時間目標達成率" current={thisWeek.blockRate} previous={lastWeek.blockRate} fmt={(v) => Math.round(v) + '%'} deltaFmt={(v) => Math.round(v) + '%'} />
      </div>
      <ChartCard title="📚 週ごとの勉強時間">
        <ResponsiveContainer width="100%" height={180}><BarChart data={weeklyTrend} margin={{ top: 5, right: 10, left: -20, bottom: 0 }}><CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" /><XAxis dataKey="label" tick={{ fontSize: 10 }} /><YAxis tick={{ fontSize: 10 }} /><Tooltip formatter={(v) => formatHM(v)} /><Bar dataKey="studyHours" name="勉強時間" fill="#10b981" radius={[4, 4, 0, 0]} /></BarChart></ResponsiveContainer>
      </ChartCard>
      <ChartCard title="🎯 週ごとの目標達成率">
        <ResponsiveContainer width="100%" height={180}><LineChart data={weeklyTrend} margin={{ top: 5, right: 10, left: -20, bottom: 0 }}><CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" /><XAxis dataKey="label" tick={{ fontSize: 10 }} /><YAxis domain={[0, 100]} tick={{ fontSize: 10 }} /><Tooltip formatter={(v) => v + '%'} /><Legend wrapperStyle={{ fontSize: 11 }} /><Line type="monotone" dataKey="overallRate" name="総合目標" stroke="#8b5cf6" strokeWidth={2.5} dot={{ r: 3 }} connectNulls /><Line type="monotone" dataKey="blockRate" name="時間ごとの目標" stroke="#0ea5e9" strokeWidth={2.5} dot={{ r: 3 }} connectNulls /></LineChart></ResponsiveContainer>
      </ChartCard>
    </div>
  );
}

function CompareRow({ label, current, previous, fmt, deltaFmt }) {
  const display = (v) => (v === null || v === undefined ? '—' : fmt(v));
  let deltaNode = null;
  if (current !== null && current !== undefined && previous !== null && previous !== undefined) {
    const delta = current - previous;
    const color = delta === 0 ? 'text-stone-400' : delta > 0 ? 'text-emerald-600' : 'text-red-500';
    const arrow = delta === 0 ? '→' : delta > 0 ? '▲' : '▼';
    deltaNode = <span className={`text-xs font-medium ${color} flex-shrink-0`}>{arrow} {deltaFmt(Math.abs(delta))}</span>;
  }
  return (
    <div className="flex items-center justify-between py-2 border-b border-stone-100 last:border-0">
      <span className="text-sm text-stone-600 flex-shrink-0">{label}</span>
      <div className="flex items-center gap-2">
        <span className="text-sm font-semibold text-stone-800">{display(current)}</span>
        <span className="text-xs text-stone-400">(先週 {display(previous)})</span>
        {deltaNode}
      </div>
    </div>
  );
}

function StatCard({ label, value, unit }) { return <div className="bg-white rounded-xl p-3 shadow-sm border border-stone-200"><div className="text-xs text-stone-500">{label}</div><div className="text-xl font-bold text-stone-800 mt-1">{value} <span className="text-xs text-stone-400 font-normal">{unit}</span></div></div>; }
function ChartCard({ title, children }) { return <div className="bg-white rounded-xl p-4 shadow-sm border border-stone-200"><h3 className="text-sm font-semibold text-stone-700 mb-2">{title}</h3>{children}</div>; }

function SettingsView({ data, onImport }) {
  const [importMode, setImportMode] = useState('merge');
  const [importStatus, setImportStatus] = useState('');
  const [importError, setImportError] = useState('');
  const fileInputRef = useRef(null);
  const [pendingImport, setPendingImport] = useState(null);
  const performImport = async () => {
    if (!pendingImport) return;
    try {
      await onImport(pendingImport.data, pendingImport.mode);
      setImportStatus(`✓ ${pendingImport.mode === 'replace' ? '上書き' : 'マージ'}インポート完了`);
    } catch (err) {
      setImportError('インポート失敗: ' + err.message);
    }
    setPendingImport(null);
  };
  const stats = {
    diaryDays: Object.keys(data['diary-entries'] || {}).length,
    tasks: (data['tasks'] || []).length,
    wishlists: (data['wishlists'] || []).length,
    recurring: (data['recurring-tasks'] || []).length,
    dayPlans: Object.keys(data['day-plans'] || {}).length,
    studyRecords: (data['study-records'] || []).length,
    subjects: (data['study-subjects'] || []).length,
    memos: (data['memos'] || []).length
  };
  const handleExport = () => {
    const payload = { app: 'lifelog', version: 3, exportedAt: new Date().toISOString(), data };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `lifelog-backup-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };
  const handleFileSelect = async (e) => {
    setImportError(''); setImportStatus(''); setPendingImport(null);
    const file = e.target.files?.[0]; if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      const imported = parsed.data || parsed;
      const knownKeys = ['diary-entries', 'tasks', 'wishlists', 'recurring-tasks', 'recurring-categories', 'recurring-done', 'day-plans', 'study-records', 'study-subjects', 'memos'];
      if (!knownKeys.some(k => k in imported)) {
        setImportError('このファイルはライフログのバックアップではないようです。');
        return;
      }
      // 件数を集計してプレビュー
      const preview = {
        diary: Object.keys(imported['diary-entries'] || {}).length,
        tasks: (imported['tasks'] || []).length,
        recurring: (imported['recurring-tasks'] || []).length,
        wishlists: (imported['wishlists'] || []).length,
        dayPlans: Object.keys(imported['day-plans'] || {}).length,
        studyRecords: (imported['study-records'] || []).length,
        subjects: (imported['study-subjects'] || []).length,
        memos: (imported['memos'] || []).length
      };
      setPendingImport({ data: imported, mode: importMode, preview, fileName: file.name });
    } catch (err) {
      setImportError('読み込み失敗: ' + err.message);
    } finally {
      if (fileInputRef.current) fileInputRef.current.value = '';
    }
  };
  return (
    <div className="space-y-4">
      <div className="bg-white rounded-xl p-4 shadow-sm border border-stone-200">
        <h3 className="text-sm font-semibold text-stone-700 mb-3 flex items-center gap-1.5"><Settings size={16} className="text-emerald-600" />データ管理</h3>
        <div className="bg-stone-50 rounded-lg p-3 mb-4 border border-stone-100">
          <div className="text-xs text-stone-500 mb-2">現在のデータ</div>
          <div className="grid grid-cols-2 gap-x-3 gap-y-1 text-xs text-stone-700">
            <div>📔 日記: <span className="font-semibold">{stats.diaryDays}</span>日分</div>
            <div>✓ タスク: <span className="font-semibold">{stats.tasks}</span>件</div>
            <div>🔁 繰り返し: <span className="font-semibold">{stats.recurring}</span>件</div>
            <div>⭐ リスト: <span className="font-semibold">{stats.wishlists}</span>個</div>
            <div>🎯 行動計画: <span className="font-semibold">{stats.dayPlans}</span>日分</div>
            <div>📚 勉強記録: <span className="font-semibold">{stats.studyRecords}</span>件</div>
            <div>📖 科目: <span className="font-semibold">{stats.subjects}</span>個</div>
            <div>📝 メモ: <span className="font-semibold">{stats.memos}</span>件</div>
          </div>
        </div>
        <button onClick={handleExport} className="w-full py-2.5 bg-emerald-600 text-white rounded-lg font-medium hover:bg-emerald-700 flex items-center justify-center gap-2 text-sm mb-3"><Download size={16} />JSONでダウンロード</button>
        <div className="border-t border-stone-100 pt-3">
          <div className="flex gap-2 mb-2">
            <label className={`flex-1 cursor-pointer p-2 rounded-lg border-2 ${importMode === 'merge' ? 'border-emerald-500 bg-emerald-50' : 'border-stone-200'}`}><input type="radio" value="merge" checked={importMode === 'merge'} onChange={(e) => setImportMode(e.target.value)} className="hidden" /><div className="text-xs font-semibold">マージ</div></label>
            <label className={`flex-1 cursor-pointer p-2 rounded-lg border-2 ${importMode === 'replace' ? 'border-red-500 bg-red-50' : 'border-stone-200'}`}><input type="radio" value="replace" checked={importMode === 'replace'} onChange={(e) => setImportMode(e.target.value)} className="hidden" /><div className="text-xs font-semibold">上書き</div></label>
          </div>
          <input ref={fileInputRef} type="file" accept="application/json,.json" onChange={handleFileSelect} className="hidden" />
          <button onClick={() => fileInputRef.current?.click()} className="w-full py-2.5 bg-stone-800 text-white rounded-lg font-medium hover:bg-stone-900 flex items-center justify-center gap-2 text-sm"><Upload size={16} />JSONファイルを選択</button>
          {pendingImport && (
            <div className={`mt-3 p-3 rounded-lg border-2 ${pendingImport.mode === 'replace' ? 'bg-red-50 border-red-300' : 'bg-emerald-50 border-emerald-300'}`}>
              <div className="text-sm font-semibold text-stone-800 mb-2">
                {pendingImport.mode === 'replace' ? '⚠️ 上書きインポート確認' : '📥 マージインポート確認'}
              </div>
              <div className="text-xs text-stone-600 mb-2 truncate">📄 {pendingImport.fileName}</div>
              <div className="bg-white rounded p-2 mb-3 border border-stone-200">
                <div className="text-xs text-stone-500 mb-1">取り込むデータ：</div>
                <div className="grid grid-cols-2 gap-x-3 gap-y-0.5 text-xs text-stone-700">
                  <div>📔 日記: <span className="font-semibold">{pendingImport.preview.diary}</span>日分</div>
                  <div>✓ タスク: <span className="font-semibold">{pendingImport.preview.tasks}</span>件</div>
                  <div>🔁 繰り返し: <span className="font-semibold">{pendingImport.preview.recurring}</span>件</div>
                  <div>⭐ リスト: <span className="font-semibold">{pendingImport.preview.wishlists}</span>個</div>
                  <div>🎯 行動計画: <span className="font-semibold">{pendingImport.preview.dayPlans}</span>日分</div>
                  <div>📚 勉強記録: <span className="font-semibold">{pendingImport.preview.studyRecords}</span>件</div>
                  <div>📖 科目: <span className="font-semibold">{pendingImport.preview.subjects}</span>個</div>
                  <div>📝 メモ: <span className="font-semibold">{pendingImport.preview.memos}</span>件</div>
                </div>
              </div>
              {pendingImport.mode === 'replace' && (
                <div className="text-xs text-red-700 mb-2 font-medium">⚠️ 現在のデータはすべて消去され、ファイルの内容に置き換わります</div>
              )}
              {pendingImport.mode === 'merge' && (
                <div className="text-xs text-emerald-700 mb-2">既存データに追加されます（同IDの項目はスキップ）</div>
              )}
              <div className="flex gap-2">
                <button onClick={performImport} className={`flex-1 py-2 text-white rounded-lg text-sm font-medium ${pendingImport.mode === 'replace' ? 'bg-red-600 hover:bg-red-700' : 'bg-emerald-600 hover:bg-emerald-700'}`}>
                  {pendingImport.mode === 'replace' ? '上書き実行' : 'マージ実行'}
                </button>
                <button onClick={() => setPendingImport(null)} className="px-4 py-2 text-stone-500 text-sm">キャンセル</button>
              </div>
            </div>
          )}
          {importStatus && <div className="mt-2 p-2 bg-emerald-50 text-emerald-700 rounded text-xs">{importStatus}</div>}
          {importError && <div className="mt-2 p-2 bg-red-50 text-red-700 rounded text-xs">{importError}</div>}
        </div>
      </div>
      <GoogleDrivePanel data={data} onImport={onImport} />
    </div>
  );
}

function GoogleDrivePanel({ data, onImport }) {
  const [clientId, setClientId] = useState(localStorage.getItem('googleClientId') || '');
  const [clientSecret, setClientSecret] = useState(localStorage.getItem('googleClientSecret') || '');
  const [savedMsg, setSavedMsg] = useState('');
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState('');
  const [msgType, setMsgType] = useState('info');
  const [backups, setBackups] = useState(null);
  const [showRestore, setShowRestore] = useState(false);
  const [restoreMode, setRestoreMode] = useState('merge');

  const isConfigured = !!(clientId && clientSecret);

  const showMsg = (type, text, ttl = 3500) => {
    setMsgType(type); setMsg(text);
    if (ttl > 0) setTimeout(() => setMsg(''), ttl);
  };

  const saveSettings = () => {
    localStorage.setItem('googleClientId', clientId.trim());
    localStorage.setItem('googleClientSecret', clientSecret.trim());
    setSavedMsg('✓ 保存しました');
    setTimeout(() => setSavedMsg(''), 2000);
  };

  const doBackup = async () => {
    if (!isConfigured) { showMsg('warning', 'クライアントIDとシークレットを先に保存してください'); return; }
    setBusy(true);
    try {
      const token = await gGetToken();
      showMsg('info', 'バックアップ中...', 0);
      const payload = { app: 'lifelog', version: 3, exportedAt: new Date().toISOString(), data };
      const filename = `lifelog_backup_${todayStr()}.json`;
      await gDriveUpload(token, filename, JSON.stringify(payload, null, 2));
      showMsg('success', `✓ Googleドライブに「${filename}」として保存しました`);
    } catch (e) {
      showMsg('error', 'エラー: ' + e.message);
    } finally {
      setBusy(false);
    }
  };

  const loadBackupList = async () => {
    if (!isConfigured) { showMsg('warning', 'クライアントIDとシークレットを先に保存してください'); return; }
    setBusy(true);
    try {
      const token = await gGetToken();
      const files = await gDriveListBackups(token);
      setBackups(files);
      setShowRestore(true);
      if (files.length === 0) showMsg('warning', 'バックアップファイルが見つかりませんでした');
    } catch (e) {
      showMsg('error', 'エラー: ' + e.message);
    } finally {
      setBusy(false);
    }
  };

  const doRestore = async (fileId, fileName) => {
    if (!confirm(`「${fileName}」を${restoreMode === 'replace' ? '上書き' : 'マージ'}復元しますか？`)) return;
    setBusy(true);
    try {
      const token = await gGetToken();
      const text = await gDriveDownload(token, fileId);
      const parsed = JSON.parse(text);
      const imported = parsed.data || parsed;
      await onImport(imported, restoreMode);
      showMsg('success', `✓ 「${fileName}」から復元しました (${restoreMode === 'replace' ? '上書き' : 'マージ'})`);
      setShowRestore(false);
      setBackups(null);
    } catch (e) {
      showMsg('error', 'エラー: ' + e.message);
    } finally {
      setBusy(false);
    }
  };

  const msgClass = { success: 'bg-emerald-50 text-emerald-700', error: 'bg-red-50 text-red-700', warning: 'bg-amber-50 text-amber-700', info: 'bg-sky-50 text-sky-700' }[msgType];

  return (
    <div className="bg-white rounded-xl p-4 shadow-sm border border-stone-200">
      <h3 className="text-sm font-semibold text-stone-700 mb-3 flex items-center gap-1.5">
        ☁️ Googleドライブ連携
        <span className={`text-xs px-2 py-0.5 rounded-full ${isConfigured ? 'bg-emerald-100 text-emerald-700' : 'bg-stone-100 text-stone-500'}`}>
          {isConfigured ? '● 設定済み' : '○ 未設定'}
        </span>
      </h3>

      <div className="bg-stone-50 rounded-lg p-3 mb-3 border border-stone-100">
        <label className="text-xs text-stone-500 block mb-1">クライアントID</label>
        <input type="text" value={clientId} onChange={(e) => setClientId(e.target.value)} placeholder="*.apps.googleusercontent.com" className="w-full px-2 py-1.5 border border-stone-300 rounded text-xs font-mono mb-2 bg-white" />
        <label className="text-xs text-stone-500 block mb-1">クライアントシークレット</label>
        <input type="password" value={clientSecret} onChange={(e) => setClientSecret(e.target.value)} placeholder="GOCSPX-..." className="w-full px-2 py-1.5 border border-stone-300 rounded text-xs font-mono mb-2 bg-white" />
        <button onClick={saveSettings} className="px-3 py-1.5 bg-stone-700 text-white rounded text-xs font-medium hover:bg-stone-800">設定を保存</button>
        {savedMsg && <span className="ml-2 text-xs text-emerald-700">{savedMsg}</span>}
        <p className="text-xs text-stone-400 mt-2 leading-relaxed">
          ※ 学習アプリと同じクライアントIDを使えます。Google Cloud Consoleで本ページのURL（{window.location.origin + window.location.pathname}）を「承認済みリダイレクトURI」に追加してください。
        </p>
      </div>

      <div className="grid grid-cols-2 gap-2 mb-3">
        <button onClick={doBackup} disabled={busy || !isConfigured} className="py-2.5 bg-emerald-600 text-white rounded-lg font-medium text-sm hover:bg-emerald-700 disabled:opacity-50 flex items-center justify-center gap-1.5">
          <Upload size={14} />Driveにバックアップ
        </button>
        <button onClick={loadBackupList} disabled={busy || !isConfigured} className="py-2.5 bg-stone-600 text-white rounded-lg font-medium text-sm hover:bg-stone-700 disabled:opacity-50 flex items-center justify-center gap-1.5">
          <Download size={14} />Driveから復元
        </button>
      </div>

      {showRestore && backups && backups.length > 0 && (
        <div className="bg-stone-50 rounded-lg p-3 mb-3 border border-stone-200">
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs font-semibold text-stone-700">📂 バックアップを選択</div>
            <button onClick={() => { setShowRestore(false); setBackups(null); }} className="text-stone-400"><X size={14} /></button>
          </div>
          <div className="flex gap-2 mb-2">
            <label className={`flex-1 cursor-pointer p-1.5 rounded border-2 text-center ${restoreMode === 'merge' ? 'border-emerald-500 bg-emerald-50' : 'border-stone-200'}`}>
              <input type="radio" value="merge" checked={restoreMode === 'merge'} onChange={(e) => setRestoreMode(e.target.value)} className="hidden" />
              <span className="text-xs font-semibold">マージ</span>
            </label>
            <label className={`flex-1 cursor-pointer p-1.5 rounded border-2 text-center ${restoreMode === 'replace' ? 'border-red-500 bg-red-50' : 'border-stone-200'}`}>
              <input type="radio" value="replace" checked={restoreMode === 'replace'} onChange={(e) => setRestoreMode(e.target.value)} className="hidden" />
              <span className="text-xs font-semibold">上書き</span>
            </label>
          </div>
          <div className="space-y-1 max-h-56 overflow-y-auto">
            {backups.map(f => (
              <button key={f.id} onClick={() => doRestore(f.id, f.name)} disabled={busy} className="w-full text-left p-2 bg-white rounded border border-stone-200 hover:border-emerald-400 hover:bg-emerald-50 disabled:opacity-50">
                <div className="text-xs font-medium text-stone-800 truncate">{f.name}</div>
                <div className="text-xs text-stone-500 mt-0.5">{new Date(f.modifiedTime).toLocaleString('ja-JP')}</div>
              </button>
            ))}
          </div>
        </div>
      )}

      {msg && <div className={`p-2 rounded text-xs ${msgClass}`}>{msg}</div>}
    </div>
  );
}

// =================== Mount App ===================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
